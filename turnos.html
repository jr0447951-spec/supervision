<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PROFESIONAL v24.6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --danger: #ef4444; --radius: 12px; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 320px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #334155; overflow-y: auto; }
        .section-title { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .draggable-group { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: var(--radius); cursor: grab; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 65px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .calendar-container { flex-grow: 1; overflow-y: auto; padding: 20px; background: white; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { border: 1px solid var(--border); border-radius: var(--radius); min-height: 180px; padding: 10px; display: flex; flex-direction: column; gap: 5px; position: relative; }
        .day.weekend { background: #f8fafc; }
        .day.locked { border-top: 5px solid var(--sidebar); }
        .day.drag-over { border: 2px dashed var(--primary); background: #eff6ff; }
        .turno-card { border-radius: 8px; padding: 8px; font-size: 0.7rem; border-left: 4px solid var(--primary); background: #ebf2ff; cursor: grab; position: relative; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-blue { background: var(--primary); color: white; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; width: 350px; padding: 25px; border-radius: 16px; }
        .stat-item { display: flex; justify-content: space-between; color: white; border-bottom: 1px solid #334155; padding: 2px 0; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2><i class="fas fa-calendar-check"></i> PANEL ADMIN</h2>
    <div class="section-title">Personal de Baja</div>
    <div style="background:#1e293b; padding:10px; border-radius:10px; display:flex; flex-direction:column; gap:8px;">
        <select id="aus-tecnico" style="width:100%; padding:8px; background:#0f172a; color:white; border:1px solid #334155;"></select>
        <input type="date" id="aus-fecha" style="width:100%; padding:8px; background:#0f172a; color:white; border:1px solid #334155;">
        <button class="btn btn-blue" onclick="addAbsence()">REGISTRAR BAJA</button>
    </div>
    <div class="section-title">Arrastrar Grupos</div>
    <div id="sidebar-groups" style="display:flex; flex-direction:column; gap:8px;"></div>
    <div class="section-title">Estadísticas</div>
    <div id="stats-panel" style="padding:10px; background:#1e293b; border-radius:10px; font-size:0.75rem;"></div>
    <button class="btn btn-blue" style="margin-top:auto" onclick="syncSheets()">Sincronizar Nube</button>
</aside>

<main class="main-content">
    <header class="top-nav">
        <button class="btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <div id="month-display" style="font-weight:800; font-size:1.2rem; text-transform: uppercase;"></div>
        <button class="btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" onclick="capture()"><i class="fas fa-camera"></i> PNG 4K</button>
    </header>
    <div class="calendar-container">
        <div class="grid" id="grid"></div>
    </div>
</main>

<div id="modal">
    <div class="modal-box">
        <h4>Editar Turno</h4>
        <input type="hidden" id="m-id"><input type="hidden" id="m-idx">
        <select id="sel-t1" style="width:100%; padding:10px; margin-bottom:10px;"></select>
        <select id="sel-t2" style="width:100%; padding:10px; margin-bottom:10px;"></select>
        <button class="btn btn-blue" style="width:100%; margin-bottom:5px" onclick="confirmEdit()">GUARDAR</button>
        <button class="btn" style="width:100%; background:#fee2e2; color:var(--danger)" onclick="deleteGroup()">ELIMINAR</button>
        <button class="btn" style="width:100%" onclick="closeModal()">CANCELAR</button>
    </div>
</div>

<script>
    const DB_KEY = "SISTEMA_V24_MASTER";
    const START_REF = new Date(2026, 2, 7);
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyyeuQ57kvC7ORqDtaJlqDIsS9LHmUB9FpYGYlgcKgjCnQgQS6TdJMVt8pn_APSLEtq/exec"; 

    let currentView = new Date();
    let state = { tecnicos: [], gBase: {}, db: { manual: {}, absences: {}, locks: {} } };

    async function init() {
        await loadCSV();
        renderSidebar();
        
        // 1. Cargar datos locales primero para asegurar que haya algo que mostrar
        const local = localStorage.getItem(DB_KEY);
        if (local) state.db = JSON.parse(local);
        
        // 2. Intentar actualizar desde la nube
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL);
            const cloudData = await res.json();
            if (cloudData && cloudData.manual) {
                state.db = cloudData;
                localStorage.setItem(DB_KEY, JSON.stringify(state.db));
            }
        } catch (e) { console.warn("Nube no disponible"); }

        renderCalendar();
    }

    async function loadCSV() {
        try {
            const r = await fetch('tecnicos.csv');
            const d = await r.text();
            const lines = d.split(/\r?\n/).slice(1);
            state.tecnicos = []; state.gBase = {};
            lines.forEach(l => {
                const parts = l.split(/[;,]/).map(s => s.trim().toUpperCase());
                if(parts[0]) {
                    state.tecnicos.push(parts[0]);
                    if(parts[1]) {
                        if(!state.gBase[parts[1]]) state.gBase[parts[1]] = [];
                        state.gBase[parts[1]].push(parts[0]);
                    }
                }
            });
            state.tecnicos.sort();
        } catch (e) { console.error("CSV error"); }
    }

    function getAutoTurno(date) {
        if (date.getDay() !== 6 && date.getDay() !== 0) return [];
        const diff = Math.floor((date - START_REF) / 86400000);
        const cycle = (Math.floor(diff / 7)) % 4;
        const map = { 0:["1","2"], 1:["3","4"], 2:["2","1"], 3:["4","3"] };
        const g1 = map[cycle][0], g2 = map[cycle][1];
        return [ [...(state.gBase[g1] || [])], [...(state.gBase[g2] || [])] ];
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const y = currentView.getFullYear(), m = currentView.getMonth();
        document.getElementById('month-display').innerText = new Intl.DateTimeFormat('es-ES', {month:'long', year:'numeric'}).format(currentView);
        
        const offset = (new Date(y, m, 1).getDay() || 7) - 1;
        const total = new Date(y, m + 1, 0).getDate();
        const counts = {}; state.tecnicos.forEach(t => counts[t] = 0);

        for(let i=0; i<offset; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=total; d++) {
            const dateId = `${y}-${m+1}-${d}`;
            const date = new Date(y, m, d);
            const isWE = [0,6].includes(date.getDay());
            
            if (state.db.locks[dateId] === undefined) state.db.locks[dateId] = isWE;
            const isLocked = state.db.locks[dateId];
            
            let turnos = isLocked ? (state.db.manual[dateId] || getAutoTurno(date)) : (state.db.manual[dateId] || []);
            let dayAbs = state.db.absences[dateId] || [];

            const cell = document.createElement('div');
            cell.className = `day ${isWE?'weekend':''} ${isLocked?'locked':''}`;
            
            if(!isLocked) {
                cell.ondragover = e => { e.preventDefault(); cell.classList.add('drag-over'); };
                cell.ondragleave = () => cell.classList.remove('drag-over');
                cell.ondrop = e => handleDrop(e, dateId, date);
            }

            let turnosHtml = turnos.map((group, idx) => {
                group.forEach(n => { if(n && !dayAbs.includes(n)) counts[n]++ });
                return `<div class="turno-card" draggable="true" ondragstart="event.dataTransfer.setData('text/group', JSON.stringify(${JSON.stringify(group)}))">
                    <b>${(group[0] && dayAbs.includes(group[0])) ? `<s>${group[0]}</s>` : (group[0]||'VACANTE')}</b><br>
                    <b>${(group[1] && dayAbs.includes(group[1])) ? `<s>${group[1]}</s>` : (group[1]||'VACANTE')}</b>
                    ${!isLocked ? `<i class="fas fa-edit" style="position:absolute; right:5px; top:5px; opacity:0.5; cursor:pointer" onclick="openEditor('${dateId}',${idx})"></i>` : ''}
                </div>`;
            }).join('');

            cell.innerHTML = `
                <div style="display:flex; justify-content:space-between"><b>${d}</b><i class="fas ${isLocked?'fa-lock':'fa-lock-open'}" onclick="toggleLock('${dateId}')" style="cursor:pointer"></i></div>
                ${turnosHtml}
                ${dayAbs.length > 0 ? `<div class="bajas-container">${dayAbs.map(n => `<div class="baja-item"><span>${n}</span><i class="fas fa-times" onclick="removeAbsence('${dateId}','${n}')"></i></div>`).join('')}</div>` : ''}
            `;
            grid.appendChild(cell);
        }
        renderStats(counts);
    }

    function handleDrop(e, id, date) {
        e.preventDefault();
        const group = JSON.parse(e.dataTransfer.getData("text/group"));
        if(!state.db.manual[id]) state.db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(date)));
        
        const existentes = state.db.manual[id].flat().filter(n => n);
        if (group.some(n => n && existentes.includes(n))) return alert("Técnico ya asignado hoy");

        state.db.manual[id].push(group);
        state.db.locks[id] = true;
        save();
    }

    function toggleLock(id) {
        if(state.db.locks[id] && !state.db.manual[id]) state.db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(new Date(id.replace(/-/g,'/')))));
        state.db.locks[id] = !state.db.locks[id];
        save();
    }

    function save() { 
        localStorage.setItem(DB_KEY, JSON.stringify(state.db));
        renderCalendar();
        syncSheets(); 
    }

    async function syncSheets() {
        try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(state.db) }); } catch (e) {}
    }

    function renderSidebar() {
        const cont = document.getElementById('sidebar-groups'); cont.innerHTML = "";
        Object.keys(state.gBase).sort().forEach(g => {
            const div = document.createElement('div');
            div.className = "draggable-group"; div.draggable = true;
            div.innerHTML = `<span style="font-size:0.6rem; color:var(--primary); font-weight:800">GRUPO ${g}</span><div style="font-size:0.75rem">${state.gBase[g].join(' & ')}</div>`;
            div.ondragstart = e => e.dataTransfer.setData("text/group", JSON.stringify(state.gBase[g]));
            cont.appendChild(div);
        });
        const opts = `<option value="">-- SELECCIONAR --</option>` + state.tecnicos.map(t=>`<option value="${t}">${t}</option>`).join('');
        document.getElementById('aus-tecnico').innerHTML = document.getElementById('sel-t1').innerHTML = document.getElementById('sel-t2').innerHTML = opts;
    }

    function openEditor(id, idx) {
        const turnos = state.db.manual[id] || getAutoTurno(new Date(id.replace(/-/g, '/')));
        document.getElementById('m-id').value = id; document.getElementById('m-idx').value = idx;
        document.getElementById('sel-t1').value = turnos[idx][0] || "";
        document.getElementById('sel-t2').value = turnos[idx][1] || "";
        document.getElementById('modal').style.display = 'flex';
    }

    function confirmEdit() {
        const id = document.getElementById('m-id').value, idx = parseInt(document.getElementById('m-idx').value);
        if(!state.db.manual[id]) state.db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(new Date(id.replace(/-/g,'/')))));
        state.db.manual[id][idx] = [document.getElementById('sel-t1').value, document.getElementById('sel-t2').value];
        state.db.locks[id] = true;
        save(); closeModal();
    }

    function deleteGroup() {
        const id = document.getElementById('m-id').value, idx = parseInt(document.getElementById('m-idx').value);
        state.db.manual[id].splice(idx, 1);
        save(); closeModal();
    }

    function addAbsence() {
        const t = document.getElementById('aus-tecnico').value, f = document.getElementById('aus-fecha').value;
        if(!t || !f) return;
        const parts = f.split('-');
        const id = `${parts[0]}-${parseInt(parts[1])}-${parseInt(parts[2])}`;
        if(!state.db.absences[id]) state.db.absences[id] = [];
        if(!state.db.absences[id].includes(t)) { state.db.absences[id].push(t); save(); }
    }

    function removeAbsence(id, n) { state.db.absences[id] = state.db.absences[id].filter(x => x !== n); save(); }
    function renderStats(counts) {
        document.getElementById('stats-panel').innerHTML = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([n,c]) => `<div class="stat-item"><span>${n.split(' ')[0]}</span><b>${c}</b></div>`).join('');
    }
    function changeMonth(v) { currentView.setMonth(currentView.getMonth() + v); renderCalendar(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function capture() { html2canvas(document.querySelector('.calendar-container'), {scale:2}).then(c => { const l = document.createElement('a'); l.download = 'Cuadrante.png'; l.href = c.toDataURL(); l.click(); }); }
    window.onload = init;
</script>
</body>
</html>
