<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN v21.5 - CSV Punto y Coma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sidebar: #0f172a; --accent: #2563eb; --bg: #f1f5f9; 
            --card: #ffffff; --locked: #ef4444; --unlocked: #10b981; --danger: #fee2e2;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; }
        .sidebar h4 { color: #94a3b8; margin-top: 20px; margin-bottom: 10px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .ausencia-form { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; }
        .ausencia-form select, .ausencia-form input { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: none; font-size: 0.8rem; }
        
        .ausencias-list { margin-top: 10px; max-height: 200px; overflow-y: auto; font-size: 0.75rem; }
        .ausencia-tag { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 5px 8px; border-radius: 4px; margin-bottom: 4px; border-left: 3px solid var(--locked); }

        /* CALENDARIO */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .nav-bar { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        
        .day { background: var(--card); border-radius: 8px; border: 1px solid #e2e8f0; padding: 8px; min-height: 140px; position: relative; transition: 0.2s; cursor: pointer; }
        .day.weekend { background: #f8fafc; }
        .day.is-locked { border-top: 4px solid var(--locked); }
        .day.vacio { background: var(--danger); border-color: #f87171; }

        .day-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8rem; color: #64748b; }
        .cell-lock { padding: 4px; border-radius: 4px; font-size: 0.85rem; }
        .cell-lock.locked { color: var(--locked); }
        .cell-lock.unlocked { color: var(--unlocked); }

        .turno-card { padding: 4px 8px; border-radius: 4px; margin-top: 4px; font-size: 0.65rem; border-left: 3px solid #94a3b8; background: #f8fafc; }
        .principal { border-left-color: var(--accent); background: #eff6ff; }
        .names { font-weight: 700; color: #1e293b; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* MODAL */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; backdrop-filter: blur(2px); }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 380px; }
        .modal-row { margin-bottom: 15px; }
        .modal-row label { display: block; font-size: 0.7rem; font-weight: bold; color: #64748b; margin-bottom: 5px; }
        
        .btn { padding: 10px 15px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--accent); color: white; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3><i class="fas fa-calendar-check"></i> ADMIN v21.5</h3>
    
    <h4><i class="fas fa-user-clock"></i> Falta por Fecha</h4>
    <div class="ausencia-form">
        <select id="aus-tecnico"></select>
        <input type="date" id="aus-fecha">
        <button class="btn btn-blue" style="width:100%; font-size:0.75rem;" onclick="agregarAusencia()">REGISTRAR FALTA</button>
    </div>

    <h4>Ausencias Registradas</h4>
    <div id="ausencias-list" class="ausencias-list"></div>

    <button class="btn btn-blue" style="margin-top:auto; width:100%" onclick="saveAll()">
        <i class="fas fa-save"></i> GUARDAR TODO
    </button>
</aside>

<main class="main">
    <div class="nav-bar">
        <button class="btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2 id="mesTitulo"></h2>
        <button class="btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <input type="hidden" id="mId">
        <h3 id="mTitle" style="margin:0">Editar Turno</h3>
        <p id="mFechaStr" style="font-size:0.8rem; color:#64748b; margin-bottom:20px;"></p>
        
        <div class="modal-row">
            <label>TÉCNICO PRINCIPAL</label>
            <select id="select-t1"></select>
        </div>

        <div class="modal-row">
            <label>TÉCNICO APOYO</label>
            <select id="select-t2"></select>
        </div>

        <div style="display:grid; gap:8px; margin-top:20px;">
            <button class="btn btn-blue" onclick="saveModalChanges()">APLICAR CAMBIOS</button>
            <button class="btn" onclick="closeModal()" style="background:#e2e8f0;">CANCELAR</button>
            <button class="btn" onclick="resetDay()" style="background:#fee2e2; color:#ef4444; font-size:0.75rem;">VACIAR DÍA</button>
        </div>
    </div>
</div>

<script>
    let currentMonth = new Date();
    let tecnicosIndiv = [];
    let gBase = {}; 

    const DB_KEY = 'admin_v21_5';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { manual: {}, locks: {}, ausencias: {} };

    // --- CARGAR TÉCNICOS DESDE CSV (Separador ;) ---
    async function cargarTecnicosCSV() {
        try {
            const response = await fetch('tecnicos.csv');
            const data = await response.text();
            // Dividir por líneas y omitir cabecera
            const filas = data.split(/\r?\n/).slice(1);
            
            tecnicosIndiv = [];
            gBase = {};

            filas.forEach(fila => {
                if (fila.trim() === "") return;
                // Usamos punto y coma como separador
                const partes = fila.split(';');
                if(partes.length < 1) return;

                const nombre = partes[0].trim().toUpperCase();
                const grupo = partes[1] ? partes[1].trim() : "";

                if(nombre) {
                    tecnicosIndiv.push(nombre);
                    if (grupo !== "") {
                        if (!gBase[grupo]) gBase[grupo] = [];
                        gBase[grupo].push(nombre);
                    }
                }
            });

            tecnicosIndiv.sort();
            document.getElementById('aus-tecnico').innerHTML = tecnicosIndiv.map(t => `<option value="${t}">${t}</option>`).join('');
            render();
        } catch (e) {
            console.error("Error CSV:", e);
            alert("Asegúrate de tener tecnicos.csv con separador ';' en la misma carpeta.");
        }
    }

    // MOTOR AUTOMÁTICO (Fines de semana con Grupos 1-4)
    function getAutoTurno(dateObj) {
        const refDate = new Date(2026, 2, 7); 
        const diffDays = Math.floor((dateObj - refDate) / (1000*60*60*24));
        const numSemanas = Math.floor(diffDays / 7);
        const dw = dateObj.getDay();

        if (dw !== 6 && dw !== 0) return null;
        if (numSemanas < 0) return null;

        const ciclo = numSemanas % 4;
        let pG, aG;
        switch(ciclo) {
            case 0: pG = "1"; aG = "2"; break;
            case 1: pG = "3"; aG = "4"; break;
            case 2: pG = "2"; aG = "1"; break;
            case 3: pG = "4"; aG = "3"; break;
        }
        
        // Obtenemos los técnicos del grupo. Si el grupo tiene 2, toma el 1ero y 2do.
        const tP = gBase[pG] ? gBase[pG][0] : "";
        const tA = gBase[aG] ? gBase[aG][0] : "";
        return [tP, tA];
    }

    function estaAusente(nombre, fechaId) {
        return db.ausencias[fechaId] && db.ausencias[fechaId].includes(nombre);
    }

    function agregarAusencia() {
        const t = document.getElementById('aus-tecnico').value;
        const fVal = document.getElementById('aus-fecha').value;
        if(!fVal) return alert("Seleccione fecha");
        const f = fVal.split('-');
        const id = `${f[0]}-${parseInt(f[1])}-${parseInt(f[2])}`;
        if(!db.ausencias[id]) db.ausencias[id] = [];
        if(!db.ausencias[id].includes(t)) db.ausencias[id].push(t);
        render();
    }

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentMonth).toUpperCase();

        const totalDays = new Date(y, m + 1, 0).getDate();
        const startOffset = (new Date(y, m, 1).getDay() === 0) ? 6 : new Date(y, m, 1).getDay() - 1;

        for(let i=0; i<startOffset; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=totalDays; d++) {
            const id = `${y}-${m+1}-${d}`;
            const dateObj = new Date(y, m, d);
            const dw = dateObj.getDay();
            
            let personal = db.manual[id] || getAutoTurno(dateObj) || [];
            let personalLimpio = personal.map(n => estaAusente(n, id) ? "" : n);

            if (db.locks[id] === undefined) db.locks[id] = (personal.length > 0 && personal.some(n => n !== ""));
            const isLocked = db.locks[id];
            const esVacio = personalLimpio.length === 0 || personalLimpio.every(n => n === "");

            const cell = document.createElement('div');
            cell.className = `day ${dw===6||dw===0?'weekend':''} ${isLocked?'is-locked':''} ${esVacio?'vacio':''}`;
            
            let html = personalLimpio.map((n, i) => n ? `
                <div class="turno-card ${i===0?'principal':''}">
                    <span class="names">${n}</span>
                </div>` : (personal[i] ? `<div class="turno-card" style="border-left-color:red; opacity:0.5"><span class="names" style="color:red">FALTA</span></div>` : '')
            ).join('');

            cell.innerHTML = `
                <div class="day-header"><span>${d}</span><i class="fas ${isLocked?'fa-lock locked':'fa-lock-open unlocked'} cell-lock" onclick="toggleLock(event, '${id}')"></i></div>
                <div class="cell-content">${html}${esVacio ? '<span style="color:#ef4444; font-size:0.55rem; font-weight:bold; margin-top:10px; display:block; text-align:center;">HUECO</span>' : ''}</div>
            `;
            cell.onclick = () => !isLocked ? openModal(id, d) : null;
            grid.appendChild(cell);
        }
        renderAusenciasList();
    }

    function openModal(id, d) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('mId').value = id;
        document.getElementById('mFechaStr').innerText = `Día ${d} de ${document.getElementById('mesTitulo').innerText}`;
        const current = db.manual[id] || getAutoTurno(new Date(id.replace(/-/g, '/'))) || ["", ""];
        const generarOptions = (seleccionado) => {
            let h = `<option value="">-- VACANTE --</option>`;
            tecnicosIndiv.forEach(n => {
                const aus = estaAusente(n, id);
                h += `<option value="${n}" ${aus ? 'disabled' : ''} ${n === seleccionado ? 'selected' : ''}>${n} ${aus ? '(AUSENTE)' : ''}</option>`;
            });
            return h;
        };
        document.getElementById('select-t1').innerHTML = generarOptions(current[0]);
        document.getElementById('select-t2').innerHTML = generarOptions(current[1]);
    }

    function saveModalChanges() {
        const id = document.getElementById('mId').value;
        const t1 = document.getElementById('select-t1').value, t2 = document.getElementById('select-t2').value;
        if (t1 !== "" && t1 === t2) return alert("Técnico duplicado.");
        db.manual[id] = [t1, t2]; db.locks[id] = true;
        render(); closeModal();
    }

    function toggleLock(e, id) { e.stopPropagation(); db.locks[id] = !db.locks[id]; render(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function resetDay() { db.manual[document.getElementById('mId').value] = ["", ""]; closeModal(); render(); }
    function changeMonth(v) { currentMonth.setMonth(currentMonth.getMonth()+v); render(); }
    function saveAll() { localStorage.setItem(DB_KEY, JSON.stringify(db)); alert("✅ Guardado local."); }
    
    function renderAusenciasList() {
        const l = document.getElementById('ausencias-list'); l.innerHTML = "";
        Object.keys(db.ausencias).sort().forEach(id => {
            db.ausencias[id].forEach(n => {
                l.innerHTML += `<div class="ausencia-tag"><span>${id.split('-').slice(1).reverse().join('/')} - ${n.split(' ')[0]}</span><i class="fas fa-trash" onclick="borrarAusencia('${id}', '${n}')" style="cursor:pointer; color:#f87171"></i></div>`;
            });
        });
    }

    window.onload = cargarTecnicosCSV;
</script>
</body>
</html>
