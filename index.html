<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TÉCNICO V3 - ESTABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004488; --accent: #00d4ff; --bg: #001a33; --panel: #003366; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e6f2ff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* PANEL DE CONTROL */
        .config-card { background: var(--panel); width: 100%; max-width: 900px; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #0059b3; box-sizing: border-box; }
        .section-title { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 15px 0 10px 0; font-weight: 700; border-bottom: 1px solid #004d99; padding-bottom: 5px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 10px 0; border-radius: 8px; border: 1px solid #0059b3; background: #001a33; color: white; box-sizing: border-box; font-size: 0.9rem; }
        
        /* BOTONES FECHA */
        .date-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn-date { padding: 10px; background: rgba(0, 212, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.75rem; }

        /* BUSCADOR ORIGINAL */
        .search-box { position: relative; }
        #suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: #004488; border: 2px solid var(--accent); border-radius: 0 0 10px 10px; max-height: 250px; overflow-y: auto; z-index: 1000; display: none; }
        .sug-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #0059b3; color: white; font-size: 0.85rem; }
        .sug-item:hover { background: var(--accent); color: #001a33; font-weight: 700; }

        /* SELECTOR TÉCNICOS */
        .tech-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; background: #001a33; padding: 12px; border-radius: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #0059b3; }
        .tech-label { display: flex; align-items: center; font-size: 0.75rem; gap: 6px; cursor: pointer; }

        /* TABLA DE REPORTE (ESTILO EXCEL) */
        #capture-area { background: white; padding: 30px; width: 1100px; box-sizing: border-box; color: #002244; }
        .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .report-header h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; font-weight: 900; color: var(--primary); }
        
        .excel-table { width: 100%; border-collapse: collapse; border: 1px solid #ccc; table-layout: fixed; }
        .excel-table th { background: var(--primary); color: white; padding: 10px; font-size: 0.7rem; text-transform: uppercase; border: 1px solid #003366; }
        .excel-table td { border: 1px solid #b3d9ff; padding: 4px; font-size: 0.75rem; vertical-align: top; }

        /* EDICIÓN EN TABLA */
        .table-input { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 0.75rem; resize: none; overflow: hidden; padding: 4px; box-sizing: border-box; color: inherit; outline: none; display: block; }
        .table-input:focus { background: #e6f7ff; border-radius: 4px; }
        .table-select { width: 100%; border: none; background: transparent; font-weight: 700; color: var(--primary); cursor: pointer; font-size: 0.75rem; outline: none; }

        .action-bar { display: flex; gap: 10px; width: 100%; max-width: 900px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="config-card">
        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #00d4ff44;">
            <div class="section-title" style="margin-top:0;">🔍 Consultar Historial</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;">
                <input type="date" id="busq-fecha">
                <select id="busq-tipo">
                    <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
                    <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
                </select>
                <button onclick="consultarNube()" style="background:var(--accent); color:#001a33; border:none; padding:0 20px; border-radius:8px; font-weight:700; cursor:pointer;">BUSCAR</button>
            </div>
        </div>

        <div class="section-title">1. Configuración General</div>
        <select id="sel-tipo" onchange="actualizarTextos()">
            <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
            <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
        </select>
        
        <div class="date-grid">
            <button class="btn-date" onclick="cambiarFecha(0)">HOY</button>
            <button class="btn-date" onclick="cambiarFecha(1)">MAÑANA</button>
            <button class="btn-date" onclick="cambiarFecha(2)">PASADO MAÑANA</button>
        </div>
        <input type="date" id="sel-fecha" onchange="actualizarTextos()">

        <div class="section-title">2. Buscador de Sitios</div>
        <div class="search-box">
            <input type="text" id="site-search" placeholder="Escribe SITEID o Nombre..." autocomplete="off">
            <div id="suggestions"></div>
        </div>

        <div id="panel-edicion" style="display:none; margin-top:15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
            <div style="font-size:0.8rem; margin-bottom:10px;">Torrero: <span id="info-torrero" style="color:var(--accent); font-weight:700;"></span></div>
            <div class="tech-selector" id="lista-tecnicos"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
                <select id="falla-input">
                    <option value="FDS">FDS</option><option value="LTE FDS">LTE FDS</option><option value="PARCIAL">PARCIAL</option>
                    <option value="FALLA DE AC">FALLA DE AC</option><option value="VISITA TÉCNICA">VISITA TÉCNICA</option>
                </select>
                <select id="estado-input">
                    <option value="OPERATIVO">✅ OPERATIVO</option><option value="ASIGNADO">🔹 ASIGNADO</option>
                    <option value="EN RUTA">🚗 EN RUTA</option><option value="EN SITIO">📍 EN SITIO</option>
                    <option value="PDR">⏸️ PDR</option>
                </select>
            </div>
            <textarea id="comentario-input" placeholder="Comentario inicial..." rows="2"></textarea>
            <button onclick="agregarFila()" style="background: var(--accent); color: #001a33; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer;">AÑADIR A LA TABLA</button>
        </div>
    </div>

    <div id="capture-area">
        <div class="report-header">
            <div>
                <h1 id="tit-principal">VISITAS REALIZADAS</h1>
                <div style="font-size: 0.65rem; color: #0066cc; font-weight: 800;">EQUIPO TÉCNICO ZONA PARACENTRAL</div>
            </div>
            <div id="fecha-display" style="font-size: 1.2rem; font-weight: 800; color: var(--primary);"></div>
        </div>

        <table class="excel-table">
            <thead>
                <tr>
                    <th style="width: 22%;">SITIO / NODO</th>
                    <th style="width: 10%;">TORRERO</th>
                    <th style="width: 18%;">ASIGNADO (EDIT)</th>
                    <th style="width: 12%;">FALLA</th>
                    <th style="width: 15%;">ESTADO (SELECT)</th>
                    <th style="width: auto;">COMENTARIOS (EDIT)</th>
                    <th class="no-capture" style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo"></tbody>
        </table>
    </div>

    <div class="action-bar">
        <button class="btn" style="background:#fff; color:var(--primary); border:2px solid var(--primary);" onclick="exportarPNG()">💾 PNG</button>
        <button class="btn" style="background:#25d366; color:white;" onclick="window.open('https://wa.me/', '_blank')">📱 WA</button>
        <button class="btn" style="background:#f39c12; color:white;" onclick="guardarNube()">☁️ GUARDAR</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi04YsTUdOZnObRzT7-oETBJUovK1qMW1x5hUftlsOzwV-In-7-kmC-JTd2u2BafEp_g/exec";
        const SITIOS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv";
        const TECNICOS_CSV = "tecnicos.csv";

        let baseSitios = [], sitioActivo = null;

        window.onload = () => {
            cambiarFecha(0);
            Papa.parse(SITIOS_CSV, { download: true, header: true, complete: (r) => {
                baseSitios = r.data.map(x => ({ id: String(x.SITEID||"").trim(), nombre: String(x['NOMBRE DE SITIO']||"").trim(), torrero: x.Propietario||"N/A", full: `${x.SITEID} - ${x['NOMBRE DE SITIO']}` }));
            }});
            Papa.parse(TECNICOS_CSV, { download: true, header: true, complete: (r) => {
                const c = document.getElementById('lista-tecnicos');
                r.data.forEach(t => { if(t.Nombre) c.innerHTML += `<label class="tech-label"><input type="checkbox" value="${t.Nombre}"> ${t.Nombre}</label>`; });
            }});
        };

        function cambiarFecha(n) {
            let d = new Date(); d.setDate(d.getDate() + n);
            document.getElementById('sel-fecha').value = d.toISOString().split('T')[0];
            actualizarTextos();
        }

        function actualizarTextos() {
            const f = document.getElementById('sel-fecha').value.split('-');
            document.getElementById('fecha-display').innerText = f.length===3 ? `${f[2]}/${f[1]}/${f[0]}` : "";
            document.getElementById('tit-principal').innerText = document.getElementById('sel-tipo').value;
        }

        function autoExpand(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

        // BUSCADOR ORIGINAL (SCORE)
        document.getElementById('site-search').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            if(v.length < 2) { sug.style.display = 'none'; return; }
            const matches = baseSitios.map(s => {
                let sc = 0;
                if(s.id.toLowerCase() === v) sc = 100;
                else if(s.id.toLowerCase().startsWith(v)) sc = 80;
                else if(s.nombre.toLowerCase().startsWith(v)) sc = 60;
                else if(s.full.toLowerCase().includes(v)) sc = 20;
                return { ...s, sc };
            }).filter(s => s.sc > 0).sort((a,b) => b.sc - a.sc).slice(0, 7);
            if(matches.length > 0) {
                sug.style.display = 'block';
                matches.forEach(m => {
                    const d = document.createElement('div'); d.className = 'sug-item'; d.innerText = m.full.toUpperCase();
                    d.onclick = () => { 
                        sitioActivo = m; 
                        document.getElementById('site-search').value = m.full.toUpperCase();
                        document.getElementById('info-torrero').innerText = m.torrero;
                        document.getElementById('panel-edicion').style.display = 'block';
                        sug.style.display = 'none';
                    };
                    sug.appendChild(d);
                });
            }
        });

        function agregarFila(nube = null) {
            const t = document.getElementById('tabla-cuerpo');
            const tr = document.createElement('tr');
            const s = nube ? nube.sitio : sitioActivo.full.toUpperCase();
            const tor = nube ? nube.torrero : sitioActivo.torrero;
            const tec = nube ? nube.asignado : Array.from(document.querySelectorAll('#lista-tecnicos input:checked')).map(i => i.value).join(' / ');
            const fal = nube ? nube.falla : document.getElementById('falla-input').value;
            const est = nube ? nube.estado : document.getElementById('estado-input').value;
            const com = nube ? nube.comentarios : document.getElementById('comentario-input').value;

            tr.innerHTML = `
                <td style="font-weight:800; color:var(--primary); padding:8px;">${s}</td>
                <td style="padding:8px;">${tor}</td>
                <td><textarea class="table-input" oninput="autoExpand(this)" style="font-weight:600;">${tec}</textarea></td>
                <td style="font-weight:700; color:#0055aa; padding:8px;">${fal}</td>
                <td>
                    <select class="table-select">
                        <option value="OPERATIVO" ${est.includes('OPERATIVO')?'selected':''}>✅ OPERATIVO</option>
                        <option value="ASIGNADO" ${est.includes('ASIGNADO')?'selected':''}>🔹 ASIGNADO</option>
                        <option value="EN RUTA" ${est.includes('EN RUTA')?'selected':''}>🚗 EN RUTA</option>
                        <option value="EN SITIO" ${est.includes('EN SITIO')?'selected':''}>📍 EN SITIO</option>
                        <option value="PDR" ${est.includes('PDR')?'selected':''}>⏸️ PDR</option>
                    </select>
                </td>
                <td><textarea class="table-input" oninput="autoExpand(this)">${com}</textarea></td>
                <td class="no-capture" style="text-align:center;"><button onclick="this.closest('tr').remove()" style="border:none; background:none; color:red; font-weight:bold; cursor:pointer;">×</button></td>
            `;
            t.appendChild(tr);
            tr.querySelectorAll('textarea').forEach(tx => autoExpand(tx));
            if(!nube) { document.getElementById('panel-edicion').style.display = 'none'; document.getElementById('site-search').value = ''; document.querySelectorAll('#lista-tecnicos input').forEach(c => c.checked = false); }
        }

        async function consultarNube() {
            const f = document.getElementById('busq-fecha').value, t = document.getElementById('busq-tipo').value;
            if(!f) return alert("Fecha requerida");
            try {
                const res = await fetch(`${SCRIPT_URL}?fecha=${f}&tipo=${t}`);
                const data = await res.json();
                document.getElementById('tabla-cuerpo').innerHTML = '';
                if(data.length > 0) data.forEach(item => agregarFila(item));
                else alert("Sin registros");
            } catch(e) { alert("Error de red"); }
        }

        async function guardarNube() {
            const filas = document.querySelectorAll("#tabla-cuerpo tr");
            if(filas.length === 0) return alert("Tabla vacía");
            const payload = {
                fecha: document.getElementById('sel-fecha').value,
                tipo: document.getElementById('sel-tipo').value,
                rows: Array.from(filas).map(tr => ({
                    sitio: tr.cells[0].innerText, torrero: tr.cells[1].innerText,
                    asignado: tr.cells[2].querySelector('textarea').value, falla: tr.cells[3].innerText,
                    estado: tr.cells[4].querySelector('select').value, comentarios: tr.cells[5].querySelector('textarea').value
                }))
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Guardado OK");
            } catch(e) { alert("Error al guardar"); }
        }

        function exportarPNG() {
            html2canvas(document.getElementById('capture-area'), { scale: 3 }).then(c => {
                const a = document.createElement('a'); a.download = `Reporte_${Date.now()}.png`; a.href = c.toDataURL(); a.click();
            });
        }
    </script>
</body>
</html>
