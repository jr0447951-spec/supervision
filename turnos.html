<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE TURNOS V51 - GESTIÓN TOTAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --accent: #2563eb; --bg: #f8fafc; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        
        .sidebar { width: 340px; background: var(--sidebar); color: white; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .section-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .section-title { font-size: 0.7rem; color: #60a5fa; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }

        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px; overflow-y: auto; }
        .day { background: white; border-radius: 10px; border: 1px solid #e2e8f0; min-height: 140px; padding: 10px; }
        
        .group-tag { background: var(--accent); color: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; cursor: grab; font-size: 0.8rem; font-weight: bold; }
        .btn-action { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-motor { background: #10b981; color: white; }
        
        .alert-box { font-size: 0.75rem; padding: 10px; border-radius: 8px; background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid var(--danger); }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="margin-bottom:20px;">ADMIN V51</h2>

    <div class="section-box">
        <span class="section-title">Cuadrillas Activas</span>
        <div id="lista-cuadrillas">Cargando...</div>
        <button class="btn-action btn-motor" onclick="ejecutarMotor()"><i class="fas fa-robot"></i> REFRESCAR 6 MESES</button>
    </div>

    <div class="section-box">
        <span class="section-title">Alta de Técnico</span>
        <input type="text" id="add-nom" placeholder="Nombre" style="width:100%; margin-bottom:5px;">
        <input type="number" id="add-gru" placeholder="Grupo" style="width:100%;">
        <button class="btn-action" style="background:#475569; color:white;" onclick="accionPersonal('alta')">REGISTRAR</button>
    </div>

    <div class="section-box">
        <span class="section-title">Alertas de Reglas de Oro</span>
        <div id="panel-alertas">Sistema monitoreando...</div>
    </div>
</aside>

<main class="main">
    <div style="background:white; padding:15px; border-bottom:1px solid #ddd; display:flex; justify-content: space-between;">
        <button onclick="cambiarMes(-1)">Anterior</button>
        <h2 id="mesTitulo" style="margin:0">MARZO 2024</h2>
        <button onclick="cambiarMes(1)">Siguiente</button>
    </div>
    <div class="grid" id="calendar-grid"></div>
</main>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbw1YtfK0VoKq6Acnr6cB0mH--3i6i-Dbtk3omFwCxb8jRkKEBkASDvwnFKOlTmEuWCI/exec'; // <--- PEGA AQUÍ TU URL
    let dbTecnicos = [], dbProgramacion = [], dbAusencias = [];
    let fechaActual = new Date();

    async function sync() {
        try {
            const resT = await fetch(`${CLOUD_URL}?tabla=tecnicos`);
            dbTecnicos = await resT.json();
            
            const resP = await fetch(`${CLOUD_URL}?tabla=programacion`);
            dbProgramacion = await resP.json();

            renderSidebar();
            renderCalendario();
        } catch (e) { document.getElementById('panel-alertas').innerText = "Error de conexión"; }
    }

    function renderSidebar() {
        const cont = document.getElementById('lista-cuadrillas');
        cont.innerHTML = "";
        // Agrupar técnicos por grupo (Col B = índice 1)
        let grupos = {};
        dbTecnicos.slice(1).forEach(t => {
            if(!grupos[t[1]]) grupos[t[1]] = [];
            grupos[t[1]].push(t[0]);
        });

        Object.keys(grupos).forEach(g => {
            const t1 = grupos[g][0] || "Vacante";
            const t2 = grupos[g][1] || "Vacante";
            cont.innerHTML += `
                <div class="group-tag" draggable="true" ondragstart="event.dataTransfer.setData('t1','${t1}');event.dataTransfer.setData('t2','${t2}')">
                    GRUPO ${g}: ${t1.split(' ')[0]} & ${t2.split(' ')[0]}
                </div>`;
        });
    }

    function renderCalendario() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const y = fechaActual.getFullYear(), m = fechaActual.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES',{month:'long',year:'numeric'}).format(fechaActual).toUpperCase();

        for(let d=1; d<=31; d++) {
            const f = new Date(y, m, d);
            if(f.getMonth() !== m) continue;
            const fStr = f.toDateString();
            const turno = dbProgramacion.find(r => r[0] && new Date(r[0]).toDateString() === fStr);
            
            const celda = document.createElement('div');
            celda.className = 'day';
            celda.innerHTML = `<b>${d}</b>`;
            
            if(turno) {
                celda.innerHTML += `<div style="font-size:0.7rem; margin-top:5px; padding:5px; background:#f0f7ff; border-left:3px solid #2563eb;">
                    ${turno[1]}<br>${turno[2]}<br><small style="color:blue">${turno[5] || ''}</small>
                </div>`;
            }

            celda.ondragover = e => e.preventDefault();
            celda.ondrop = async e => {
                const p1 = e.dataTransfer.getData('t1');
                const p2 = e.dataTransfer.getData('t2');
                // Aquí se activa la REGLA DE ORO (Validación de ausencias próximamente)
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    body: JSON.stringify({accion:'guardar_manual', fecha: `${y}-${m+1}-${d}`, p1, p2, a1:'M', a2:'M'})
                });
                sync();
            };
            grid.appendChild(celda);
        }
    }

    async function ejecutarMotor() {
        if(!confirm("Refrescar 6 meses respetando manuales?")) return;
        await fetch(CLOUD_URL, {method:'POST', body: JSON.stringify({accion:'ejecutar_motor'})});
        sync();
    }

    async function accionPersonal(sub) {
        const nombre = document.getElementById('add-nom').value;
        const grupo = document.getElementById('add-gru').value;
        await fetch(CLOUD_URL, {method:'POST', body: JSON.stringify({accion:'gestion_personal', sub, nombre, grupo})});
        sync();
    }

    function cambiarMes(v) { fechaActual.setMonth(fechaActual.getMonth()+v); renderCalendario(); }
    sync();
</script>
</body>
</html>
