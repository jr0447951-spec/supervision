<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TURNOS - ADMIN v34</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 300px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .section-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px; overflow-y: auto; }
        .day { background: var(--card); border-radius: 12px; border: 2px solid #e2e8f0; padding: 10px; min-height: 150px; position: relative; }
        .day.weekend { background: #f8fafc; border-style: dashed; }
        .turno-card { padding: 5px 8px; border-radius: 6px; margin-bottom: 4px; font-size: 0.7rem; border-left: 4px solid #cbd5e1; background: white; }
        .principal { border-left-color: var(--accent); background: #f0f7ff; }
        .group-tag { background: var(--accent); color: white; padding: 8px; border-radius: 6px; margin-bottom: 5px; cursor: grab; font-size: 0.7rem; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 10px; }
        .btn-add { background: #10b981; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="font-size: 1.2rem;">ADMIN v34</h2>

    <div class="section-box">
        <span style="font-size: 0.7rem; color: #60a5fa; font-weight: bold;">PERSONAL (TABLA: tecnicos)</span>
        <ul id="lista-personal" style="list-style: none; padding: 0; font-size: 0.75rem; margin: 10px 0;"></ul>
        <div style="display:flex; gap:5px;">
            <input type="text" id="nuevo-tecnico" placeholder="Nombre..." style="margin:0;">
            <button class="btn-add" onclick="agregarTecnico()" style="width:40px;">+</button>
        </div>
    </div>

    <div class="section-box">
        <span style="font-size: 0.7rem; color: #60a5fa; font-weight: bold;">ARRASTRAR GRUPOS</span>
        <div id="drag-groups"></div>
    </div>

    <div class="section-box">
        <span style="font-size: 0.7rem; color: #60a5fa; font-weight: bold;">AUSENCIA</span>
        <select id="aus-tecnico"></select>
        <button class="btn-add" onclick="registrarAusencia()" style="background:var(--accent)">GUARDAR</button>
    </div>

    <div id="status" style="font-size:0.6rem; color:#94a3b8;">● Conectando...</div>
</aside>

<main class="main">
    <div style="background:white; padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd;">
        <button onclick="cambiarMes(-1)" style="border:none; background:none; cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
        <h2 id="mesTitulo" style="margin:0; font-size:1.1rem;"></h2>
        <button onclick="cambiarMes(1)" style="border:none; background:none; cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qscaisgcttsnoavgfctj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_IA9XB7EVhEMk2k6MbA4A4Q_M6og7SfO';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let tecnicos = [];
    let mesActual = new Date();
    let dbAusencias = [], dbManual = [];

    async function sync() {
        try {
            // 1. Cargar técnicos de tu tabla 'tecnicos'
            const { data: tData, error: tErr } = await supabase.from('tecnicos').select('nombre');
            if (tErr) throw tErr;
            tecnicos = tData.map(t => t.nombre);
            
            // 2. Cargar Ausencias y Manuales
            const { data: aus } = await supabase.from('ausencias').select('*');
            const { data: man } = await supabase.from('programacion_manual').select('*');
            
            dbAusencias = aus || [];
            dbManual = man || [];

            document.getElementById('status').innerText = "● Conectado a 'tecnicos', 'ausencias' y 'programacion_manual'";
            actualizarUI();
            render();
        } catch (e) {
            console.error("Error de sincronización:", e);
            document.getElementById('status').innerText = "● Error: Revisa nombres de tablas en Supabase";
        }
    }

    function actualizarUI() {
        // Lista Personal
        const lista = document.getElementById('lista-personal');
        lista.innerHTML = tecnicos.map(t => `
            <li style="display:flex; justify-content:space-between; background:#1e293b; padding:5px; border-radius:4px; margin-bottom:2px;">
                ${t} <i class="fas fa-times" style="color:#ef4444; cursor:pointer;" onclick="eliminarTecnico('${t}')"></i>
            </li>
        `).join('');

        // Select Ausencias
        document.getElementById('aus-tecnico').innerHTML = tecnicos.map(t => `<option value="${t}">${t}</option>`).join('');

        // Grupos Arrastrables
        const dGroups = document.getElementById('drag-groups');
        dGroups.innerHTML = "";
        for(let i=1; i<=4; i++) {
            const t1 = tecnicos[(i-1)*2] || "VACANTE";
            const t2 = tecnicos[(i-1)*2+1] || "VACANTE";
            dGroups.innerHTML += `<div class="group-tag" draggable="true" ondragstart="startDrag(event, '${t1}', '${t2}')">G${i}: ${t1.split(' ')[0]}/${t2.split(' ')[0]}</div>`;
        }
    }

    function startDrag(e, t1, t2) {
        e.dataTransfer.setData("t1", t1);
        e.dataTransfer.setData("t2", t2);
    }

    async function onDropGrupo(e, fechaId) {
        e.preventDefault();
        const t1 = e.dataTransfer.getData("t1");
        const t2 = e.dataTransfer.getData("t2");
        await supabase.from('programacion_manual').upsert({ fecha: fechaId, p1: t1, p2: t2, a1: "---", a2: "---" });
        sync();
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const y = mesActual.getFullYear(), m = mesActual.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(mesActual).toUpperCase();

        const total = new Date(y, m+1, 0).getDate();
        let start = new Date(y, m, 1).getDay();
        start = (start === 0) ? 6 : start - 1;

        for(let i=0; i<start; i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=total; d++) {
            const f = new Date(y, m, d);
            const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const man = dbManual.find(x => x.fecha === id);

            const celda = document.createElement('div');
            celda.className = `day ${f.getDay()===0||f.getDay()===6?'weekend':''}`;
            celda.ondragover = (e) => { e.preventDefault(); celda.style.borderColor = "#2563eb"; };
            celda.ondragleave = () => celda.style.borderColor = "#e2e8f0";
            celda.ondrop = (e) => onDropGrupo(e, id);

            celda.innerHTML = `<div style="font-weight:bold; color:#64748b;">${d}</div>`;
            if(man) {
                celda.innerHTML += `
                    <div class="turno-card principal"><b>${man.p1}</b><br><b>${man.p2}</b></div>
                    <div class="turno-card">${man.a1}<br>${man.a2}</div>
                `;
            }
            grid.appendChild(celda);
        }
    }

    async function agregarTecnico() {
        const n = document.getElementById('nuevo-tecnico').value.toUpperCase();
        if(n) { await supabase.from('tecnicos').insert([{ nombre: n }]); sync(); }
    }

    async function eliminarTecnico(nombre) {
        if(confirm(`¿Quitar a ${nombre}?`)) {
            await supabase.from('tecnicos').delete().eq('nombre', nombre);
            sync();
        }
    }

    function cambiarMes(v) { mesActual.setMonth(mesActual.getMonth()+v); render(); }
    
    // ARRANQUE
    sync();
</script>
</body>
</html>
