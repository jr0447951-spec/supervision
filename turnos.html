<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TURNOS - CLOUD v42</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #1e293b; --accent: #3b82f6; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        .sidebar { width: 280px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 15px; overflow-y: auto; }
        .day { background: white; border-radius: 8px; padding: 8px; min-height: 120px; border: 1px solid #e2e8f0; }
        .day.weekend { background: #f8fafc; border-style: dashed; }
        .turno-card { background: #eff6ff; border-left: 4px solid var(--accent); padding: 5px; margin-top: 5px; font-size: 0.7rem; border-radius: 4px; }
        .group-tag { background: var(--accent); padding: 10px; border-radius: 6px; margin-bottom: 8px; cursor: grab; font-weight: bold; font-size: 0.8rem; text-align: center; }
        #status { font-size: 0.7rem; margin-top: auto; color: #94a3b8; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3>SISTEMA CLOUD</h3>
    <div id="groups-container"> Cargando grupos... </div>
    <div id="status">● Sincronizando con Google...</div>
</aside>

<main class="main">
    <div style="background:white; padding:15px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between;">
        <button onclick="cambiarMes(-1)">◀</button>
        <h2 id="mesTitulo" style="margin:0; font-size:1.1rem;"></h2>
        <button onclick="cambiarMes(1)">▶</button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbxX6KxbNFAeIXb0rOg9IaCGS_BhTaISzl5LKrWiAnrvDTSiKW6BHFzjcQbAMG3ELLL3/exec'; // <--- PEGA AQUÍ TU URL
    let dbManual = [], tecnicos = [];
    let mesActual = new Date();

    async function fetchData() {
        try {
            // Leer técnicos
            const resT = await fetch(`${CLOUD_URL}?tabla=tecnicos`);
            const dataT = await resT.json();
            tecnicos = dataT.map(r => r[0]);

            // Leer programación
            const resP = await fetch(`${CLOUD_URL}?tabla=programacion`);
            const dataP = await resP.json();
            dbManual = dataP.slice(1).map(r => ({ fecha: r[0], p1: r[1], p2: r[2], a1: r[3], a2: r[4] }));

            render();
            updateSidebar();
            document.getElementById('status').innerText = "● ONLINE (Google Sheets)";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Error de conexión";
        }
    }

    function updateSidebar() {
        const container = document.getElementById('groups-container');
        container.innerHTML = "";
        for(let i=1; i<=4; i++) {
            const t1 = tecnicos[(i-1)*2] || "---";
            const t2 = tecnicos[(i-1)*2+1] || "---";
            container.innerHTML += `<div class="group-tag" draggable="true" ondragstart="event.dataTransfer.setData('t1','${t1}');event.dataTransfer.setData('t2','${t2}')">GRUPO ${i}: ${t1.split(' ')[0]}</div>`;
        }
    }

    async function onDropGrupo(e, fecha) {
        e.preventDefault();
        const payload = {
            tabla: 'programacion',
            fecha: fecha,
            p1: e.dataTransfer.getData('t1'),
            p2: e.dataTransfer.getData('t2'),
            a1: "---", a2: "---"
        };
        
        await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify(payload) });
        fetchData();
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const y = mesActual.getFullYear(), m = mesActual.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', {month:'long', year:'numeric'}).format(mesActual).toUpperCase();
        
        const total = new Date(y, m+1, 0).getDate();
        const start = (new Date(y, m, 1).getDay() + 6) % 7;

        for(let i=0; i<start; i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=total; d++) {
            const fechaId = `${y}-${m+1}-${d}`;
            const man = dbManual.find(x => x.fecha == fechaId);
            const celda = document.createElement('div');
            celda.className = 'day';
            celda.ondragover = (e) => e.preventDefault();
            celda.ondrop = (e) => onDropGrupo(e, fechaId);
            celda.innerHTML = `<b>${d}</b>`;
            if(man) celda.innerHTML += `<div class="turno-card"><b>${man.p1}</b><br><b>${man.p2}</b></div>`;
            grid.appendChild(celda);
        }
    }

    function cambiarMes(v) { mesActual.setMonth(mesActual.getMonth()+v); render(); }
    fetchData();
</script>
</body>
</html>
