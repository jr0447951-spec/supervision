<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Grupos Simultáneos | v5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --g12: #dbeafe; --g34: #fef3c7; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; color: #1e293b; }
        
        /* Lateral */
        .sidebar { width: 340px; background: var(--primary); color: white; padding: 25px; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.3); }
        .group-card { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--accent); }
        .group-card strong { display: block; margin-bottom: 5px; color: #60a5fa; }
        .group-card input { background: transparent; border: none; border-bottom: 1px solid #475569; color: white; width: 100%; font-size: 0.85rem; margin-bottom: 5px; outline: none; }
        
        /* Calendario */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day { background: white; min-height: 170px; border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; position: relative; }
        .day-header { text-align: center; font-weight: bold; padding: 10px; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; }
        .weekend-active { border: 2px solid var(--accent); }
        
        /* Turnos */
        .badge-1 { background: #2563eb; color: white; font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; font-weight: 800; margin-bottom: 4px; display: inline-block; }
        .badge-2 { background: #64748b; color: white; font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; display: inline-block; }
        .box-turno { margin-top: 8px; padding: 8px; border-radius: 6px; font-size: 0.8rem; line-height: 1.2; }
        .box-g12 { background: var(--g12); color: #1e40af; border: 1px solid #bfdbfe; }
        .box-g34 { background: var(--g34); color: #92400e; border: 1px solid #fde68a; }
        
        .names { display: block; font-size: 0.7rem; margin-top: 3px; font-weight: 500; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: auto; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2><i class="fas fa-users-cog"></i> EQUIPOS</h2>
    <div id="setup">
        <div class="group-card"><strong>GRUPO 1</strong><input id="g1t1" value="JUAN MEJIA"><input id="g1t2" value="VALENTIN BOLAÑOS"></div>
        <div class="group-card"><strong>GRUPO 2</strong><input id="g2t1" value="DOUGLAS VENTURA"><input id="g2t2" value="JOSE PALMA"></div>
        <div class="group-card"><strong>GRUPO 3</strong><input id="g3t1" value="DANIEL MELENDEZ"><input id="g3t2" value="MIGUEL OCHOA"></div>
        <div class="group-card"><strong>GRUPO 4</strong><input id="g4t1" value="EDGARDO SORIANO"><input id="g4t2" value="LUIS PALACIOS"></div>
    </div>
    <button class="btn-save" onclick="guardar()">💾 GUARDAR Y ACTUALIZAR</button>
</aside>

<main class="main">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1 style="margin:0">Planificación de Turnos Simultáneos</h1>
        <h3 id="mesActual" style="color:var(--accent)"></h3>
    </div>
    <div class="grid" id="calendar">
        <div class="day-header">Lun</div><div class="day-header">Mar</div><div class="day-header">Mie</div>
        <div class="day-header">Jue</div><div class="day-header">Vie</div><div class="day-header">Sab</div>
        <div class="day-header">Dom</div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('dash_simultaneo_v5')) || { manuales: {} };
    const hoy = new Date();

    function render() {
        const grid = document.getElementById('calendar');
        const headers = Array.from(grid.querySelectorAll('.day-header'));
        grid.innerHTML = "";
        headers.forEach(h => grid.appendChild(h));

        const mes = hoy.getMonth();
        const año = hoy.getFullYear();
        document.getElementById('mesActual').innerText = new Intl.DateTimeFormat('es-ES', {month:'long', year:'numeric'}).format(hoy);

        const diasMes = new Date(año, mes+1, 0).getDate();
        const primerDia = new Date(año, mes, 1).getDay();
        const offset = (primerDia === 0) ? 6 : primerDia - 1;

        // FECHA BASE: Sábado 7 de Marzo 2026 -> Empiezan G1 y G2
        const fechaBase = new Date(2026, 2, 7);

        for(let i=0; i<offset; i++) grid.innerHTML += `<div class="day" style="opacity:0.2; border:none;"></div>`;

        for(let d=1; d<=diasMes; d++) {
            const f = new Date(año, mes, d);
            const id = `${año}-${mes+1}-${d}`;
            const diaSemana = f.getDay(); // 6=Sab, 0=Dom
            let contenido = "";

            if(diaSemana === 6 || diaSemana === 0) {
                const diffDays = Math.floor((f - fechaBase) / (1000*60*60*24));
                const numSemana = Math.floor(diffDays / 7);
                
                let p1, p2, estilo;
                
                // ROTACIÓN SEMANAL G1+G2 vs G3+G4
                if(Math.abs(numSemana) % 2 === 0) {
                    // SEMANA G1 Y G2
                    estilo = "box-g12";
                    p1 = (diaSemana === 6) ? 1 : 2; // Sab: G1 es 1ra opc, Dom: G2 es 1ra opc
                    p2 = (diaSemana === 6) ? 2 : 1;
                } else {
                    // SEMANA G3 Y G4
                    estilo = "box-g34";
                    p1 = (diaSemana === 6) ? 3 : 4; // Sab: G3 es 1ra opc, Dom: G4 es 1ra opc
                    p2 = (diaSemana === 6) ? 4 : 3;
                }

                const n1 = `${document.getElementById('g'+p1+'t1').value} / ${document.getElementById('g'+p1+'t2').value}`;
                const n2 = `${document.getElementById('g'+p2+'t1').value} / ${document.getElementById('g'+p2+'t2').value}`;

                contenido = `
                    <div class="box-turno ${estilo}">
                        <span class="badge-1">1° OPCIÓN: GRUPO ${p1}</span>
                        <span class="names">${n1}</span>
                        <div style="margin-top:8px"></div>
                        <span class="badge-2">APOYO: GRUPO ${p2}</span>
                        <span class="names">${n2}</span>
                    </div>`;
            }

            grid.innerHTML += `<div class="day ${diaSemana===6||diaSemana===0?'weekend-active':''}">
                <strong style="color:#94a3b8">${d}</strong>${contenido}
            </div>`;
        }
    }

    function guardar() {
        localStorage.setItem('dash_simultaneo_v5', JSON.stringify(db));
        render(); // Refresca para aplicar cambios de nombres
        alert("Configuración guardada.");
    }

    window.onload = render;
</script>
</body>
</html>
