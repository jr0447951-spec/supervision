<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC COMMAND CENTER V20.0 - FULL SYSTEM</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00a1ff;
            --report-blue: #4472c4;
            --report-light: #d9e1f2;
            --dark-bg: #001a33;
            --card-bg: #003366;
            --border-ui: #0059b3;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: #e6f2ff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- INTERFAZ DE USUARIO (PANEL DE CONTROL) --- */
        header {
            width: 100%;
            background: #0f172a;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        header h1 {
            font-family: 'Orbitron';
            margin: 0;
            font-size: 1.3rem;
            color: var(--primary);
            letter-spacing: 3px;
        }

        .config-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 950px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            margin-top: 30px;
            border: 1px solid var(--border-ui);
        }

        .query-panel {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            margin-bottom: 30px;
        }

        h3 {
            margin: 25px 0 10px 0;
            color: #00d4ff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--border-ui);
            background: var(--dark-bg);
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 161, 255, 0.3); }

        /* SELECTOR DE TÉCNICOS (CHECKLIST PRO) */
        .tech-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            background: var(--dark-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-ui);
            max-height: 200px;
            overflow-y: auto;
            margin: 10px 0;
        }

        .tech-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            gap: 10px;
            cursor: pointer;
            color: #b3e6ff;
            padding: 5px;
        }

        .tech-item input { width: auto; margin: 0; transform: scale(1.3); accent-color: var(--primary); }

        /* BUSCADOR */
        .search-container { position: relative; }
        #suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 0 0 12px 12px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 3000;
            display: none;
        }

        .sug-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sug-item:hover { background: var(--primary); color: var(--dark-bg); font-weight: 800; }

        /* --- ÁREA DE CAPTURA (PNG HD BLANCO) --- */
        #capture-area {
            background: #ffffff !important;
            padding: 50px;
            width: 1280px;
            box-sizing: border-box;
            display: block;
            margin-top: 40px;
        }

        .report-header-blue {
            background: var(--report-blue) !important;
            color: white !important;
            text-align: center;
            padding: 15px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border: 2.5px solid #000;
            background: white !important;
        }

        .excel-table th {
            background: var(--report-blue) !important;
            color: #ffffff !important;
            padding: 14px;
            font-size: 13px;
            border: 1px solid #000;
            text-transform: uppercase;
        }

        .excel-table td {
            border: 1px solid #000;
            color: #000 !important;
            font-size: 12.5px;
            text-align: center;
            vertical-align: middle;
            padding: 0;
            background: white !important;
            height: 75px;
        }

        /* --- LÓGICA DE AGRUPACIÓN DINÁMICA --- */
        .grouped-hidden {
            color: transparent !important;
            border-top: 1px solid transparent !important;
        }

        /* --- EDICIÓN EN TABLA --- */
        .table-input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-family: 'Inter';
            font-size: 12.5px;
            color: black;
            outline: none;
            padding: 8px;
        }

        .table-multi-tech {
            background: #f0f7ff;
            border: 1px solid #cce6ff;
            border-radius: 6px;
            padding: 8px;
            max-height: 85px;
            overflow-y: auto;
            text-align: left;
        }

        .export-text {
            display: none;
            padding: 10px;
            font-weight: 800;
            word-wrap: break-word;
            line-height: 1.4;
        }

        /* ESTADOS DE EXPORTACIÓN */
        #capture-area.is-exporting .table-input,
        #capture-area.is-exporting .table-multi-tech,
        #capture-area.is-exporting .no-capture {
            display: none !important;
        }

        #capture-area.is-exporting .export-text {
            display: block !important;
        }

        /* BOTONES DE ACCIÓN */
        .btn-add {
            background: linear-gradient(90deg, #00d4ff, #0077ff);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 20px;
            font-family: 'Orbitron';
        }

        .footer-actions {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            width: 95%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .btn-action {
            flex: 1;
            padding: 22px;
            border-radius: 60px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1rem;
            font-family: 'Orbitron';
            transition: 0.3s;
        }

        .btn-png { background: white; color: var(--report-blue); border: 3px solid var(--report-blue); }
        .btn-xlsx { background: #1d6f42; color: white; }
        .btn-cloud { background: #f39c12; color: white; }

        .btn-action:hover { transform: translateY(-5px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <header>
        <h1>NOC MASTER COMMAND V20.0</h1>
    </header>

    <div class="config-card">
        <div class="query-panel">
            <h3 style="margin-top:0;">🔍 CONSULTAR HISTORIAL EN NUBE</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end;">
                <div>
                    <label style="font-size: 0.75rem; color: #b3e6ff; font-weight: 800;">FECHA:</label>
                    <input type="date" id="cloud-fecha">
                </div>
                <div>
                    <label style="font-size: 0.75rem; color: #b3e6ff; font-weight: 800;">TIPO:</label>
                    <select id="cloud-tipo">
                        <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
                        <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
                    </select>
                </div>
                <button onclick="consultarNube()" class="btn-add" style="margin:0; padding: 0 30px; height: 55px; width: auto; font-size: 0.8rem;">BUSCAR</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-ui); margin: 30px 0;">

        <h3>1. Encabezado de Reporte</h3>
        <select id="sel-tipo" onchange="syncUI()">
            <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
            <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
            <option value="CORTE PROGRAMADO">CORTE PROGRAMADO</option>
        </select>
        <input type="date" id="sel-fecha" onchange="syncUI()">

        <h3>2. Búsqueda y Selección de Sitio</h3>
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Escriba SITEID, Nombre o NIC..." autocomplete="off">
            <div id="suggestions"></div>
        </div>

        <div id="site-form" style="display:none; margin-top:20px; padding:25px; background:rgba(0, 212, 255, 0.05); border-radius:15px; border: 1px solid var(--primary);">
            <p style="font-size: 1rem; color: var(--primary); margin: 0 0 15px 0;">
                📍 <b>NODO:</b> <span id="val-site" style="color:white;"></span><br>
                🏢 <b>TORRERO:</b> <span id="val-torrero" style="color:white;"></span>
            </p>

            <h3>Personal Técnico Asignado:</h3>
            <div id="tech-checklist" class="tech-selector"></div>

            <button class="btn-add" onclick="insertRow()">AÑADIR AL REPORTE MAESTRO</button>
        </div>
    </div>

    <div id="capture-area">
        <div class="report-header-blue">
            <span id="txt-h-titulo">VISITAS REALIZADAS</span> - <span id="txt-h-fecha"></span>
        </div>
        <table class="excel-table">
            <thead>
                <tr>
                    <th style="width:11%">Distribuidora</th>
                    <th style="width:12%">Horario</th>
                    <th style="width:23%">Nodo / Sitio</th>
                    <th style="width:10%">Torrero</th>
                    <th style="width:18%">Comentario</th>
                    <th style="width:9%">NIC</th>
                    <th style="width:17%">Personal Técnico</th>
                    <th class="no-capture" style="width:40px; background:white !important;"></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="footer-actions">
        <button class="btn-action btn-png" onclick="downloadPNG()">💾 DESCARGAR PNG HD</button>
        <button class="btn-action btn-xlsx" onclick="downloadExcel()">📊 EXPORTAR EXCEL</button>
        <button class="btn-action btn-cloud" onclick="guardarNube()">☁️ GUARDAR EN NUBE</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi04YsTUdOZnObRzT7-oETBJUovK1qMW1x5hUftlsOzwV-In-7-kmC-JTd2u2BafEp_g/exec";
        const SITIOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv';
        const TECNICOS_CSV = 'tecnicos.csv';

        let dbSitios = [];
        let dbTecnicos = [];
        let siteActive = null;
        let reportData = [];

        window.onload = () => {
            const hoy = new Date();
            document.getElementById('sel-fecha').value = hoy.toISOString().split('T')[0];
            syncUI();

            // Cargar Sitios
            Papa.parse(SITIOS_CSV, {
                download: true, header: true,
                complete: (r) => {
                    dbSitios = r.data.filter(x => x.SITEID).map(x => ({
                        id: x.SITEID,
                        nombre: x['NOMBRE DE SITIO'],
                        full: `${x.SITEID} - ${x['NOMBRE DE SITIO']}`,
                        torrero: x.Propietario,
                        distribuidora: x.Distribuidora,
                        nic: x['NIC/NIS']
                    }));
                }
            });

            // Cargar Técnicos
            Papa.parse(TECNICOS_CSV, {
                download: true, header: true,
                complete: (r) => {
                    dbTecnicos = r.data.filter(t => t.Nombre).map(t => t.Nombre);
                    const list = document.getElementById('tech-checklist');
                    dbTecnicos.forEach(nom => {
                        list.innerHTML += `<label class="tech-item"><input type="checkbox" value="${nom}"> ${nom}</label>`;
                    });
                }
            });
        };

        function syncUI() {
            const f = document.getElementById('sel-fecha').value.split('-');
            document.getElementById('txt-h-fecha').innerText = `${f[2]}/${f[1]}/${f[0]}`;
            document.getElementById('txt-h-titulo').innerText = document.getElementById('sel-tipo').value;
        }

        // BUSCADOR
        document.getElementById('main-search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            if(val.length < 2) { sug.style.display = 'none'; return; }

            const matches = dbSitios.filter(s => s.full.toLowerCase().includes(val) || s.nic.toLowerCase().includes(val)).slice(0, 10);
            if(matches.length > 0) {
                sug.style.display = 'block';
                matches.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'sug-item';
                    div.innerText = m.full.toUpperCase();
                    div.onclick = () => {
                        siteActive = m;
                        document.getElementById('main-search').value = m.full;
                        document.getElementById('val-site').innerText = m.full;
                        document.getElementById('val-torrero').innerText = m.torrero || 'N/A';
                        document.getElementById('site-form').style.display = 'block';
                        sug.style.display = 'none';
                    };
                    sug.appendChild(div);
                });
            }
        });

        // INSERTAR FILA
        function insertRow() {
            if(!siteActive) return;
            const techsArr = Array.from(document.querySelectorAll('#tech-checklist input:checked')).map(i => i.value);
            
            reportData.push({
                ...siteActive,
                horario: '',
                comentario: '',
                personal: techsArr
            });

            // ORDENAR POR DISTRIBUIDORA PARA AGRUPAR
            reportData.sort((a, b) => a.distribuidora.localeCompare(b.distribuidora));
            
            renderMasterTable();

            // Limpiar
            document.getElementById('site-form').style.display = 'none';
            document.getElementById('main-search').value = '';
            document.querySelectorAll('#tech-checklist input').forEach(i => i.checked = false);
            siteActive = null;
        }

        function renderMasterTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            reportData.forEach((row, i) => {
                const tr = document.createElement('tr');
                
                // --- Lógica de Agrupación Estricta ---
                const isGrouped = i > 0 && reportData[i-1].distribuidora === row.distribuidora;
                const distClass = isGrouped ? 'grouped-hidden' : '';

                // --- Checklist de Técnicos en Tabla ---
                let techChecks = dbTecnicos.map(nom => {
                    const chk = row.personal.includes(nom) ? 'checked' : '';
                    return `<label class="tech-item" style="color:black; font-size:10px;"><input type="checkbox" value="${nom}" ${chk} onchange="updateTech(${i}, '${nom}')"> ${nom}</label>`;
                }).join('');

                tr.innerHTML = `
                    <td class="${distClass}">
                        <input class="table-input" value="${row.distribuidora}" oninput="reportData[${i}].distribuidora=this.value; renderMasterTable();">
                        <div class="export-text">${row.distribuidora}</div>
                    </td>
                    <td>
                        <input class="table-input" placeholder="00:00 - 00:00" oninput="reportData[${i}].horario=this.value">
                        <div class="export-text"></div>
                    </td>
                    <td style="color:#4472c4; font-weight:900; padding:8px;">${row.full}</td>
                    <td>${row.torrero}</td>
                    <td>
                        <textarea class="table-input" style="text-align:left;" oninput="reportData[${i}].comentario=this.value"></textarea>
                        <div class="export-text"></div>
                    </td>
                    <td style="color:#4472c4; font-weight:900; background:var(--report-light) !important;">${row.nic}</td>
                    <td>
                        <div class="table-multi-tech no-capture">${techChecks}</div>
                        <div class="export-text">${row.personal.join(' / ')}</div>
                    </td>
                    <td class="no-capture" style="text-align:center;">
                        <button onclick="reportData.splice(${i},1); renderMasterTable();" style="color:red; border:none; background:none; cursor:pointer; font-size:2rem;">×</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateTech(idx, name) {
            const arr = reportData[idx].personal;
            if(arr.includes(name)) reportData[idx].personal = arr.filter(n => n !== name);
            else arr.push(name);
            // No renderizar de nuevo para no perder el foco, solo actualizar el export-text interno
            const row = document.querySelectorAll('#table-body tr')[idx];
            row.querySelector('td:nth-child(7) .export-text').innerText = reportData[idx].personal.join(' / ');
        }

        // EXPORTACIÓN PNG HD
        async function downloadPNG() {
            const area = document.getElementById('capture-area');
            const btn = document.querySelector('.btn-png');
            btn.innerText = "⏳ GENERANDO...";

            // Sincronizar inputs
            area.querySelectorAll('tr').forEach((tr, i) => {
                tr.querySelector('td:nth-child(2) .export-text').innerText = reportData[i].horario;
                tr.querySelector('td:nth-child(5) .export-text').innerText = reportData[i].comentario;
                tr.querySelector('td:nth-child(7) .export-text').innerText = reportData[i].personal.join(' / ');
            });

            area.classList.add('is-exporting');

            try {
                const canvas = await html2canvas(area, {
                    scale: 3,
                    backgroundColor: "#ffffff",
                    useCORS: true
                });
                const link = document.createElement('a');
                link.download = `REPORTE_NOC_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } finally {
                area.classList.remove('is-exporting');
                btn.innerText = "💾 DESCARGAR PNG HD";
            }
        }

        // EXCEL
        function downloadExcel() {
            const data = reportData.map(r => ({
                "Distribuidora": r.distribuidora,
                "Horario": r.horario,
                "Nodo / Sitio": r.full,
                "Torrero": r.torrero,
                "Comentario": r.comentario,
                "NIC": r.nic,
                "Personal Técnico": r.personal.join(' / ')
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Reporte");
            XLSX.writeFile(wb, `Reporte_NOC_${Date.now()}.xlsx`);
        }

        // NUBE
        async function guardarNube() {
            if(reportData.length === 0) return alert("Tabla vacía.");
            const btn = document.querySelector('.btn-cloud');
            btn.innerText = "⏳...";
            const payload = {
                fecha: document.getElementById('sel-fecha').value,
                tipo: document.getElementById('sel-tipo').value,
                rows: reportData.map(r => ({ ...r, personal: r.personal.join(' / ') }))
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ Guardado en nube.");
            } catch(e) { alert("Error al guardar."); }
            btn.innerText = "☁️ GUARDAR EN NUBE";
        }
    </script>
</body>
</html>
