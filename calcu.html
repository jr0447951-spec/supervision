<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Tiempo y Jornadas</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="time"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .result-box {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background-color: #f1f5f9;
            border-radius: 6px;
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .result-item.total {
            border-top: 2px solid #cbd5e1;
            padding-top: 0.5rem;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 0;
        }

        .note {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Horas</h2>
    
    <div class="input-group">
        <label for="hora-inicio">Hora de Inicio:</label>
        <input type="time" id="hora-inicio" step="3600" required>
    </div>

    <div class="input-group">
        <label for="hora-fin">Hora de Fin:</label>
        <input type="time" id="hora-fin" step="3600" required>
    </div>

    <button onclick="calcularJornadas()">Calcular Tiempo</button>

    <div id="resultado-box" class="result-box">
        <div class="result-item">
            <span>Horas Diurnas (6 AM - 7 PM):</span>
            <span id="res-diurnas">0h 0m</span>
        </div>
        <div class="result-item">
            <span>Horas Nocturnas (7 PM - 6 AM):</span>
            <span id="res-nocturnas">0h 0m</span>
        </div>
        <div class="result-item total">
            <span>Tiempo Total:</span>
            <span id="res-total">0h 0m</span>
        </div>
    </div>
    
    <p class="note">Nota: Los selectores se moverán en horas enteras por defecto, pero puedes escribir los minutos manualmente si lo necesitas.</p>
</div>

<script>
    // Pequeño script para forzar que al seleccionar/cambiar la hora se limpie a minutos en 00 si el usuario no escribe algo específico
    document.querySelectorAll('input[type="time"]').forEach(input => {
        input.addEventListener('blur', function() {
            if (this.value) {
                let partes = this.value.split(':');
                // Si por alguna razón no tiene minutos asignados o se borraron, asegura el formato HH:00
                if (partes.length === 2 && partes[1] === '') {
                    this.value = partes[0] + ':00';
                }
            }
        });
    });

    function calcularJornadas() {
        const horaInicioStr = document.getElementById('hora-inicio').value;
        const horaFinStr = document.getElementById('hora-fin').value;
        const resultadoBox = document.getElementById('resultado-box');

        if (!horaInicioStr || !horaFinStr) {
            alert("Por favor, ingresa ambas horas.");
            return;
        }

        const fechaBase = "2026-01-01T";
        let fechaInicio = new Date(fechaBase + horaInicioStr);
        let fechaFin = new Date(fechaBase + horaFinStr);

        if (fechaFin <= fechaInicio) {
            fechaFin.setDate(fechaFin.getDate() + 1);
        }

        let minutosDiurnos = 0;
        let minutosNocturnos = 0;
        let tiempoActual = new Date(fechaInicio.getTime());

        while (tiempoActual < fechaFin) {
            let hora = tiempoActual.getHours();

            if (hora >= 6 && hora < 19) {
                minutosDiurnos++;
            } else {
                minutosNocturnos++;
            }

            tiempoActual.setMinutes(tiempoActual.getMinutes() + 1);
        }

        const formatTiempo = (totMinutos) => {
            let h = Math.floor(totMinutos / 60);
            let m = totMinutos % 60;
            return `${h}h ${m}m`;
        };

        let totalMinutos = minutosDiurnos + minutosNocturnos;

        document.getElementById('res-diurnas').innerText = formatTiempo(minutosDiurnos);
        document.getElementById('res-nocturnas').innerText = formatTiempo(minutosNocturnos);
        document.getElementById('res-total').innerText = formatTiempo(totalMinutos);

        resultadoBox.style.display = "block";
    }
</script>

</body>
</html>
