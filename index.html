<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE REPORTE TÉCNICO PROFESIONAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004488; --accent: #00d4ff; --bg: #001a33; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* PANEL DE CONTROL */
        .config-card { background: #003366; width: 100%; max-width: 1000px; padding: 25px; border-radius: 15px; border: 1px solid #0059b3; box-sizing: border-box; margin-bottom: 30px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #0059b3; background: #001a33; color: white; box-sizing: border-box; font-size: 0.9rem; }
        
        .tech-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; background: #001a33; padding: 15px; border-radius: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #0059b3; margin: 10px 0; }
        .tech-item { font-size: 0.8rem; display: flex; align-items: center; gap: 8px; color: #b3e6ff; cursor: pointer; }

        /* AREA DE CAPTURA - DISEÑO FLEXIBLE */
        #capture-area { 
            background: #ffffff; 
            color: #002244; 
            padding: 40px; 
            width: 1100px; 
            box-sizing: border-box; 
            display: inline-block; 
            min-height: auto;
        }
        
        .excel-table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: auto; /* Permite que las columnas se ajusten al contenido */
            border: 2px solid var(--primary); 
        }
        
        .excel-table th { background: var(--primary); color: white; padding: 12px; font-size: 0.75rem; border: 1px solid #003366; text-transform: uppercase; }
        
        .excel-table td { 
            border: 1px solid #b3d9ff; 
            padding: 0; 
            font-size: 0.8rem; 
            vertical-align: top; 
            word-break: break-word; /* Rompe palabras largas si es necesario */
        }

        .cell-content { 
            padding: 10px; 
            width: 100%; 
            box-sizing: border-box; 
            min-height: 40px; 
            outline: none; 
            display: block; 
            line-height: 1.4;
            white-space: pre-wrap; /* Mantiene saltos de línea y ajusta el texto */
        }

        /* ANCHOS DE COLUMNA SUGERIDOS */
        .col-sitio { width: 200px; }
        .col-torrero { width: 100px; }
        .col-tech { width: 150px; }
        .col-falla { width: 120px; }
        .col-estado { width: 150px; }
        .col-comentario { width: auto; } /* El comentario crece libremente */

        .btn-action { padding: 15px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-add { background: linear-gradient(90deg, var(--accent), #0077ff); color: white; width: 100%; margin-top: 15px; font-size: 1rem; }
        .no-capture { text-align: center; vertical-align: middle !important; }
        .btn-remove { color: #ff3333; font-size: 1.5rem; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="config-card">
        <h3>1. Configuración General</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <select id="sel-tipo" onchange="updateHeader()">
                <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
                <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
            </select>
            <input type="date" id="sel-fecha" onchange="updateHeader()">
        </div>

        <h3>2. Detalles del Sitio</h3>
        <div class="search-container">
            <input type="text" id="site-search" placeholder="Escribe SITEID o Nombre del Sitio..." autocomplete="off">
            <div id="suggestions" style="position:relative;"></div>
        </div>

        <div id="form-site" style="display:none; margin-top:20px;">
            <p>Torrero Actual: <strong id="label-torrero" style="color:var(--accent);"></strong></p>
            <label>Seleccionar Técnicos (Cargados desde tecnicos.csv):</label>
            <div id="tech-list" class="tech-selector"></div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <select id="sel-falla">
                    <option>FDS</option><option>LTE FDS</option><option>PARCIAL</option>
                    <option>FALLA DE AC</option><option>VISITA TÉCNICA</option><option>INTERMITENCIA</option>
                </select>
                <select id="sel-estado-fila">
                    <option value="OPERATIVO">OPERATIVO</option><option value="ASIGNADO">ASIGNADO</option>
                    <option value="EN RUTA">EN RUTA</option><option value="EN SITIO">EN SITIO</option>
                    <option value="PDR">PDR</option><option value="PENDIENTE">PENDIENTE</option>
                </select>
            </div>
            <textarea id="txt-comentario" rows="3" placeholder="Escribe aquí los comentarios..."></textarea>
            <button class="btn-action btn-add" onclick="addRow()">AÑADIR A LA TABLA</button>
        </div>
    </div>

    <div id="capture-area">
        <div class="report-header" style="border-bottom: 4px solid var(--primary); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px;">
            <div>
                <h1 id="h-titulo" style="margin:0; color:var(--primary);">VISITAS REALIZADAS</h1>
                <small style="color: #0077ff; font-weight: bold;">Zonas Paracentrales - Gestión Técnica</small>
            </div>
            <div id="h-fecha-display" style="font-weight: 800; font-size: 1.3rem; color: var(--primary);"></div>
        </div>

        <table class="excel-table">
            <thead>
                <tr>
                    <th class="col-sitio">Sitio / Nodo</th>
                    <th class="col-torrero">Torrero</th>
                    <th class="col-tech">Asignado</th>
                    <th class="col-falla">Falla</th>
                    <th class="col-estado">Estado</th>
                    <th class="col-comentario">Comentarios</th>
                    <th class="no-capture" style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div style="display:flex; gap:15px; margin-top:30px; width:100%; max-width:1000px; padding-bottom:50px;">
        <button class="btn-action" style="background:white; color:var(--primary); border:2px solid var(--primary); flex:1;" onclick="downloadImg()">💾 DESCARGAR PNG</button>
    </div>

    <script>
        const SITIOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv';
        const TECNICOS_CSV = 'tecnicos.csv'; // Archivo local en el mismo hub
        
        let dbSitios = [], siteSelected = null;

        window.onload = () => {
            document.getElementById('sel-fecha').value = new Date().toISOString().split('T')[0];
            updateHeader();

            // Cargar Sitios
            Papa.parse(SITIOS_CSV, {
                download: true, header: true,
                complete: (r) => { 
                    dbSitios = r.data.map(row => ({ 
                        full: `${row.SITEID} - ${row['NOMBRE DE SITIO']}`, 
                        torrero: row.Propietario 
                    })).filter(x => x.full.length > 5); 
                }
            });

            // Cargar Técnicos desde CSV local
            Papa.parse(TECNICOS_CSV, {
                download: true,
                header: true,
                complete: (r) => {
                    const list = document.getElementById('tech-list');
                    r.data.forEach(row => {
                        const nombre = row.Nombre || row.nombre || row.TECNICO || Object.values(row)[0];
                        if(nombre) {
                            const l = document.createElement('label');
                            l.className = 'tech-item';
                            l.innerHTML = `<input type="checkbox" value="${nombre}"> ${nombre}`;
                            list.appendChild(l);
                        }
                    });
                },
                error: (err) => console.error("Asegúrate de que tecnicos.csv existe en la carpeta", err)
            });
        };

        function updateHeader() {
            document.getElementById('h-titulo').innerText = document.getElementById('sel-tipo').value;
            const f = document.getElementById('sel-fecha').value.split('-');
            if(f.length > 1) document.getElementById('h-fecha-display').innerText = `${f[2]}/${f[1]}/${f[0]}`;
        }

        // Lógica de búsqueda (idéntica a la anterior)
        document.getElementById('site-search').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase().trim();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            if(v.length < 2) return;
            const matches = dbSitios.filter(s => s.full.toLowerCase().includes(v)).slice(0,6);
            matches.forEach(m => {
                const d = document.createElement('div');
                d.style = "padding:10px; cursor:pointer; background:#004488; border-bottom:1px solid #00d4ff;";
                d.innerText = m.full.toUpperCase();
                d.onclick = () => {
                    siteSelected = m;
                    document.getElementById('site-search').value = m.full.toUpperCase();
                    document.getElementById('label-torrero').innerText = m.torrero;
                    document.getElementById('form-site').style.display = 'block';
                    sug.innerHTML = '';
                };
                sug.appendChild(d);
            });
        });

        function addRow() {
            if(!siteSelected) return;
            const techs = Array.from(document.querySelectorAll('#tech-list input:checked')).map(i => i.value).join(' / ');
            const comment = document.getElementById('txt-comentario').value;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><div contenteditable="true" class="cell-content" style="font-weight:bold; color:var(--primary);">${siteSelected.full.toUpperCase()}</div></td>
                <td><div class="cell-content" style="color:#666;">${siteSelected.torrero}</div></td>
                <td><div contenteditable="true" class="cell-content">${techs || 'SIN ASIGNAR'}</div></td>
                <td><div class="cell-content">${document.getElementById('sel-falla').value}</div></td>
                <td><div class="cell-content" style="font-weight:bold;">${document.getElementById('sel-estado-fila').value}</div></td>
                <td><div contenteditable="true" class="cell-content">${comment}</div></td>
                <td class="no-capture"><button class="btn-remove" onclick="this.closest('tr').remove()">×</button></td>
            `;
            document.getElementById('table-body').appendChild(tr);
            document.getElementById('form-site').style.display = 'none';
            document.getElementById('site-search').value = '';
            document.getElementById('txt-comentario').value = '';
            document.querySelectorAll('#tech-list input').forEach(i => i.checked = false);
        }

        function downloadImg() {
            const nc = document.querySelectorAll('.no-capture');
            nc.forEach(el => el.style.display = 'none');
            html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
                const a = document.createElement('a');
                a.download = `Reporte_${Date.now()}.png`;
                a.href = canvas.toDataURL();
                a.click();
                nc.forEach(el => el.style.display = 'table-cell');
            });
        }
    </script>
</body>
</html>
