<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - Control de Turnos v14</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #1e293b; --accent: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--sidebar); padding: 20px; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .tech-list { font-size: 0.8rem; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        
        /* CALENDARIO */
        .main { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex-grow: 1; overflow-y: auto; }
        
        .day { background: var(--card); border-radius: 8px; border: 1px solid #334155; padding: 10px; min-height: 140px; position: relative; transition: 0.3s; }
        .day.weekend { background: #1e293b; border-color: #475569; }
        .day.is-locked { opacity: 0.8; border-style: dashed; }
        
        /* CONTROLES DE CELDA */
        .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cell-lock { cursor: pointer; font-size: 0.8rem; color: #94a3b8; padding: 4px; }
        .cell-lock.locked { color: #f87171; }
        .cell-lock.unlocked { color: #4ade80; }

        /* TARJETAS */
        .turno-card { padding: 6px; border-radius: 4px; margin-bottom: 4px; font-size: 0.75rem; border-left: 4px solid #64748b; background: #0f172a; }
        .principal { border-left-color: var(--accent); }
        .names { font-weight: bold; display: block; }
        .role { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; }

        /* MODAL */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background: var(--sidebar); padding: 25px; border-radius: 12px; width: 400px; border: 1px solid var(--accent); }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 4px; }
        
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
        .btn-save { background: var(--accent); color: white; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>ADMINISTRACIÓN</h2>
    <div class="tech-list">
        <strong>TÉCNICOS BASE:</strong><br>
        G1: Juan / Valentin<br>
        G2: Douglas / Jose<br>
        G3: Daniel / Miguel<br>
        G4: Edgardo / Luis
    </div>

    <div style="margin-top:20px;">
        <label>Registrar Ausencia:</label>
        <input type="number" id="ausDay" placeholder="Día" style="width:100%; margin: 5px 0; background:#0f172a; border:1px solid #334155; color:white; padding:5px;">
        <select id="ausTech" style="width:100%; padding:5px; background:#0f172a; color:white;">
            <option value="JUAN MEJIA">JUAN MEJIA</option>
            <option value="VALENTIN BOLAÑOS">VALENTIN BOLAÑOS</option>
            <option value="DOUGLAS VENTURA">DOUGLAS VENTURA</option>
            <option value="JOSE PALMA">JOSE PALMA</option>
            <option value="DANIEL MELENDEZ">DANIEL MELENDEZ</option>
            <option value="MIGUEL OCHOA">MIGUEL OCHOA</option>
            <option value="EDGARDO SORIANO">EDGARDO SORIANO</option>
            <option value="LUIS PALACIOS">LUIS PALACIOS</option>
        </select>
        <button class="btn btn-save" style="width:100%; margin-top:10px;" onclick="addAusencia()">Cargar Falta</button>
    </div>
    
    <div id="listaAus" style="font-size:0.7rem; margin-top:20px; color:#f87171;"></div>
    <button class="btn btn-save" style="margin-top:auto" onclick="exportData()">💾 GUARDAR TODO</button>
</aside>

<main class="main">
    <div class="nav-bar">
        <button class="btn" onclick="changeMonth(-1)"> < </button>
        <h2 id="mesTitulo">MARZO 2026</h2>
        <button class="btn" onclick="changeMonth(1)"> > </button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<div id="modal">
    <div class="modal-content">
        <h3>Editar Día <span id="mFecha"></span></h3>
        <input type="hidden" id="mId">
        <label>Principal:</label>
        <input type="text" id="mP1">
        <label>Apoyo:</label>
        <input type="text" id="mP2">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-save" onclick="saveDayEdit()">Aplicar Cambio</button>
            <button class="btn" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    let currentMonth = new Date();
    // Cargamos BD o inicializamos
    let db = JSON.parse(localStorage.getItem('sistema_turnos_pro')) || { 
        manual: {}, 
        locks: {}, 
        ausencias: [] 
    };

    const tecnicosBase = {
        1: "JUAN MEJIA / VALENTIN BOLAÑOS",
        2: "DOUGLAS VENTURA / JOSE PALMA",
        3: "DANIEL MELENDEZ / MIGUEL OCHOA",
        4: "EDGARDO SORIANO / LUIS PALACIOS"
    };

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const y = currentMonth.getFullYear();
        const m = currentMonth.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentMonth).toUpperCase();

        const totalDays = new Date(y, m + 1, 0).getDate();
        const startOffset = (new Date(y, m, 1).getDay() === 0) ? 6 : new Date(y, m, 1).getDay() - 1;
        const refDate = new Date(2026, 2, 7); // Referencia rotación

        for(let i=0; i<startOffset; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=totalDays; d++) {
            const dateObj = new Date(y, m, d);
            const id = `${y}-${m+1}-${d}`;
            const dw = dateObj.getDay();
            const isLocked = db.locks[id] || false;
            
            let content = "";
            if(dw === 6 || dw === 0) {
                // Lógica automática
                const diff = Math.floor((dateObj - refDate) / (1000*60*60*24));
                const sem = Math.floor(diff / 7);
                let p1I = (Math.abs(sem) % 2 === 0) ? (dw===6?1:2) : (dw===6?3:4);
                let p2I = (Math.abs(sem) % 2 === 0) ? (dw===6?2:1) : (dw===6?4:3);

                // Ver si hay edición manual
                let p1 = db.manual[id]?.p1 || tecnicosBase[p1I];
                let p2 = db.manual[id]?.p2 || tecnicosBase[p2I];

                // Procesar Ausencias
                const ausentes = db.ausencias.filter(a => a.d == d && a.m == m+1 && a.y == y).map(a => a.n);
                ausentes.forEach(a => {
                    p1 = p1.replace(a, "---");
                    p2 = p2.replace(a, "---");
                });

                content = `
                    <div class="turno-card principal"><span class="role">Principal</span><span class="names">${p1}</span></div>
                    <div class="turno-card"><span class="role">Apoyo</span><span class="names">${p2}</span></div>
                `;
            }

            const cell = document.createElement('div');
            cell.className = `day ${dw===6||dw===0?'weekend':''} ${isLocked?'is-locked':''}`;
            cell.innerHTML = `
                <div class="day-header">
                    <strong>${d}</strong>
                    <i class="fas ${isLocked?'fa-lock locked':'fa-lock-open unlocked'} cell-lock" onclick="toggleCellLock(event, '${id}')"></i>
                </div>
                ${content}
            `;
            cell.onclick = () => !db.locks[id] && (dw===6||dw===0) ? openModal(id, d) : null;
            grid.appendChild(cell);
        }
        renderAusList();
    }

    function toggleCellLock(e, id) {
        e.stopPropagation();
        db.locks[id] = !db.locks[id];
        render();
    }

    function openModal(id, day) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('mId').value = id;
        document.getElementById('mFecha').innerText = day;
        // Pre-cargar valores actuales
        const dayCards = document.querySelectorAll(`[onclick*="openModal('${id}'"] .names`);
        document.getElementById('mP1').value = dayCards[0]?.innerText || "";
        document.getElementById('mP2').value = dayCards[1]?.innerText || "";
    }

    function saveDayEdit() {
        const id = document.getElementById('mId').value;
        db.manual[id] = {
            p1: document.getElementById('mP1').value,
            p2: document.getElementById('mP2').value
        };
        closeModal();
        render();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function addAusencia() {
        const d = document.getElementById('ausDay').value;
        const n = document.getElementById('ausTech').value;
        if(d) {
            db.ausencias.push({ d, m: currentMonth.getMonth()+1, y: currentMonth.getFullYear(), n });
            render();
        }
    }

    function renderAusList() {
        const list = document.getElementById('listaAus');
        list.innerHTML = db.ausencias.map((a, i) => `<div>${a.d}/${a.m}: ${a.n} <i class="fas fa-trash" onclick="db.ausencias.splice(${i},1);render()"></i></div>`).join('');
    }

    function exportData() {
        localStorage.setItem('sistema_turnos_pro', JSON.stringify(db));
        alert("¡Datos guardados! Ya pueden ser consultados por los técnicos.");
    }

    function changeMonth(v) { currentMonth.setMonth(currentMonth.getMonth()+v); render(); }

    window.onload = render;
</script>
</body>
</html>
