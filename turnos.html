<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos del Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 400px; border-radius: 15px; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        /* Sidebar y Grid */
        :root { --sidebar: #0f172a; --accent: #2563eb; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: #f1f5f9; }
        .sidebar { width: 300px; background: var(--sidebar); color: white; padding: 20px; }
        .main { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { background: white; padding: 10px; min-height: 120px; border-radius: 8px; cursor: pointer; border: 1px solid #e2e8f0; }
        .day:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3><i class="fas fa-users-cog"></i> GRUPOS</h3>
    <div id="lista-grupos"></div>
    <hr>
    <button onclick="lanzarMotor()" style="width:100%; padding:10px; background:#10b981; color:white; border:none; border-radius:5px; cursor:pointer;">
        <i class="fas fa-robot"></i> PROYECTAR 6 MESES
    </button>
</aside>

<main class="main">
    <div id="grid" class="grid"></div>
</main>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalFecha">Editar Turno</h3>
            <span onclick="cerrarModal()" style="cursor:pointer">&times;</span>
        </div>
        <div class="modal-body">
            <label>Técnico 1</label>
            <select id="m-p1" style="width:100%; margin-bottom:10px;"></select>
            <label>Técnico 2</label>
            <select id="m-p2" style="width:100%; margin-bottom:10px;"></select>
            <label>Apoyo 1</label>
            <input type="text" id="m-a1" style="width:100%; margin-bottom:10px;">
            <label>Apoyo 2</label>
            <input type="text" id="m-a2" style="width:100%; margin-bottom:10px;">
            <button onclick="guardarCambiosModal()" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:5px;">
                GUARDAR CAMBIOS
            </button>
        </div>
    </div>
</div>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyc1FEgD45LFJxidkx5OJjtMACf1A140Vfk1HMWoefxe2oZzL1ZrGQ7Q90h49kTg7LG/exec';
    let dbTecnicos = [], dbProgramacion = [];
    let fechaSeleccionada = "";

    async function sync() {
        const [resT, resP] = await Promise.all([
            fetch(`${CLOUD_URL}?tabla=tecnicos`),
            fetch(`${CLOUD_URL}?tabla=programacion`)
        ]);
        dbTecnicos = await resT.json();
        dbProgramacion = await resP.json();
        llenarSelects();
        renderCalendario();
    }

    function renderCalendario() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        for(let d=1; d<=30; d++) {
            const fStr = new Date(2024, 2, d).toDateString(); // Ejemplo Marzo
            const turno = dbProgramacion.find(r => r[0] && new Date(r[0]).toDateString() === fStr);
            const div = document.createElement('div');
            div.className = 'day';
            div.innerHTML = `<b>${d}</b><br>${turno ? turno[1]+'<br>'+turno[2] : '<i>Vacío</i>'}`;
            div.onclick = () => abrirModal(fStr, turno);
            grid.appendChild(div);
        }
    }

    function abrirModal(fecha, turno) {
        fechaSeleccionada = fecha;
        document.getElementById('modalFecha').innerText = fecha;
        document.getElementById('m-p1').value = turno ? turno[1] : "";
        document.getElementById('m-p2').value = turno ? turno[2] : "";
        document.getElementById('m-a1').value = turno ? turno[3] : "";
        document.getElementById('m-a2').value = turno ? turno[4] : "";
        document.getElementById('editModal').style.display = "block";
    }

    async function guardarCambiosModal() {
        const payload = {
            accion: 'guardar_dia',
            fecha: fechaSeleccionada,
            p1: document.getElementById('m-p1').value,
            p2: document.getElementById('m-p2').value,
            a1: document.getElementById('m-a1').value,
            a2: document.getElementById('m-a2').value,
            origen: 'MANUAL'
        };
        await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify(payload) });
        cerrarModal();
        sync();
    }

    function cerrarModal() { document.getElementById('editModal').style.display = "none"; }

    function llenarSelects() {
        const selects = [document.getElementById('m-p1'), document.getElementById('m-p2')];
        const opciones = dbTecnicos.slice(1).map(t => `<option value="${t[0]}">${t[0]}</option>`).join('');
        selects.forEach(s => s.innerHTML = opciones);
    }

    sync();
</script>
</body>
</html>
