<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE DE SUPERVISION INTERACTIVO - FULL V6.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS GENERALES Y BASE */
        body {
            font-family: 'Inter', sans-serif; background: #001a33; color: #e6f2ff;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        /* TARJETA DE CONFIGURACIÓN (INTERFAZ DE USUARIO) */
        .config-card {
            background: #003366; width: 100%; max-width: 800px;
            padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px; border: 1px solid #0059b3; box-sizing: border-box;
        }

        .query-panel {
            background: rgba(0,0,0,0.25); padding: 18px; border-radius: 12px; 
            margin-bottom: 25px; border: 1px solid #00d4ff33;
        }

        h3 { 
            margin: 20px 0 8px 0; color: #00d4ff; font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700;
        }

        input, select, textarea {
            width: 100%; padding: 14px; margin: 8px 0 12px 0; border-radius: 8px;
            border: 1px solid #0059b3; background: #001a33; color: white; 
            box-sizing: border-box; font-size: 0.95rem; transition: 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #00d4ff; outline: none; box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        /* ESTILOS DENTRO DE LA TABLA (EDICIÓN VIVA) */
        .table-select, .table-textarea {
            width: 100%; border: none; background: transparent; 
            font-family: 'Inter', sans-serif; font-size: 0.78rem; color: #003366; 
            padding: 8px; box-sizing: border-box; outline: none;
            display: block; overflow: hidden; resize: none; 
            line-height: 1.4; word-wrap: break-word;
        }
        
        /* El selector en modo edición */
        .table-select {
            font-weight: 700; cursor: pointer; background: #f0f7ff;
            border-radius: 6px; border: 1px solid #cce6ff; -webkit-appearance: none;
            margin: 0;
        }

        /* Texto que reemplaza al selector en el PNG */
        .export-text { 
            display: none; font-weight: 700; color: #004488; 
            padding: 10px; font-size: 0.8rem; line-height: 1.4;
            white-space: pre-wrap;
        }

        /* SELECTOR DE TÉCNICOS (GRID) */
        .tech-selector {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px; background: #001a33; padding: 15px; border-radius: 10px;
            border: 1px solid #0059b3; max-height: 180px; overflow-y: auto; margin: 8px 0 18px 0;
        }
        .tech-item { 
            display: flex; align-items: center; font-size: 0.8rem; gap: 10px; 
            cursor: pointer; color: #b3e6ff; padding: 4px; border-radius: 4px;
        }
        .tech-item:hover { background: rgba(0, 212, 255, 0.1); }
        .tech-item input { width: auto; margin: 0; cursor: pointer; transform: scale(1.2); }

        /* BOTONES DE FECHA RÁPIDA */
        .date-quick-btns { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-date { 
            flex: 1; padding: 12px; font-size: 0.8rem; border-radius: 8px; border: 1px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1); color: #00d4ff; cursor: pointer; font-weight: 700;
            transition: 0.3s;
        }
        .btn-date:hover { background: #00d4ff; color: #001a33; }

        /* SUGERENCIAS DE BÚSQUEDA */
        .search-container { position: relative; }
        #suggestions {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #003366; border: 2px solid #00d4ff; border-radius: 0 0 12px 12px;
            max-height: 250px; overflow-y: auto; z-index: 1000; display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .sug-item { 
            padding: 14px; cursor: pointer; border-bottom: 1px solid #004080; 
            color: #b3e6ff; font-size: 0.9rem;
        }
        .sug-item:hover { background: #00d4ff; color: #003366; font-weight: 800; }

        button.btn-add {
            background: linear-gradient(90deg, #00d4ff, #0077ff); color: white; border: none; padding: 18px;
            width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 15px;
            font-size: 1rem; letter-spacing: 1px;
        }

        /* --- ÁREA DE CAPTURA (DISEÑO DEL REPORTE FINAL) --- */
        #capture-area {
            background: #ffffff; color: #002244; padding: 45px; border-radius: 2px;
            width: 1180px; box-sizing: border-box;
        }

        .report-header { 
            border-bottom: 6px solid #004488; padding-bottom: 18px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .report-header h1 { margin: 0; font-size: 1.8rem; color: #004488; font-weight: 900; text-transform: uppercase; }

        .excel-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #002244; }
        .excel-table th { 
            background: #004488; color: #ffffff; padding: 14px; 
            font-size: 0.8rem; text-align: left; border: 1px solid #002244;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .excel-table td { 
            border: 1px solid #b3d9ff; padding: 0;
            vertical-align: top; font-size: 0.85rem;
        }
        
        .static-cell { padding: 12px; font-weight: 600; display: block; word-wrap: break-word; color: #003366; }
        
        /* Lógica para ocultar selects en la imagen */
        #capture-area.is-exporting .table-select, 
        #capture-area.is-exporting .no-capture { 
            display: none !important; 
        }
        #capture-area.is-exporting .export-text { 
            display: block !important; 
        }

        /* BOTONES DE ACCIÓN INFERIORES */
        .actions { display: flex; gap: 15px; margin-top: 30px; width: 100%; max-width: 850px; padding-bottom: 70px;}
        .btn-action { 
            flex: 1; padding: 20px; border-radius: 50px; border: none; 
            font-weight: 800; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 12px; transition: 0.4s; font-size: 1rem;
        }
        .btn-download { background: #ffffff; color: #004488; border: 2px solid #004488; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-whatsapp { background: #25d366; color: white; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }
        .btn-cloud { background: #f39c12; color: white; box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3); }
        
        .btn-action:hover { transform: translateY(-3px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="config-card">
        <div class="query-panel">
            <h3 style="margin-top:0; display:flex; align-items:center; gap:10px;">
                <span style="font-size:1.3rem;">🔍</span> CONSULTAR HISTORIAL EN LA NUBE
            </h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end;">
                <div>
                    <label style="font-size: 0.75rem; color: #b3e6ff; font-weight: 700;">Fecha:</label>
                    <input type="date" id="busq-fecha" style="margin-bottom:0;">
                </div>
                <div>
                    <label style="font-size: 0.75rem; color: #b3e6ff; font-weight: 700;">Tipo:</label>
                    <select id="busq-tipo" style="margin-bottom:0;">
                        <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
                        <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
                    </select>
                </div>
                <button onclick="consultarNube()" style="background: #00d4ff; color: #001a33; border: none; padding: 0 28px; border-radius: 8px; font-weight: 900; cursor: pointer; height: 48px; font-size: 0.85rem;">
                    BUSCAR
                </button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #0059b3; margin: 25px 0;">

        <h3>1. Configuración de Informe</h3>
        <select id="sel-tipo" onchange="updateHeader()">
            <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
            <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
        </select>

        <div class="date-quick-btns">
            <button class="btn-date" onclick="setQuickDate(0)">HOY</button>
            <button class="btn-date" onclick="setQuickDate(1)">MAÑANA</button>
            <button class="btn-date" onclick="setQuickDate(2)">PASADO MAÑANA</button>
        </div>
        <input type="date" id="sel-fecha" onchange="updateHeader()">

        <h3>2. Detalles y Asignación de Sitio</h3>
        <div class="search-container">
            <input type="text" id="site-search" placeholder="Escriba SITEID o Nombre del sitio..." autocomplete="off">
            <div id="suggestions"></div>
        </div>

        <div id="form-site" style="display:none; margin-top:15px; padding:25px; border:2px solid #00d4ff44; border-radius:14px; background: rgba(0, 212, 255, 0.05);">
            <p style="font-size: 0.95rem; color:#00d4ff; margin: 0 0 15px 0; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 10px;">
                📍 <b>SITIO:</b> <span id="label-site-name" style="color:white;"></span> <br>
                🏢 <b>TORRERO:</b> <span id="label-torrero" style="color:white;"></span>
            </p>
            
            <label style="font-size: 0.75rem; color: #b3e6ff; font-weight:800; text-transform: uppercase;">Seleccione Técnico(s):</label>
            <div id="tech-list" class="tech-selector"></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="font-size: 0.75rem; color: #b3e6ff; font-weight: 700;">Tipo de Falla:</label>
                    <select id="sel-falla">
                        <option value="FDS">FDS</option>
                        <option value="LTE FDS">LTE FDS</option>
                        <option value="3G FDS">3G FDS</option>
                        <option value="2G FDS">2G FDS</option>
                        <option value="PARCIAL">PARCIAL</option>
                        <option value="FALLA DE AC">FALLA DE AC</option>
                        <option value="CORTE PROGRAMADO">CORTE PROGRAMADO</option>
                        <option value="ALARMAS EXTERNAS">ALARMAS EXTERNAS</option>
                        <option value="REVISIÓN DE MOTOGENERADOR">REVISIÓN DE MOTO.</option>
                        <option value="VISITA TÉCNICA">VISITA TÉCNICA</option>
                        <option value="INTERMITENCIA">INTERMITENCIA</option>
                        <option value="ALTA TEMPERATURA">ALTA TEMPERATURA</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 0.75rem; color: #b3e6ff; font-weight: 700;">Estado Inicial:</label>
                    <select id="sel-estado-fila">
                        <option value="OPERATIVO">✅ OPERATIVO</option>
                        <option value="ASIGNADO" selected>🔹 ASIGNADO</option>
                        <option value="EN RUTA">🚗 EN RUTA</option>
                        <option value="EN SITIO">📍 EN SITIO</option>
                        <option value="PDR">⏸️ PDR</option>
                        <option value="AFECTADO">❌ AFECTADO</option>
                        <option value="LPU">❌ LPU</option>
                        <option value="PENDIENTE">⏳ PENDIENTE</option>
                    </select>
                </div>
            </div>

            <textarea id="txt-comentario" rows="3" placeholder="Escriba aquí los comentarios técnicos relevantes..."></textarea>
            <button class="btn-add" onclick="addRow()">AÑADIR A LA TABLA REPORTE</button>
        </div>
    </div>

    <div id="capture-area">
        <div class="report-header">
            <div>
                <h1 id="h-titulo">VISITAS REALIZADAS</h1>
                <span style="font-size:0.8rem; color:#004488; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Equipo técnico de zonas paracentrales</span>
            </div>
            <div id="h-fecha-display" style="font-weight:900; color: #004488; font-size: 1.6rem; border-left: 6px solid #00d4ff; padding-left: 20px;"></div>
        </div>

        <table class="excel-table">
            <thead>
                <tr>
                    <th style="width:22%">Sitio / Nodo</th>
                    <th style="width:11%">Torrero</th>
                    <th style="width:19%">Asignado</th>
                    <th style="width:13%">Tipo de Falla</th>
                    <th style="width:16%">Estado</th>
                    <th style="width:19%">Comentarios</th>
                    <th class="no-capture" style="width:40px"></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="actions">
        <button class="btn-action btn-download" onclick="downloadImg()">💾 DESCARGAR PNG HD</button>
        <button class="btn-action btn-whatsapp" onclick="sendWhatsapp()">📱 ENVIAR WHATSAPP</button>
        <button class="btn-action btn-cloud" onclick="enviarAlHistorial()">☁️ GUARDAR HISTORIAL</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi04YsTUdOZnObRzT7-oETBJUovK1qMW1x5hUftlsOzwV-In-7-kmC-JTd2u2BafEp_g/exec"; 
        const SITIOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv';
        const TECNICOS_CSV = 'tecnicos.csv';
        let dbSitios = [];
        let listaNombresTecnicos = [];
        let siteSelected = null;

        window.onload = () => {
            const today = new Date();
            document.getElementById('sel-fecha').value = today.toISOString().split('T')[0];
            updateHeader();

            // Carga de sitios
            Papa.parse(SITIOS_CSV, {
                download: true, header: true,
                complete: (r) => { 
                    dbSitios = r.data.map(row => ({ 
                        id: String(row.SITEID || "").toLowerCase().trim(),
                        name: String(row['NOMBRE DE SITIO'] || "").toLowerCase().trim(),
                        full: `${row.SITEID} - ${row['NOMBRE DE SITIO']}`, 
                        torrero: row.Propietario 
                    })).filter(x => x.full.length > 5); 
                }
            });

            // Carga de técnicos
            Papa.parse(TECNICOS_CSV, {
                download: true, header: true,
                complete: (r) => {
                    const list = document.getElementById('tech-list');
                    listaNombresTecnicos = r.data.filter(t => t.Nombre).map(t => t.Nombre);
                    listaNombresTecnicos.forEach(nombre => {
                        const label = document.createElement('label');
                        label.className = 'tech-item';
                        label.innerHTML = `<input type="checkbox" value="${nombre}"> ${nombre}`;
                        list.appendChild(label);
                    });
                }
            });
        };

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function setQuickDate(daysToAdd) {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            document.getElementById('sel-fecha').value = date.toISOString().split('T')[0];
            updateHeader();
        }

        function updateHeader() {
            const dateInput = document.getElementById('sel-fecha').value;
            if (dateInput) {
                const p = dateInput.split('-');
                document.getElementById('h-fecha-display').innerText = `${p[2]}/${p[1]}/${p[0]}`;
            }
            document.getElementById('h-titulo').innerText = document.getElementById('sel-tipo').value;
        }

        // Búsqueda avanzada
        document.getElementById('site-search').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase().trim();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            if(v.length < 2) { sug.style.display = 'none'; return; }

            const matches = dbSitios.map(s => {
                let score = 0;
                if(s.id === v) score = 100;
                else if(s.id.startsWith(v)) score = 80;
                else if(s.name.startsWith(v)) score = 60;
                else if(s.full.toLowerCase().includes(v)) score = 20;
                return { ...s, score };
            }).filter(s => s.score > 0).sort((a,b) => b.score - a.score).slice(0,8);

            if(matches.length > 0) {
                sug.style.display = 'block';
                matches.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'sug-item';
                    d.innerText = m.full.toUpperCase();
                    d.onclick = () => {
                        siteSelected = m;
                        document.getElementById('site-search').value = m.full.toUpperCase();
                        document.getElementById('label-site-name').innerText = m.full.toUpperCase();
                        document.getElementById('label-torrero').innerText = m.torrero || 'N/A';
                        document.getElementById('form-site').style.display = 'block';
                        sug.style.display = 'none';
                    };
                    sug.appendChild(d);
                });
            }
        });

        // GENERACIÓN DE FILA CON SELECTORES DINÁMICOS
        function addRow() {
            if(!siteSelected) return;
            const checkedBoxes = Array.from(document.querySelectorAll('#tech-list input:checked'));
            const mainTech = checkedBoxes.length > 0 ? checkedBoxes[0].value : 'SIN ASIGNAR';
            const allSelectedText = checkedBoxes.map(i => i.value).join(' / ') || 'SIN ASIGNAR';
            
            const falla = document.getElementById('sel-falla').value;
            const estadoSelect = document.getElementById('sel-estado-fila');
            const estadoActualText = estadoSelect.options[estadoSelect.selectedIndex].text;
            const estadoActualValue = estadoSelect.value;
            const comment = document.getElementById('txt-comentario').value;
            
            const body = document.getElementById('table-body');
            const tr = document.createElement('tr');

            // Crear opciones para el selector de técnicos en la tabla
            let techOptions = `<option value="${allSelectedText}">${allSelectedText}</option>`;
            listaNombresTecnicos.forEach(nombre => {
                if(!allSelectedText.includes(nombre)) {
                    techOptions += `<option value="${nombre}">${nombre}</option>`;
                }
            });

            tr.innerHTML = `
                <td><span class="static-cell" style="color: #004488; font-weight:800;">${siteSelected.full.toUpperCase()}</span></td>
                <td><span class="static-cell">${siteSelected.torrero || 'N/A'}</span></td>
                
                <td>
                    <div style="padding:5px;">
                        <select class="table-select" onchange="this.nextElementSibling.innerText=this.value">
                            ${techOptions}
                        </select>
                        <div class="export-text">${allSelectedText}</div>
                    </div>
                </td>

                <td><span class="static-cell" style="font-weight:700; color: #0077ff;">${falla}</span></td>

                <td>
                    <div style="padding:5px;">
                        <select class="table-select" onchange="this.nextElementSibling.innerText=this.options[this.selectedIndex].text">
                            <option value="OPERATIVO" ${estadoActualValue === 'OPERATIVO' ? 'selected' : ''}>✅ OPERATIVO</option>
                            <option value="ASIGNADO" ${estadoActualValue === 'ASIGNADO' ? 'selected' : ''}>🔹 ASIGNADO</option>
                            <option value="EN RUTA" ${estadoActualValue === 'EN RUTA' ? 'selected' : ''}>🚗 EN RUTA</option>
                            <option value="EN SITIO" ${estadoActualValue === 'EN SITIO' ? 'selected' : ''}>📍 EN SITIO</option>
                            <option value="PDR" ${estadoActualValue === 'PDR' ? 'selected' : ''}>⏸️ PDR</option>
                            <option value="AFECTADO" ${estadoActualValue === 'AFECTADO' ? 'selected' : ''}>❌ AFECTADO</option>
                            <option value="LPU" ${estadoActualValue === 'LPU' ? 'selected' : ''}>❌ LPU</option>
                            <option value="PENDIENTE" ${estadoActualValue === 'PENDIENTE' ? 'selected' : ''}>⏳ PENDIENTE</option>
                        </select>
                        <div class="export-text">${estadoActualText}</div>
                    </div>
                </td>

                <td>
                    <textarea class="table-textarea" oninput="autoResize(this)">${comment}</textarea>
                    <div class="export-text">${comment}</div>
                </td>

                <td class="no-capture" style="text-align:center; vertical-align: middle; padding: 10px;">
                    <button style="color:#ff3333; font-weight:bold; border:none; background:none; cursor:pointer; font-size:1.5rem;" onclick="this.closest('tr').remove()">×</button>
                </td>
            `;
            
            body.appendChild(tr);
            tr.querySelectorAll('textarea').forEach(tx => autoResize(tx));
            
            // RESET FORM
            document.getElementById('form-site').style.display = 'none';
            document.getElementById('site-search').value = '';
            document.getElementById('txt-comentario').value = '';
            document.querySelectorAll('#tech-list input').forEach(i => i.checked = false);
            siteSelected = null;
        }

        // DESCARGA DE IMAGEN HD
        async function downloadImg() {
            const area = document.getElementById('capture-area');
            
            // 1. Sincronizar todos los textos de exportación antes de capturar
            document.querySelectorAll('#table-body tr').forEach(tr => {
                // Sincronizar técnico
                const selTech = tr.querySelector('td:nth-child(3) .table-select');
                tr.querySelector('td:nth-child(3) .export-text').innerText = selTech.value;
                
                // Sincronizar estado
                const selEst = tr.querySelector('td:nth-child(5) .table-select');
                tr.querySelector('td:nth-child(5) .export-text').innerText = selEst.options[selEst.selectedIndex].text;
                
                // Sincronizar comentarios
                const txtComm = tr.querySelector('td:nth-child(6) .table-textarea');
                tr.querySelector('td:nth-child(6) .export-text').innerText = txtComm.value;
            });

            // 2. Aplicar clase de exportación
            area.classList.add('is-exporting');
            
            // 3. Generar Canvas
            try {
                const canvas = await html2canvas(area, { 
                    scale: 3,
                    backgroundColor: "#ffffff",
                    useCORS: true,
                    logging: false
                });
                
                const a = document.createElement('a');
                a.download = `REPORTE_${document.getElementById('sel-tipo').value}_${Date.now()}.png`;
                a.href = canvas.toDataURL("image/png");
                a.click();
            } catch (e) {
                alert("Error al generar imagen");
            } finally {
                area.classList.remove('is-exporting');
            }
        }

        function sendWhatsapp() {
            window.open(`https://wa.me/?text=${encodeURIComponent("Adjunto envío de reporte técnico diario.")}`, '_blank');
        }

        // COMUNICACIÓN CON GOOGLE SHEETS
        async function enviarAlHistorial() {
            const filas = document.querySelectorAll("#table-body tr");
            if (filas.length === 0) return alert("⚠️ Agregue datos a la tabla primero.");

            const btn = document.querySelector(".btn-cloud");
            const originalText = btn.innerText;
            btn.innerText = "⏳ GUARDANDO...";
            btn.disabled = true;

            const dataReporte = {
                fecha: document.getElementById('sel-fecha').value,
                tipo: document.getElementById('sel-tipo').value,
                rows: []
            };

            filas.forEach(tr => {
                dataReporte.rows.push({
                    sitio: tr.cells[0].innerText,
                    torrero: tr.cells[1].innerText,
                    asignado: tr.querySelector('td:nth-child(3) .table-select').value,
                    falla: tr.cells[3].innerText,
                    estado: tr.querySelector('td:nth-child(5) .table-select').value,
                    comentarios: tr.querySelector('td:nth-child(6) .table-textarea').value
                });
            });

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataReporte)
                });
                alert("✅ Datos guardados correctamente en el historial.");
            } catch (error) {
                alert("❌ Error de conexión al guardar.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function consultarNube() {
            const fecha = document.getElementById('busq-fecha').value;
            const tipo = document.getElementById('busq-tipo').value;
            if (!fecha) return alert("Seleccione una fecha para buscar.");

            const btn = document.querySelector('button[onclick="consultarNube()"]');
            btn.innerText = "⏳...";
            btn.disabled = true;

            try {
                const resp = await fetch(`${SCRIPT_URL}?fecha=${fecha}&tipo=${tipo}`);
                const data = await resp.json();

                if (!data || data.length === 0) {
                    alert("No se encontraron registros para esta fecha.");
                } else {
                    document.getElementById('table-body').innerHTML = '';
                    // Actualizar cabecera con la fecha consultada
                    document.getElementById('sel-fecha').value = fecha;
                    document.getElementById('sel-tipo').value = tipo;
                    updateHeader();

                    data.forEach(item => {
                        // Lógica manual de inserción para registros del historial
                        const body = document.getElementById('table-body');
                        const tr = document.createElement('tr');
                        
                        // Opciones de técnico para historial (el asignado primero)
                        let techOpts = `<option value="${item.asignado}">${item.asignado}</option>`;
                        listaNombresTecnicos.forEach(n => { if(n !== item.asignado) techOpts += `<option value="${n}">${n}</option>`; });

                        tr.innerHTML = `
                            <td><span class="static-cell" style="font-weight:700; color: #004488;">${item.sitio}</span></td>
                            <td><span class="static-cell">${item.torrero}</span></td>
                            <td>
                                <div style="padding:5px;">
                                    <select class="table-select" onchange="this.nextElementSibling.innerText=this.value">${techOpts}</select>
                                    <div class="export-text">${item.asignado}</div>
                                </div>
                            </td>
                            <td><span class="static-cell" style="font-weight:700; color: #0077ff;">${item.falla}</span></td>
                            <td>
                                <div style="padding:5px;">
                                    <select class="table-select" onchange="this.nextElementSibling.innerText=this.options[this.selectedIndex].text">
                                        <option value="OPERATIVO" ${item.estado === 'OPERATIVO' ? 'selected' : ''}>✅ OPERATIVO</option>
                                        <option value="ASIGNADO" ${item.estado === 'ASIGNADO' ? 'selected' : ''}>🔹 ASIGNADO</option>
                                        <option value="EN RUTA" ${item.estado === 'EN RUTA' ? 'selected' : ''}>🚗 EN RUTA</option>
                                        <option value="EN SITIO" ${item.estado === 'EN SITIO' ? 'selected' : ''}>📍 EN SITIO</option>
                                        <option value="PDR" ${item.estado === 'PDR' ? 'selected' : ''}>⏸️ PDR</option>
                                        <option value="AFECTADO" ${item.estado === 'AFECTADO' ? 'selected' : ''}>❌ AFECTADO</option>
                                        <option value="LPU" ${item.estado === 'LPU' ? 'selected' : ''}>❌ LPU</option>
                                        <option value="PENDIENTE" ${item.estado === 'PENDIENTE' ? 'selected' : ''}>⏳ PENDIENTE</option>
                                    </select>
                                    <div class="export-text">${item.estado}</div>
                                </div>
                            </td>
                            <td>
                                <textarea class="table-textarea" oninput="autoResize(this)">${item.comentarios}</textarea>
                                <div class="export-text">${item.comentarios}</div>
                            </td>
                            <td class="no-capture" style="text-align:center;"><button style="color:red; border:none; background:none; cursor:pointer; font-weight:bold; font-size:1.5rem;" onclick="this.closest('tr').remove()">×</button></td>
                        `;
                        body.appendChild(tr);
                        tr.querySelectorAll('textarea').forEach(tx => autoResize(tx));
                    });
                }
            } catch (e) { 
                alert("Error al conectar con la base de datos."); 
            } finally { 
                btn.innerText = "BUSCAR"; 
                btn.disabled = false; 
            }
        }
    </script>
</body>
</html>
