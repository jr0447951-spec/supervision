<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TURNOS v24.1 - CLOUD & DRAG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc;
            --border: #e2e8f0; --danger: #ef4444; --success: #10b981;
            --warning: #f59e0b; --radius: 12px;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Sidebar */
        .sidebar { 
            width: 320px; background: var(--sidebar); color: white; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #334155; 
            overflow-y: auto; z-index: 100;
        }
        
        .section-title { 
            font-size: 0.65rem; font-weight: 800; color: #64748b; 
            text-transform: uppercase; letter-spacing: 1.2px; border-bottom: 1px solid #334155; padding-bottom: 5px;
        }

        .draggable-group { 
            background: #1e293b; border: 1px solid #334155; padding: 10px; 
            border-radius: var(--radius); cursor: grab; transition: 0.2s; 
        }
        .draggable-group:hover { border-color: var(--primary); background: #24334d; }

        /* Calendario */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 60px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .calendar-container { flex-grow: 1; overflow-y: auto; padding: 20px; background: white; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        
        .day { 
            background: white; border: 1px solid var(--border); border-radius: var(--radius); 
            min-height: 160px; padding: 10px; position: relative; transition: 0.2s; 
            display: flex; flex-direction: column; gap: 5px;
        }
        .day.weekend { background: #f1f5f9; }
        .day.locked { background: #f8fafc; border-top: 4px solid var(--sidebar); }
        .day.drag-over { border: 2px dashed var(--primary); background: #eff6ff; }

        /* Tarjetas de Turnos */
        .turno-card { 
            border-radius: 8px; padding: 6px 10px; font-size: 0.7rem; 
            border-left: 4px solid var(--primary); background: #ebf2ff; 
            cursor: grab; position: relative;
        }
        .turno-card:active { cursor: grabbing; opacity: 0.6; }
        
        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; width: 350px; padding: 25px; border-radius: 16px; }

        .btn { padding: 8px 12px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; font-size: 0.75rem; }
        .btn-blue { background: var(--primary); color: white; }
        .cloud-status { font-size: 0.6rem; color: var(--success); font-weight: 800; display: none; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0; font-size: 1rem;"><i class="fas fa-network-wired"></i> OPS V24</h3>
        <span id="sync-indicator" class="cloud-status"><i class="fas fa-cloud"></i> NUBE OK</span>
    </div>

    <div class="section-title">Baja Médica</div>
    <div style="background:#1e293b; padding:10px; border-radius:10px; display:flex; flex-direction:column; gap:8px;">
        <select id="aus-tecnico" style="width:100%; padding:5px; background:#0f172a; color:white; border:1px solid #334155;"></select>
        <input type="date" id="aus-fecha" style="width:100%; padding:5px; background:#0f172a; color:white; border:1px solid #334155;">
        <button class="btn btn-blue" onclick="addAbsence()">REGISTRAR</button>
    </div>

    <div class="section-title">Grupos Disponibles</div>
    <div id="sidebar-groups" style="display:flex; flex-direction:column; gap:8px;"></div>

    <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
        <button class="btn" style="background:#334155; color:white;" onclick="syncSheets()">FORZAR SINCRONIZACIÓN</button>
        <button class="btn" onclick="capture()" style="background:white; border:1px solid #ccc;">DESCARGAR PNG</button>
    </div>
</aside>

<main class="main-content">
    <header class="top-nav">
        <div>
            <button class="btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
            <span id="month-display" style="font-weight:800; margin:0 15px;"></span>
            <button class="btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div style="font-size:0.7rem; color:#64748b">
            <i class="fas fa-info-circle"></i> Candado Cerrado = Datos Protegidos
        </div>
    </header>

    <div class="calendar-container">
        <div class="grid" id="grid"></div>
    </div>
</main>

<div id="modal">
    <div class="modal-box">
        <h4 id="m-title">Editar Turno</h4>
        <input type="hidden" id="m-id"><input type="hidden" id="m-idx">
        <select id="sel-t1" style="width:100%; padding:10px; margin-bottom:10px;"></select>
        <select id="sel-t2" style="width:100%; padding:10px; margin-bottom:20px;"></select>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn btn-blue" onclick="confirmEdit()">GUARDAR</button>
            <button class="btn" style="background:#fee2e2; color:var(--danger)" onclick="deleteGroup()">ELIMINAR</button>
            <button class="btn" onclick="closeModal()">CANCELAR</button>
        </div>
    </div>
</div>

<script>
    const DB_KEY = "SISTEMA_V24_MASTER";
    const START_REF = new Date(2026, 2, 7);
    const GOOGLE_SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; 

    let currentView = new Date();
    let state = {
        tecnicos: [],
        gBase: {},
        db: JSON.parse(localStorage.getItem(DB_KEY)) || { manual: {}, absences: {}, locks: {} }
    };

    async function init() {
        await loadCSV();
        renderSidebar();
        renderCalendar();
    }

    async function loadCSV() {
        try {
            const r = await fetch('tecnicos.csv');
            const d = await r.text();
            const lines = d.split(/\r?\n/).slice(1);
            state.tecnicos = []; state.gBase = {};
            lines.forEach(l => {
                const [n, g] = l.split(/[;,]/).map(s => s.trim().toUpperCase());
                if(n) {
                    state.tecnicos.push(n);
                    if(g) { if(!state.gBase[g]) state.gBase[g]=[]; state.gBase[g].push(n); }
                }
            });
            state.tecnicos.sort();
        } catch (e) { console.error("CSV no encontrado, usando datos vacíos"); }
    }

    function getAutoTurno(date) {
        if (date.getDay() !== 6 && date.getDay() !== 0) return [];
        const diff = Math.floor((date - START_REF) / 86400000);
        const week = Math.floor(diff / 7);
        const cycle = Math.max(0, week) % 4;
        const map = { 0:["1","2"], 1:["3","4"], 2:["2","1"], 3:["4","3"] };
        return [ [...(state.gBase[map[cycle][0]] || [])], [...(state.gBase[map[cycle][1]] || [])] ];
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const y = currentView.getFullYear(), m = currentView.getMonth();
        document.getElementById('month-display').innerText = new Intl.DateTimeFormat('es-ES', {month:'long', year:'numeric'}).format(currentView);

        const total = new Date(y, m + 1, 0).getDate();

        for(let d=1; d<=total; d++) {
            const date = new Date(y, m, d);
            const dateId = `${y}-${m+1}-${d}`;
            const isWeekend = [0,6].includes(date.getDay());
            
            // LÓGICA INVERSA: Fines de semana bloqueados por defecto
            if (state.db.locks[dateId] === undefined) {
                state.db.locks[dateId] = isWeekend; 
            }

            const isLocked = state.db.locks[dateId];
            let turnos = isLocked ? (state.db.manual[dateId] || getAutoTurno(date)) : (state.db.manual[dateId] || []);

            const cell = document.createElement('div');
            cell.className = `day ${isWeekend?'weekend':''} ${isLocked?'locked':''}`;
            
            // Solo permitir drop si NO está bloqueado
            if(!isLocked) {
                cell.ondragover = e => { e.preventDefault(); cell.classList.add('drag-over'); };
                cell.ondragleave = () => cell.classList.remove('drag-over');
                cell.ondrop = e => handleDrop(e, dateId, date);
            }

            let turnosHtml = turnos.map((group, idx) => {
                const namesText = group.filter(n => n).join(' & ') || "VACANTE";
                return `
                <div class="turno-card" draggable="true" ondragstart="handleCardDragStart(event, '${dateId}', ${idx})">
                    <span style="font-size:0.55rem; display:block; opacity:0.7">GRUPO</span>
                    <span style="font-weight:700">${namesText}</span>
                    ${!isLocked ? `<i class="fas fa-edit" style="position:absolute; right:5px; top:5px; cursor:pointer" onclick="openEditor('${dateId}',${idx})"></i>` : ''}
                </div>`;
            }).join('');

            cell.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px">
                    <b style="font-size:0.9rem">${d}</b>
                    <i class="fas ${isLocked?'fa-lock':'fa-lock-open'}" style="cursor:pointer; color:${isLocked?'#64748b':'#2563eb'}" onclick="toggleLock('${dateId}')"></i>
                </div>
                ${turnosHtml}
            `;
            grid.appendChild(cell);
        }
    }

    // --- DRAG & DROP LOGIC ---
    function handleCardDragStart(e, dateId, idx) {
        const turnos = state.db.manual[dateId] || getAutoTurno(new Date(dateId.replace(/-/g,'/')));
        e.dataTransfer.setData("text/group", JSON.stringify(turnos[idx]));
    }

    function handleDrop(e, id, date) {
        e.preventDefault();
        const group = JSON.parse(e.dataTransfer.getData("text/group"));
        
        if(!state.db.manual[id]) {
            state.db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(date)));
        }

        // Validación de duplicados
        const flatNames = state.db.manual[id].flat().filter(n => n !== "");
        if (group.some(n => n !== "" && flatNames.includes(n))) {
            return alert("Técnico ya asignado a este día");
        }

        state.db.manual[id].push(group);
        state.db.locks[id] = true; // Al colocar algo manual, se bloquea automáticamente
        save();
        renderCalendar();
    }

    function toggleLock(id) {
        // Si abrimos un candado de fin de semana que era automático, pasamos los datos a manual para no perderlos
        if (state.db.locks[id] && !state.db.manual[id]) {
            state.db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(new Date(id.replace(/-/g,'/')))));
        }
        state.db.locks[id] = !state.db.locks[id];
        save();
        renderCalendar();
    }

    // --- CLOUD SYNC ---
    async function save() {
        localStorage.setItem(DB_KEY, JSON.stringify(state.db));
        
        // Auto-sincronización silenciosa
        const indicator = document.getElementById('sync-indicator');
        try {
            if(GOOGLE_SCRIPT_URL.length > 20) {
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(state.db)
                });
                indicator.style.display = "inline";
                setTimeout(() => indicator.style.display = "none", 3000);
            }
        } catch (e) { console.warn("Error sync cloud"); }
    }

    // --- RESTO DE FUNCIONES ---
    function renderSidebar() {
        const cont = document.getElementById('sidebar-groups'); cont.innerHTML = "";
        Object.keys(state.gBase).sort().forEach(g => {
            const div = document.createElement('div');
            div.className = "draggable-group"; div.draggable = true;
            div.innerHTML = `<span style="font-size:0.6rem; color:var(--primary); font-weight:800">GRUPO ${g}</span>
                             <div style="font-size:0.75rem">${state.gBase[g].join(' & ')}</div>`;
            div.ondragstart = e => e.dataTransfer.setData("text/group", JSON.stringify(state.gBase[g]));
            cont.appendChild(div);
        });

        const opts = `<option value="">-- VACANTE --</option>` + state.tecnicos.map(t=>`<option value="${t}">${t}</option>`).join('');
        document.getElementById('aus-tecnico').innerHTML = document.getElementById('sel-t1').innerHTML = document.getElementById('sel-t2').innerHTML = opts;
    }

    function openEditor(id, idx) {
        const turnos = state.db.manual[id];
        document.getElementById('m-id').value = id;
        document.getElementById('m-idx').value = idx;
        document.getElementById('sel-t1').value = turnos[idx][0] || "";
        document.getElementById('sel-t2').value = turnos[idx][1] || "";
        document.getElementById('modal').style.display = 'flex';
    }

    function confirmEdit() {
        const id = document.getElementById('m-id').value, idx = document.getElementById('m-idx').value;
        state.db.manual[id][idx] = [document.getElementById('sel-t1').value, document.getElementById('sel-t2').value];
        save(); closeModal(); renderCalendar();
    }

    function deleteGroup() {
        const id = document.getElementById('m-id').value, idx = document.getElementById('m-idx').value;
        state.db.manual[id].splice(idx, 1);
        save(); closeModal(); renderCalendar();
    }

    function changeMonth(v) { currentView.setMonth(currentView.getMonth() + v); renderCalendar(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function capture() {
        html2canvas(document.querySelector('.calendar-container'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Cuadrante.png'; link.href = canvas.toDataURL(); link.click();
        });
    }

    window.onload = init;
</script>
</body>
</html>
