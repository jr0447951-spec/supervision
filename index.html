<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE DE SUPERVISION - DINÁMICO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif; background: #001a33; color: #e6f2ff;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .config-card {
            background: #003366; width: 100%; max-width: 800px;
            padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px; border: 1px solid #0059b3; box-sizing: border-box;
        }

        .query-panel {
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; 
            margin-bottom: 20px; border: 1px solid #00d4ff33;
        }

        h3 { margin: 15px 0 5px 0; color: #00d4ff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%; padding: 12px; margin: 5px 0 10px 0; border-radius: 8px;
            border: 1px solid #0059b3; background: #001a33; color: white; box-sizing: border-box; font-size: 0.9rem;
        }

        /* ESTILOS DE TABLA DINÁMICA */
        .excel-table { 
            width: 100%; border-collapse: collapse; 
            border: 1px solid #b3d9ff; background: white;
            table-layout: auto; /* Permite que las celdas crezcan según el texto */
        }
        
        .excel-table th { 
            background: #004488; color: #ffffff; padding: 10px; 
            font-size: 0.7rem; text-align: left; border: 1px solid #003366;
            text-transform: uppercase;
        }

        .excel-table td { 
            border: 1px solid #cce6ff; padding: 8px; font-size: 0.75rem; 
            color: #003366; vertical-align: middle;
            word-break: break-word; /* Salto de línea automático */
        }

        /* Inputs invisibles dentro de la tabla */
        .table-input, .table-select, .table-textarea {
            width: 100%; border: none; background: transparent; 
            font-family: inherit; font-size: 0.75rem; color: #003366; 
            padding: 0; margin: 0; outline: none; display: block;
        }
        .table-input { font-weight: 600; color: #444; }
        .table-select { font-weight: 700; cursor: pointer; }
        .table-textarea { 
            resize: none; overflow: hidden; line-height: 1.3; 
            min-height: 1.2rem; width: 100%;
        }

        /* Utilidades */
        .tech-selector {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px; background: #001a33; padding: 12px; border-radius: 8px;
            border: 1px solid #0059b3; max-height: 160px; overflow-y: auto; margin: 5px 0 15px 0;
        }
        .tech-item { display: flex; align-items: center; font-size: 0.75rem; gap: 8px; cursor: pointer; color: #b3e6ff; }
        .date-quick-btns { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-date { 
            flex: 1; padding: 10px; font-size: 0.75rem; border-radius: 6px; border: 1px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1); color: #00d4ff; cursor: pointer; font-weight: 600;
        }
        .search-container { position: relative; }
        #suggestions {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #003366; border: 2px solid #00d4ff; border-radius: 0 0 8px 8px;
            max-height: 200px; overflow-y: auto; z-index: 100; display: none;
        }
        .sug-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #004080; color: #b3e6ff; }
        
        #capture-area {
            background: #ffffff; color: #002244; padding: 35px; 
            width: 1120px; box-sizing: border-box;
        }

        .report-header { 
            border-bottom: 4px solid #004488; padding-bottom: 12px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .actions { display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 800px; padding-bottom: 40px; }
        .btn-action { 
            flex: 1; padding: 15px; border-radius: 50px; border: none; 
            font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-download { background: #ffffff; color: #004488; border: 2px solid #004488; }
        .btn-whatsapp { background: #25d366; color: white; }
        .btn-cloud { background: #f39c12; color: white; }
        .btn-remove { color: #ff3333; font-weight: bold; cursor: pointer; border: none; background: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="config-card">
        <div class="query-panel">
            <h3 style="margin-top:0;">🔍 CONSULTAR HISTORIAL</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end;">
                <input type="date" id="busq-fecha">
                <select id="busq-tipo">
                    <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
                    <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
                </select>
                <button onclick="consultarNube()" style="background: #00d4ff; color: #001a33; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; height: 45px;">BUSCAR</button>
            </div>
        </div>

        <h3>1. Configuración de Informe</h3>
        <select id="sel-tipo" onchange="updateHeader()">
            <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
            <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
        </select>

        <div class="date-quick-btns">
            <button class="btn-date" onclick="setQuickDate(0)">HOY</button>
            <button class="btn-date" onclick="setQuickDate(1)">MAÑANA</button>
            <button class="btn-date" onclick="setQuickDate(2)">PASADO</button>
        </div>
        <input type="date" id="sel-fecha" onchange="updateHeader()">

        <h3>2. Detalles y Asignación</h3>
        <div class="search-container">
            <input type="text" id="site-search" placeholder="Escribe SITEID o Nombre..." autocomplete="off">
            <div id="suggestions"></div>
        </div>

        <div id="form-site" style="display:none; margin-top:10px; padding:15px; border:1px solid #0059b3; border-radius:10px; background: rgba(255,255,255,0.05);">
            <p style="font-size: 0.8rem; color:#00d4ff;">Torrero: <span id="label-torrero" style="color:white; font-weight:bold;"></span></p>
            <div id="tech-list" class="tech-selector"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <select id="sel-falla">
                    <option value="FDS">FDS</option><option value="LTE FDS">LTE FDS</option>
                    <option value="PARCIAL">PARCIAL</option><option value="VISITA TÉCNICA">VISITA TÉCNICA</option>
                    <option value="FALLA DE AC">FALLA DE AC</option><option value="ALTA TEMPERATURA">ALTA TEMP.</option>
                </select>
                <select id="sel-estado-fila">
                    <option value="OPERATIVO">OPERATIVO</option><option value="ASIGNADO">ASIGNADO</option>
                    <option value="EN RUTA">EN RUTA</option><option value="EN SITIO">EN SITIO</option>
                    <option value="PDR">PDR</option><option value="AFECTADO">AFECTADO</option>
                </select>
            </div>
            <textarea id="txt-comentario" rows="2" placeholder="Escribe aquí los detalles técnicos..."></textarea>
            <button class="btn-add" onclick="addRow()">AÑADIR A LA TABLA</button>
        </div>
    </div>

    <div id="capture-area">
        <div class="report-header">
            <div>
                <h1 id="h-titulo">VISITAS REALIZADAS</h1>
                <span style="font-size:0.65rem; color:#0077ff; font-weight: 700;">EQUIPO TÉCNICO DE ZONAS PARACENTRALES</span>
            </div>
            <div id="h-fecha-display" style="font-weight:700; color: #004488; font-size: 1.1rem; border-left: 3px solid #00d4ff; padding-left: 10px;"></div>
        </div>

        <table class="excel-table">
            <thead>
                <tr>
                    <th style="width:22%">Sitio / Nodo</th>
                    <th style="width:12%">Torrero</th>
                    <th style="width:18%">Asignado</th>
                    <th style="width:14%">Falla</th>
                    <th style="width:15%">Estado</th>
                    <th style="width:19%">Comentarios</th>
                    <th class="no-capture" style="width:40px"></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="actions">
        <button class="btn-action btn-download" onclick="downloadImg()">💾 DESCARGAR PNG</button>
        <button class="btn-action btn-whatsapp" onclick="sendWhatsapp()">📱 WHATSAPP</button>
        <button class="btn-action btn-cloud" onclick="enviarAlHistorial()">☁️ GUARDAR</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi04YsTUdOZnObRzT7-oETBJUovK1qMW1x5hUftlsOzwV-In-7-kmC-JTd2u2BafEp_g/exec"; 
        const SITIOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv';
        const TECNICOS_CSV = 'tecnicos.csv';
        let dbSitios = [], siteSelected = null;

        window.onload = () => {
            const today = new Date();
            document.getElementById('sel-fecha').value = today.toISOString().split('T')[0];
            updateHeader();

            Papa.parse(SITIOS_CSV, {
                download: true, header: true,
                complete: (r) => { 
                    dbSitios = r.data.map(row => ({ 
                        id: String(row.SITEID || "").toLowerCase().trim(),
                        name: String(row['NOMBRE DE SITIO'] || "").toLowerCase().trim(),
                        full: `${row.SITEID} - ${row['NOMBRE DE SITIO']}`, 
                        torrero: row.Propietario 
                    })).filter(x => x.full.length > 5); 
                }
            });

            Papa.parse(TECNICOS_CSV, {
                download: true, header: true,
                complete: (r) => {
                    const list = document.getElementById('tech-list');
                    r.data.forEach(t => {
                        if(t.Nombre) {
                            const label = document.createElement('label');
                            label.className = 'tech-item';
                            label.innerHTML = `<input type="checkbox" value="${t.Nombre}"> ${t.Nombre}`;
                            list.appendChild(label);
                        }
                    });
                }
            });
        };

        function updateHeader() {
            const dateInput = document.getElementById('sel-fecha').value;
            if (dateInput) {
                const p = dateInput.split('-');
                document.getElementById('h-fecha-display').innerText = `${p[2]}/${p[1]}/${p[0]}`;
            }
            document.getElementById('h-titulo').innerText = document.getElementById('sel-tipo').value;
        }

        function setQuickDate(days) {
            const d = new Date(); d.setDate(d.getDate() + days);
            document.getElementById('sel-fecha').value = d.toISOString().split('T')[0];
            updateHeader();
        }

        document.getElementById('site-search').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase().trim();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            if(v.length < 2) { sug.style.display = 'none'; return; }

            const matches = dbSitios.filter(s => s.full.toLowerCase().includes(v)).slice(0,6);
            if(matches.length > 0) {
                sug.style.display = 'block';
                matches.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'sug-item';
                    d.innerText = m.full.toUpperCase();
                    d.onclick = () => {
                        siteSelected = m;
                        document.getElementById('site-search').value = m.full.toUpperCase();
                        document.getElementById('label-torrero').innerText = m.torrero || 'N/A';
                        document.getElementById('form-site').style.display = 'block';
                        sug.style.display = 'none';
                    };
                    sug.appendChild(d);
                });
            }
        });

        function addRow() {
            if(!siteSelected) return;
            const selectedTechs = Array.from(document.querySelectorAll('#tech-list input:checked')).map(i => i.value).join(' / ');
            const falla = document.getElementById('sel-falla').value;
            const estadoTexto = document.getElementById('sel-estado-fila').value;
            const comment = document.getElementById('txt-comentario').value;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:700; color: #004488;">${siteSelected.full.toUpperCase()}</td>
                <td style="color: #0059b3;">${siteSelected.torrero || 'N/A'}</td>
                <td><input type="text" class="table-input" value="${selectedTechs || 'SIN ASIGNAR'}"></td>
                <td style="font-weight:600; color: #0077ff;">${falla}</td>
                <td>
                    <select class="table-select">
                        <option value="OPERATIVO" ${estadoTexto === 'OPERATIVO' ? 'selected' : ''}>✅ OPERATIVO</option>
                        <option value="ASIGNADO" ${estadoTexto === 'ASIGNADO' ? 'selected' : ''}>🔹 ASIGNADO</option>
                        <option value="EN RUTA" ${estadoTexto === 'EN RUTA' ? 'selected' : ''}>🚗 EN RUTA</option>
                        <option value="EN SITIO" ${estadoTexto === 'EN SITIO' ? 'selected' : ''}>📍 EN SITIO</option>
                        <option value="PDR" ${estadoTexto === 'PDR' ? 'selected' : ''}>⏸️ PDR</option>
                        <option value="AFECTADO" ${estadoTexto === 'AFECTADO' ? 'selected' : ''}>❌ AFECTADO</option>
                        <option value="PENDIENTE" ${estadoTexto === 'PENDIENTE' ? 'selected' : ''}>⏳ PENDIENTE</option>
                    </select>
                </td>
                <td><textarea class="table-textarea" oninput="autoResize(this)">${comment}</textarea></td>
                <td class="no-capture" style="text-align:center;"><button class="btn-remove" onclick="this.closest('tr').remove()">×</button></td>
            `;
            document.getElementById('table-body').appendChild(tr);
            autoResize(tr.querySelector('.table-textarea'));

            // Reset
            document.getElementById('form-site').style.display = 'none';
            document.getElementById('site-search').value = '';
            document.getElementById('txt-comentario').value = '';
            document.querySelectorAll('#tech-list input').forEach(i => i.checked = false);
            siteSelected = null;
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function downloadImg() {
            const nc = document.querySelectorAll('.no-capture');
            nc.forEach(el => el.style.visibility = 'hidden');
            html2canvas(document.getElementById('capture-area'), { scale: 3 }).then(canvas => {
                const a = document.createElement('a');
                a.download = `Reporte_${Date.now()}.png`;
                a.href = canvas.toDataURL("image/png");
                a.click();
                nc.forEach(el => el.style.visibility = 'visible');
            });
        }

        function sendWhatsapp() {
            window.open(`https://wa.me/?text=${encodeURIComponent("Adjunto reporte de campo técnico.")}`, '_blank');
        }

        async function enviarAlHistorial() {
            const filas = document.querySelectorAll("#table-body tr");
            if (filas.length === 0) return alert("Tabla vacía.");
            const btn = document.querySelector(".btn-cloud");
            btn.innerText = "⏳..."; btn.disabled = true;

            const data = {
                fecha: document.getElementById('sel-fecha').value,
                tipo: document.getElementById('sel-tipo').value,
                rows: Array.from(filas).map(tr => ({
                    sitio: tr.cells[0].innerText,
                    torrero: tr.cells[1].innerText,
                    asignado: tr.querySelector('.table-input').value,
                    falla: tr.cells[3].innerText,
                    estado: tr.querySelector('.table-select').value,
                    comentarios: tr.querySelector('.table-textarea').value
                }))
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("✅ Guardado con éxito.");
            } catch (e) { alert("Error al guardar."); }
            finally { btn.innerText = "☁️ GUARDAR"; btn.disabled = false; }
        }

        async function consultarNube() {
            const f = document.getElementById('busq-fecha').value;
            const t = document.getElementById('busq-tipo').value;
            if(!f) return alert("Elige fecha.");
            try {
                const r = await fetch(`${SCRIPT_URL}?fecha=${f}&tipo=${t}`);
                const data = await r.json();
                if(data.length === 0) return alert("Sin registros.");
                
                document.getElementById('table-body').innerHTML = '';
                data.forEach(item => {
                    siteSelected = { full: item.sitio, torrero: item.torrero };
                    addRow(); // Reutiliza lógica
                    const lastRow = document.querySelector("#table-body tr:last-child");
                    lastRow.querySelector('.table-input').value = item.asignado;
                    lastRow.querySelector('.table-select').value = item.estado;
                    lastRow.querySelector('.table-textarea').value = item.comentarios;
                    autoResize(lastRow.querySelector('.table-textarea'));
                });
            } catch (e) { alert("Error al buscar."); }
        }
    </script>
</body>
</html>
