<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Command Center - Operaciones SV</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00a1ff;
            --accent: #22c55e;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(0, 161, 255, 0.3);
            /* Colores Formato Azul Corporativo */
            --report-blue: #4472c4;
            --report-light: #d9e1f2;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        /* --- HEADER --- */
        header {
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            padding: 25px 0;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* --- CONTENEDORES --- */
        .container {
            width: 95%;
            max-width: 1200px;
            margin-top: 30px;
        }

        /* --- BUSCADOR --- */
        .search-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        #siteSearch {
            width: 100%;
            padding: 22px 25px;
            font-size: 1.1rem;
            border-radius: 18px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            color: white;
            outline: none;
            box-shadow: 0 0 20px rgba(0, 161, 255, 0.1);
        }

        #siteSearch:focus {
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(0, 161, 255, 0.3);
        }

        .suggestions {
            position: absolute;
            top: 105%;
            left: 0;
            right: 0;
            background: #1e293b;
            border-radius: 15px;
            max-height: 350px;
            overflow-y: auto;
            z-index: 2000;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: none;
        }

        .sug-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sug-item:hover { background: rgba(0, 161, 255, 0.15); }

        /* --- PANEL DE CONFIGURACIÓN --- */
        .config-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
            display: none;
            animation: slideUp 0.4s ease;
        }

        .site-header-info {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tech-card {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }

        .tech-card:hover { background: rgba(255,255,255,0.05); }

        .btn-add-master {
            width: 100%;
            padding: 20px;
            margin-top: 25px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(90deg, #0077ff, #00d4ff);
            color: white;
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 119, 255, 0.4);
        }

        /* --- ÁREA DE CAPTURA (ESTILO EXCEL CORPORATIVO) --- */
        .capture-container {
            background: white !important;
            padding: 50px;
            border-radius: 4px;
            width: 1180px; /* Ancho optimizado para reportes */
            margin-top: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .report-top-bar {
            background: var(--report-blue) !important;
            color: white !important;
            text-align: center;
            padding: 12px;
            border: 2px solid #000;
            font-weight: 800;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: -2px;
        }

        .main-table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000;
            table-layout: fixed;
        }

        .main-table th {
            background: var(--report-blue) !important;
            color: white !important;
            padding: 15px 10px;
            font-size: 13px;
            border: 1px solid #000;
            text-transform: uppercase;
        }

        .main-table td {
            border: 1px solid #000;
            background: var(--report-light) !important;
            color: #000 !important;
            font-size: 13px;
            height: 60px;
            text-align: center;
            vertical-align: middle;
            padding: 0;
            position: relative;
        }

        .main-table tr:nth-child(even) td {
            background: #ffffff !important;
        }

        /* Edición dentro de tabla */
        .cell-input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-family: 'Inter';
            font-size: 13px;
            color: #000;
            padding: 10px;
            outline: none;
        }

        .cell-textarea {
            text-align: left !important;
            resize: none;
            overflow: hidden;
        }

        .export-label {
            display: none;
            padding: 10px;
            font-weight: 600;
            word-wrap: break-word;
        }

        /* --- ESTADOS DE EXPORTACIÓN --- */
        .is-exporting .no-capture,
        .is-exporting .cell-input { display: none !important; }
        .is-exporting .export-label { display: block !important; }

        /* --- BOTONES DE ACCIÓN --- */
        .floating-actions {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            width: 95%;
            max-width: 1200px;
        }

        .btn-action {
            flex: 1;
            padding: 20px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-png { background: #fff; color: var(--report-blue); border: 2px solid var(--report-blue); }
        .btn-wa { background: #22c55e; color: white; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>NOC OPERACIONES SV - REPORTING SYSTEM</h1>
</header>

<div class="container">
    <div class="search-wrapper">
        <input type="text" id="siteSearch" placeholder="🔍 BUSCAR SITEID, NOMBRE DE SITIO O NIC/NIS..." autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
    </div>

    <div id="configPanel" class="config-panel">
        <div class="site-header-info">
            <h2 id="displaySiteName" style="margin:0; font-family:'Orbitron'; color:var(--primary);"></h2>
            <p id="displaySiteMeta" style="margin:5px 0 0 0; opacity:0.7; font-size:0.9rem;"></p>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-size:0.7rem; font-weight:800; color:var(--primary); text-transform:uppercase;">Asignación de Personal Técnico (Desde DB):</label>
            <div id="techGrid" class="tech-grid"></div>
        </div>

        <button class="btn-add-master" onclick="commitToTable()">INSERTAR EN REPORTE TÉCNICO</button>
    </div>

    <div id="captureArea" class="capture-container">
        <div class="report-top-bar">
            <input type="text" id="reportTitle" value="CORTE PROGRAMADO" style="background:transparent; border:none; color:white; font-weight:900; text-align:right; width:45%; font-size:20px; outline:none; text-transform:uppercase;">
            <span>-</span>
            <input type="text" id="reportDate" value="24/04/2026" style="background:transparent; border:none; color:white; font-weight:900; text-align:left; width:45%; font-size:20px; outline:none;">
        </div>

        <table class="main-table">
            <thead>
                <tr>
                    <th style="width:12%">Distribuidora</th>
                    <th style="width:12%">Horario</th>
                    <th style="width:25%">Sitio / Nodo</th>
                    <th style="width:16%">Personal Asignado</th>
                    <th style="width:10%">Torrero</th>
                    <th style="width:17%">Comentario Técnico</th>
                    <th style="width:8%">NIC</th>
                    <th class="no-capture" style="width:35px; background:white !important;"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div class="floating-actions">
        <button class="btn-action btn-png" onclick="exportToPNG()">💾 GENERAR REPORTE PNG HD</button>
        <button class="btn-action btn-wa" onclick="window.open('https://wa.me/')">📱 COMPARTIR POR WHATSAPP</button>
    </div>
</div>

<script>
    let dbSitios = [];
    let siteActive = null;
    
    // URLs de Datos
    const SITIOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv';
    const TECNICOS_CSV = 'tecnicos.csv'; // Asegúrate de que esté en la misma carpeta

    // 1. INICIALIZACIÓN Y CARGA DE DATOS
    window.onload = () => {
        // Cargar Sitios
        Papa.parse(SITIOS_CSV, {
            download: true, header: true,
            complete: (results) => {
                dbSitios = results.data.filter(s => s.SITEID);
                console.log("Base de datos de sitios cargada.");
            }
        });

        // Cargar Técnicos
        Papa.parse(TECNICOS_CSV, {
            download: true, header: true,
            complete: (results) => {
                const grid = document.getElementById('techGrid');
                results.data.forEach(t => {
                    if(t.Nombre) {
                        grid.innerHTML += `
                            <label class="tech-card">
                                <input type="checkbox" value="${t.Nombre}" style="accent-color:var(--primary)">
                                ${t.Nombre}
                            </label>`;
                    }
                });
            }
        });

        // Set Fecha Actual
        const hoy = new Date();
        document.getElementById('reportDate').value = hoy.toLocaleDateString();
    };

    // 2. MOTOR DE BÚSQUEDA TRIPLE
    document.getElementById('siteSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const sugBox = document.getElementById('suggestions');
        
        if (query.length < 2) { sugBox.style.display = 'none'; return; }

        const matches = dbSitios.filter(s => 
            String(s.SITEID).toLowerCase().includes(query) || 
            String(s['NOMBRE DE SITIO']).toLowerCase().includes(query) ||
            String(s['NIC/NIS']).toLowerCase().includes(val)
        ).slice(0, 10);

        sugBox.innerHTML = matches.map(s => `
            <div class="sug-item" onclick="selectSite('${s.SITEID}')">
                <div>
                    <b style="color:var(--primary)">${s.SITEID}</b> - ${s['NOMBRE DE SITIO']}
                </div>
                <span style="font-size:0.7rem; background:#004488; padding:3px 8px; border-radius:5px;">NIC: ${s['NIC/NIS'] || '---'}</span>
            </div>
        `).join('');
        sugBox.style.display = matches.length ? 'block' : 'none';
    });

    function selectSite(id) {
        siteActive = dbSitios.find(s => s.SITEID === id);
        document.getElementById('suggestions').style.display = 'none';
        document.getElementById('siteSearch').value = siteActive.SITEID;
        
        // Abrir Panel de Configuración
        document.getElementById('configPanel').style.display = 'block';
        document.getElementById('displaySiteName').innerText = `${siteActive.SITEID} - ${siteActive['NOMBRE DE SITIO']}`;
        document.getElementById('displaySiteMeta').innerText = `Distribuidora: ${siteActive.Distribuidora || 'N/A'} | Propietario: ${siteActive.Propietario || 'N/A'}`;
        
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }

    // 3. PASAR DATOS A LA TABLA MAESTRA
    function commitToTable() {
        if(!siteActive) return;

        const techs = Array.from(document.querySelectorAll('#techGrid input:checked'))
                           .map(i => i.value).join(' / ') || 'SIN ASIGNAR';
        
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>
                <input type="text" class="cell-input" value="${siteActive.Distribuidora || ''}">
                <div class="export-label">${siteActive.Distribuidora || ''}</div>
            </td>
            <td>
                <input type="text" class="cell-input" value="9:00 AM - 4:00 PM">
                <div class="export-label">9:00 AM - 4:00 PM</div>
            </td>
            <td style="color:#4472c4; font-weight:900;">
                ${siteActive.SITEID}<br>${siteActive['NOMBRE DE SITIO']}
            </td>
            <td style="font-weight:700; font-size:11px; line-height:1.2;">${techs}</td>
            <td>${siteActive.Propietario || 'N/A'}</td>
            <td>
                <textarea class="cell-input cell-textarea" rows="2" oninput="syncText(this)">Corte programado por mantenimiento de red.</textarea>
                <div class="export-label">Corte programado por mantenimiento de red.</div>
            </td>
            <td style="color:#4472c4; font-weight:900;">${siteActive['NIC/NIS'] || '---'}</td>
            <td class="no-capture" style="background:white !important; text-align:center;">
                <button onclick="this.closest('tr').remove()" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold; font-size:20px;">×</button>
            </td>
        `;

        tbody.appendChild(tr);
        
        // Reset y Scroll
        document.getElementById('configPanel').style.display = 'none';
        document.querySelectorAll('#techGrid input').forEach(i => i.checked = false);
        document.getElementById('siteSearch').value = '';
        document.getElementById('captureArea').scrollIntoView({ behavior: 'smooth' });
    }

    function syncText(el) {
        el.nextElementSibling.innerText = el.value;
    }

    // 4. GENERACIÓN DE IMAGEN PROFESIONAL
    async function exportToPNG() {
        const area = document.getElementById('captureArea');
        const btn = document.querySelector('.btn-png');
        
        btn.innerText = "⏳ PROCESANDO IMAGEN...";
        btn.disabled = true;

        // Sincronizar todos los campos antes de capturar
        area.querySelectorAll('.cell-input').forEach(input => {
            if(input.nextElementSibling) input.nextElementSibling.innerText = input.value;
        });

        area.classList.add('is-exporting');

        try {
            const canvas = await html2canvas(area, {
                scale: 3, // Calidad ultra HD
                backgroundColor: "#ffffff",
                useCORS: true,
                logging: false
            });

            const link = document.createElement('a');
            link.download = `REPORTE_NOC_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        } catch (err) {
            console.error("Error en exportación:", err);
            alert("Error al generar la imagen.");
        } finally {
            area.classList.remove('is-exporting');
            btn.innerText = "💾 GENERAR REPORTE PNG HD";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
