<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CONTROL TURNOS v24.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc;
            --border: #e2e8f0; --danger: #ef4444; --radius: 10px;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Interfaz */
        .sidebar { width: 300px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #334155; overflow-y: auto; transition: 0.3s; }
        .sidebar.hidden { margin-left: -300px; }
        
        .section-title { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .draggable-group { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: var(--radius); cursor: grab; margin-bottom: 5px; }
        .group-tag { font-size: 0.6rem; color: var(--primary); font-weight: 800; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-nav { height: 60px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }

        /* Calendario */
        .calendar-container { flex-grow: 1; overflow-y: auto; padding: 15px; background: white; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .days-row { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 10px; }
        
        .day { border: 1px solid var(--border); border-radius: var(--radius); min-height: 150px; padding: 8px; display: flex; flex-direction: column; gap: 5px; position: relative; }
        .day.weekend { background: #f8fafc; }
        .day-header { display: flex; justify-content: space-between; font-weight: 800; font-size: 0.8rem; color: #64748b; }

        /* Tarjetas de Turno */
        .turno-card { border-radius: 6px; padding: 6px; font-size: 0.65rem; border-left: 3px solid #cbd5e1; background: #f1f5f9; position: relative; }
        .turno-card.principal { border-left-color: var(--primary); background: #eff6ff; }
        .names { font-weight: 700; color: #1e293b; display: block; }
        .edit-btn { position: absolute; right: 4px; top: 4px; font-size: 0.6rem; color: var(--primary); cursor: pointer; display: var(--ui-display, block); }

        /* Cuadro de Bajas Automático */
        .baja-box { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 6px; padding: 5px; margin-top: auto; }
        .baja-text { color: #e11d48; font-size: 0.6rem; font-weight: 800; display: block; }
        .baja-name { color: #881337; font-size: 0.65rem; font-weight: 700; }

        /* Botones */
        .btn { padding: 8px 12px; border-radius: 6px; border: none; font-size: 0.75rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; width: 320px; padding: 20px; border-radius: 12px; }

        /* Estilo para impresión/tecnicos */
        @media print { .sidebar, .top-nav, .edit-btn { display: none !important; } }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <h2><i class="fas fa-shield-alt"></i> PANEL ADMIN</h2>
    
    <div class="section-title">Bajas Médicas</div>
    <div style="background:#1e293b; padding:10px; border-radius:8px;">
        <select id="aus-tecnico" style="width:100%; padding:6px; margin-bottom:5px; border-radius:4px;"></select>
        <input type="date" id="aus-fecha" style="width:100%; padding:6px; border-radius:4px;">
        <button class="btn btn-blue" style="width:100%; margin-top:8px; font-size:0.65rem;" onclick="addAbsence()">REGISTRAR BAJA</button>
    </div>

    <div class="section-title">Grupos (Drag)</div>
    <div id="sidebar-groups"></div>

    <div class="section-title">Sincronización</div>
    <button class="btn btn-blue" style="width:100%; background:#10b981;" onclick="syncWithSheets()">
        <i class="fas fa-sync"></i> NUBE GOOGLE
    </button>
    
    <button class="btn btn-outline" style="margin-top:auto" onclick="toggleView()">
        <i class="fas fa-eye"></i> VISTA TÉCNICOS
    </button>
</aside>

<main class="main-content">
    <header class="top-nav">
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn btn-outline" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
            <div class="month-label" id="month-display"></div>
            <button class="btn btn-outline" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-outline" onclick="capture()"><i class="fas fa-camera"></i> CAPTURAR 4K</button>
        </div>
    </header>

    <div class="calendar-container" id="capture-area">
        <div class="days-row">
            <span>LUNES</span><span>MARTES</span><span>MIÉRCOLES</span><span>JUEVES</span><span>VIERNES</span>
            <span>SÁBADO</span><span>DOMINGO</span>
        </div>
        <div class="grid" id="grid"></div>
    </div>
</main>

<div id="modal">
    <div class="modal-box">
        <h3>Editar Turno</h3>
        <input type="hidden" id="m-id"><input type="hidden" id="m-idx">
        <select id="sel-t1" style="width:100%; padding:8px; margin-bottom:10px;"></select>
        <select id="sel-t2" style="width:100%; padding:8px; margin-bottom:15px;"></select>
        <button class="btn btn-blue" style="width:100%" onclick="confirmEdit()">GUARDAR</button>
        <button class="btn btn-outline" style="width:100%; margin-top:8px" onclick="closeModal()">CANCELAR</button>
    </div>
</div>

<script>
    const DB_KEY = "SISTEMA_V24_1";
    const SHEETS_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // <--- Pegar aquí el enlace
    const START_REF = new Date(2026, 2, 7);
    let currentView = new Date();
    let state = {
        tecnicos: [],
        gBase: {},
        db: JSON.parse(localStorage.getItem(DB_KEY)) || { manual: {}, absences: {}, locks: {} }
    };

    async function init() {
        await loadCSV();
        renderSidebar();
        renderCalendar();
    }

    // Lógica de Bajas y Filtrado
    function isTechnicianOnLeave(name, dateId) {
        return state.db.absences[dateId]?.includes(name);
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const y = currentView.getFullYear(), m = currentView.getMonth();
        document.getElementById('month-display').innerText = new Intl.DateTimeFormat('es-ES', {month:'long', year:'numeric'}).format(currentView);

        const offset = (new Date(y, m, 1).getDay() || 7) - 1;
        const total = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<offset; i++) grid.innerHTML += `<div style="border:none"></div>`;

        for(let d=1; d<=total; d++) {
            const dateId = `${y}-${m+1}-${d}`;
            const date = new Date(y, m, d);
            let turnos = state.db.locks[dateId] ? (state.db.manual[dateId] || []) : getAutoTurno(date);

            const cell = document.createElement('div');
            cell.className = `day ${[0,6].includes(date.getDay())?'weekend':''}`;
            cell.ondrop = e => handleDrop(e, dateId);
            cell.ondragover = e => e.preventDefault();

            // Renderizar turnos filtrando los que están de baja
            let htmlTurnos = turnos.map((group, idx) => {
                const t1 = isTechnicianOnLeave(group[0], dateId) ? "" : group[0];
                const t2 = isTechnicianOnLeave(group[1], dateId) ? "" : group[1];
                
                return `
                <div class="turno-card ${idx===0?'principal':''}">
                    <i class="fas fa-edit edit-btn" onclick="openEditor('${dateId}',${idx})"></i>
                    <span class="names">${t1 || '<span style="color:#94a3b8; font-weight:400">VACANTE</span>'}</span>
                    <span class="names">${t2 || '<span style="color:#94a3b8; font-weight:400">VACANTE</span>'}</span>
                </div>`;
            }).join('');

            // Cuadro de bajas automático abajo
            let htmlBajas = "";
            if(state.db.absences[dateId]?.length > 0) {
                htmlBajas = `<div class="baja-box">
                    <span class="baja-text">BAJA <i class="fas fa-times" style="float:right; cursor:pointer" onclick="clearAbsence('${dateId}')"></i></span>
                    ${state.db.absences[dateId].map(n => `<span class="baja-name">${n}</span>`).join('')}
                </div>`;
            }

            cell.innerHTML = `
                <div class="day-header"><span>${d}</span>
                <i class="fas ${state.db.locks[dateId]?'fa-lock':'fa-lock-open'}" style="opacity:0.2;cursor:pointer" onclick="toggleLock('${dateId}')"></i></div>
                ${htmlTurnos} ${htmlBajas}`;
            grid.appendChild(cell);
        }
    }

    // Funciones de Google Sheets (Preparadas)
    async function syncWithSheets() {
        if(SHEETS_URL === "TU_URL_DE_APPS_SCRIPT_AQUI") {
            alert("Por favor, configura la URL de Apps Script en el código.");
            return;
        }
        try {
            const response = await fetch(SHEETS_URL, {
                method: 'POST',
                body: JSON.stringify(state.db)
            });
            alert("Sincronización completada con éxito.");
        } catch (e) { alert("Error al conectar con Google Sheets."); }
    }

    // Funciones de Vista
    function toggleView() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('hidden');
        document.documentElement.style.setProperty('--ui-display', sb.classList.contains('hidden') ? 'none' : 'block');
    }

    function capture() {
        const area = document.getElementById('capture-area');
        html2canvas(area, {scale: 3, useCORS: true}).then(canvas => {
            const link = document.createElement('a');
            link.download = `CUADRANTE_${currentView.getMonth()+1}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // Lógica interna (mantenida de v23.7)
    async function loadCSV() {
        try {
            const r = await fetch('tecnicos.csv');
            const d = await r.text();
            const lines = d.split(/\r?\n/).slice(1);
            lines.forEach(l => {
                const [n, g] = l.split(/[;,]/).map(s => s.trim().toUpperCase());
                if(n) {
                    state.tecnicos.push(n);
                    if(g) { if(!state.gBase[g]) state.gBase[g]=[]; state.gBase[g].push(n); }
                }
            });
        } catch (e) { console.warn("Usando datos locales, CSV no detectado."); }
    }

    function getAutoTurno(date) {
        if (date.getDay() !== 6 && date.getDay() !== 0) return [];
        const diff = Math.floor((date - START_REF) / 86400000);
        const cycle = Math.floor(diff / 7) % 4;
        const map = { 0:["1","2"], 1:["3","4"], 2:["2","1"], 3:["4","3"] };
        return [ [...(state.gBase[map[cycle][0]] || [])], [...(state.gBase[map[cycle][1]] || [])] ];
    }

    function addAbsence() {
        const t = document.getElementById('aus-tecnico').value, f = document.getElementById('aus-fecha').value;
        if(!t || !f) return;
        const id = `${f.split('-')[0]}-${parseInt(f.split('-')[1])}-${parseInt(f.split('-')[2])}`;
        if(!state.db.absences[id]) state.db.absences[id] = [];
        if(!state.db.absences[id].includes(t)) state.db.absences[id].push(t);
        save(); renderCalendar();
    }

    function clearAbsence(id) { delete state.db.absences[id]; save(); renderCalendar(); }
    function save() { localStorage.setItem(DB_KEY, JSON.stringify(state.db)); }
    function changeMonth(v) { currentView.setMonth(currentView.getMonth() + v); renderCalendar(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function toggleLock(id) { state.db.locks[id] = !state.db.locks[id]; save(); renderCalendar(); }

    function renderSidebar() {
        const cont = document.getElementById('sidebar-groups');
        Object.keys(state.gBase).forEach(g => {
            const div = document.createElement('div');
            div.className = "draggable-group"; div.draggable = true;
            div.innerHTML = `<span class="group-tag">GRUPO ${g}</span><div style="font-size:0.7rem">${state.gBase[g].join('<br>')}</div>`;
            div.ondragstart = e => e.dataTransfer.setData("text/group", JSON.stringify(state.gBase[g]));
            cont.appendChild(div);
        });
        const opts = state.tecnicos.map(t=>`<option value="${t}">${t}</option>`).join('');
        document.getElementById('aus-tecnico').innerHTML = document.getElementById('sel-t1').innerHTML = document.getElementById('sel-t2').innerHTML = `<option value="">VACANTE</option>` + opts;
    }

    window.onload = init;
</script>
</body>
</html>
