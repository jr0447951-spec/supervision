<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN v21.9 - Referencia Semanal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sidebar: #0f172a; --accent: #2563eb; --bg: #f1f5f9; 
            --card: #ffffff; --locked: #ef4444; --unlocked: #10b981;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; }
        .sidebar h4 { color: #94a3b8; margin-top: 20px; margin-bottom: 10px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .draggable-group { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; margin-bottom: 8px; cursor: grab; transition: 0.2s; }
        .draggable-group:hover { border-color: var(--accent); background: #26354d; }
        .draggable-group.custom-group { border: 1px dashed #64748b; background: rgba(37, 99, 235, 0.1); }
        .group-tag { font-size: 0.6rem; font-weight: bold; color: var(--accent); margin-bottom: 4px; display: block; }

        /* CALENDARIO ESTRUCTURA */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .nav-bar { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        
        /* CABECERA DE DÍAS (Lunes, Martes...) */
        .days-header-row { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            background: #f8fafc; padding: 10px 15px; border-bottom: 1px solid #e2e8f0;
            text-align: center; font-size: 0.75rem; font-weight: 800; color: #64748b;
        }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        
        .day { background: var(--card); border-radius: 8px; border: 1px solid #e2e8f0; padding: 8px; min-height: 140px; position: relative; }
        .day.weekend { background: #f1f5f9; } /* Color diferente para sábados y domingos */
        .day.drag-over { border: 2px dashed var(--accent); background: #eff6ff; }
        .day.is-locked { border-top: 4px solid var(--locked); }

        .day-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8rem; color: #64748b; margin-bottom: 5px; }
        
        .group-container { display: flex; flex-direction: column; gap: 4px; }
        .turno-card { padding: 6px 8px; border-radius: 4px; font-size: 0.65rem; border-left: 3px solid #94a3b8; background: #f8fafc; position: relative; }
        .principal { border-left-color: var(--accent); background: #eff6ff; }
        .edit-group-btn { position: absolute; right: 5px; top: 5px; font-size: 0.7rem; color: var(--accent); cursor: pointer; opacity: 0.3; }
        .turno-card:hover .edit-group-btn { opacity: 1; }
        
        .names { font-weight: 700; color: #1e293b; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* MODAL */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; backdrop-filter: blur(2px); }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 380px; }
        .btn { padding: 10px 15px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--accent); color: white; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; margin-top: 5px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3><i class="fas fa-calendar-alt"></i> ADMIN v21.9</h3>
    
    <h4><i class="fas fa-layer-group"></i> Arrastrar Grupos</h4>
    <div id="sidebar-groups"></div>

    <h4><i class="fas fa-user-clock"></i> Registrar Falta</h4>
    <div style="background: #1e293b; padding: 12px; border-radius: 8px;">
        <select id="aus-tecnico" style="width:100%;"></select>
        <input type="date" id="aus-fecha" style="width:100%; margin: 8px 0;">
        <button class="btn btn-blue" style="width:100%; font-size:0.7rem;" onclick="agregarAusencia()">REGISTRAR</button>
    </div>

    <button class="btn btn-blue" style="margin-top:auto; width:100%" onclick="saveAll()">
        <i class="fas fa-save"></i> GUARDAR TODO
    </button>
</aside>

<main class="main">
    <div class="nav-bar">
        <button class="btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2 id="mesTitulo"></h2>
        <button class="btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="days-header-row">
        <div>LUNES</div>
        <div>MARTES</div>
        <div>MIÉRCOLES</div>
        <div>JUEVES</div>
        <div>VIERNES</div>
        <div style="color: var(--accent)">SÁBADO</div>
        <div style="color: var(--accent)">DOMINGO</div>
    </div>

    <div class="grid" id="grid"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <input type="hidden" id="mId">
        <input type="hidden" id="mGroupIdx">
        <h3 id="mTitle" style="margin:0">Editar Grupo</h3>
        <p id="mGroupName" style="font-weight:bold; color:var(--accent); font-size:0.8rem; margin-bottom:15px;"></p>
        <div style="margin-bottom:10px;"><label style="font-size:0.7rem;">TÉCNICO 1</label><select id="select-t1"></select></div>
        <div style="margin-bottom:15px;"><label style="font-size:0.7rem;">TÉCNICO 2</label><select id="select-t2"></select></div>
        <div style="display:grid; gap:8px;">
            <button class="btn btn-blue" onclick="saveGroupChanges()">GUARDAR</button>
            <button class="btn" onclick="closeModal()" style="background:#e2e8f0;">CANCELAR</button>
            <button class="btn" onclick="deleteGroup()" style="background:#fee2e2; color:#ef4444;">ELIMINAR GRUPO</button>
        </div>
    </div>
</div>

<script>
    let currentMonth = new Date();
    let tecnicosIndiv = [];
    let gBase = {}; 
    const DB_KEY = 'admin_v21_9';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { manual: {}, locks: {}, ausencias: {} };

    // --- CARGAR CSV Y CONFIGURAR SIDEBAR ---
    async function cargarTecnicosCSV() {
        try {
            const response = await fetch('tecnicos.csv');
            const data = await response.text();
            const filas = data.split(/\r?\n/).slice(1);
            tecnicosIndiv = []; gBase = {};
            filas.forEach(fila => {
                if (fila.trim() === "") return;
                const partes = fila.split(';');
                const nombre = partes[0]?.trim().toUpperCase();
                const grupo = partes[1]?.trim() || "";
                if(nombre) {
                    tecnicosIndiv.push(nombre);
                    if (grupo) {
                        if (!gBase[grupo]) gBase[grupo] = [];
                        gBase[grupo].push(nombre);
                    }
                }
            });
            gBase["5"] = ["-- VACANTE --", "-- VACANTE --"];
            renderSidebarGroups();
            render();
        } catch (e) { console.error(e); }
    }

    function renderSidebarGroups() {
        const container = document.getElementById('sidebar-groups');
        container.innerHTML = "";
        Object.keys(gBase).sort().forEach(gNum => {
            const div = document.createElement('div');
            const isG5 = gNum === "5";
            div.className = `draggable-group ${isG5 ? 'custom-group' : ''}`;
            div.draggable = true;
            div.innerHTML = `
                <span class="group-tag">GRUPO ${gNum} ${isG5 ? '(VACANTE)' : ''}</span>
                <div class="group-names">${isG5 ? 'Click para configurar técnicos' : gBase[gNum].join('<br>')}</div>
            `;
            div.ondragstart = (e) => {
                const data = isG5 ? ["", ""] : gBase[gNum];
                e.dataTransfer.setData("text/plain", JSON.stringify(data));
            };
            container.appendChild(div);
        });
        document.getElementById('aus-tecnico').innerHTML = tecnicosIndiv.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    // --- LÓGICA DE CALENDARIO ---
    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentMonth).toUpperCase();

        const totalDays = new Date(y, m + 1, 0).getDate();
        // Ajuste para que la semana empiece en Lunes (0=Domingo en JS, lo pasamos a 6)
        let firstDayIndex = new Date(y, m, 1).getDay();
        const startOffset = (firstDayIndex === 0) ? 6 : firstDayIndex - 1;

        for(let i=0; i<startOffset; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=totalDays; d++) {
            const id = `${y}-${m+1}-${d}`;
            const dateObj = new Date(y, m, d);
            const isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
            const isLocked = db.locks[id] || false;
            let grupos = db.manual[id] || getAutoTurno(dateObj) || [];

            const cell = document.createElement('div');
            cell.className = `day ${isWeekend ? 'weekend' : ''} ${isLocked ? 'is-locked' : ''}`;
            
            cell.ondragover = (e) => { e.preventDefault(); cell.classList.add('drag-over'); };
            cell.ondragleave = () => cell.classList.remove('drag-over');
            cell.ondrop = (e) => {
                e.preventDefault(); cell.classList.remove('drag-over');
                const nuevosTecnicos = JSON.parse(e.dataTransfer.getData("text/plain"));
                if (!db.manual[id]) {
                    const auto = getAutoTurno(new Date(id.replace(/-/g, '/')));
                    db.manual[id] = auto ? JSON.parse(JSON.stringify(auto)) : [];
                }
                db.manual[id].push(nuevosTecnicos);
                db.locks[id] = true; render();
            };

            let htmlGrupos = grupos.map((integrantes, idx) => {
                const t1 = integrantes[0] || "", t2 = integrantes[1] || "";
                const t1D = t1 && estaAusente(t1, id) ? `<span style="color:red">FALTA</span>` : (t1 || '--');
                const t2D = t2 && estaAusente(t2, id) ? `<span style="color:red">FALTA</span>` : (t2 || '--');
                const tipo = idx === 0 ? "PRINCIPAL" : "APOYO";
                return `
                    <div class="turno-card ${idx===0?'principal':''}">
                        <i class="fas fa-edit edit-group-btn" onclick="openGroupModal('${id}', ${idx}, '${tipo}', ${d})"></i>
                        <span style="font-size:0.5rem; font-weight:bold; opacity:0.6">${tipo}</span>
                        <div class="names">${t1D}</div>
                        <div class="names">${t2D}</div>
                    </div>`;
            }).join('');

            cell.innerHTML = `
                <div class="day-header"><span>${d}</span><i class="fas ${isLocked?'fa-lock locked':'fa-lock-open unlocked'} cell-lock" onclick="toggleLock(event, id)"></i></div>
                <div class="group-container">${htmlGrupos}</div>`;
            
            // Función toggleLock corregida
            const lockIcon = cell.querySelector('.cell-lock');
            lockIcon.onclick = (e) => { e.stopPropagation(); db.locks[id] = !db.locks[id]; render(); };

            grid.appendChild(cell);
        }
    }

    function getAutoTurno(dateObj) {
        const refDate = new Date(2026, 2, 7); 
        const diffDays = Math.floor((dateObj - refDate) / (1000*60*60*24));
        const numSemanas = Math.floor(diffDays / 7);
        if ((dateObj.getDay() !== 6 && dateObj.getDay() !== 0) || numSemanas < 0) return null;
        const ciclo = numSemanas % 4;
        let pG, aG;
        switch(ciclo) {
            case 0: pG = "1"; aG = "2"; break;
            case 1: pG = "3"; aG = "4"; break;
            case 2: pG = "2"; aG = "1"; break;
            case 3: pG = "4"; aG = "3"; break;
        }
        return [ gBase[pG] || ["", ""], gBase[aG] || ["", ""] ];
    }

    function openGroupModal(id, gIdx, tipo, dia) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('mId').value = id;
        document.getElementById('mGroupIdx').value = gIdx;
        document.getElementById('mGroupName').innerText = `${tipo} - Día ${dia}`;
        let data = db.manual[id] || getAutoTurno(new Date(id.replace(/-/g, '/')));
        const current = data[gIdx] || ["", ""];
        const gen = (sel) => `<option value="">-- VACANTE --</option>` + tecnicosIndiv.map(n => `<option value="${n}" ${estaAusente(n, id)?'disabled':''} ${n===sel?'selected':''}>${n}</option>`).join('');
        document.getElementById('select-t1').innerHTML = gen(current[0]);
        document.getElementById('select-t2').innerHTML = gen(current[1]);
    }

    function saveGroupChanges() {
        const id = document.getElementById('mId').value, idx = parseInt(document.getElementById('mGroupIdx').value);
        if (!db.manual[id]) db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(new Date(id.replace(/-/g, '/')))));
        db.manual[id][idx] = [document.getElementById('select-t1').value, document.getElementById('select-t2').value];
        db.locks[id] = true; render(); closeModal();
    }

    function deleteGroup() {
        const id = document.getElementById('mId').value, idx = parseInt(document.getElementById('mGroupIdx').value);
        db.manual[id].splice(idx, 1); db.locks[id] = true; render(); closeModal();
    }

    function estaAusente(n, f) { return db.ausencias[f]?.includes(n); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function changeMonth(v) { currentMonth.setMonth(currentMonth.getMonth()+v); render(); }
    function saveAll() { localStorage.setItem(DB_KEY, JSON.stringify(db)); alert("✅ Guardado local."); }
    function agregarAusencia() {
        const t = document.getElementById('aus-tecnico').value, fV = document.getElementById('aus-fecha').value;
        if(!fV) return; const f = fV.split('-'); const id = `${f[0]}-${parseInt(f[1])}-${parseInt(f[2])}`;
        if(!db.ausencias[id]) db.ausencias[id] = []; db.ausencias[id].push(t); render();
    }
    window.onload = cargarTecnicosCSV;
</script>
</body>
</html>
