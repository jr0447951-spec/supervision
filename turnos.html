<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Supervisión Pro - Gestión de Cambios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --panel: #1e293b; --accent: #3b82f6; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        
        /* Panel Izquierdo */
        .sidebar { width: 380px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .group-editor { background: var(--panel); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .group-editor h3 { font-size: 0.9rem; color: var(--accent); margin-top: 0; display: flex; justify-content: space-between; }
        .input-tecnico { background: transparent; border: none; border-bottom: 1px solid #334155; color: white; width: 100%; padding: 5px 0; font-size: 0.8rem; margin-bottom: 5px; }
        .input-tecnico:focus { border-color: var(--accent); outline: none; }

        /* Arrastrables */
        .drag-handle { background: var(--accent); color: white; padding: 10px; border-radius: 6px; cursor: grab; text-align: center; font-weight: bold; margin-top: 10px; font-size: 0.85rem; }
        .drag-handle:active { cursor: grabbing; opacity: 0.8; }

        /* Calendario */
        .main-content { flex-grow: 1; padding: 25px; overflow-y: auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; background: #e2e8f0; padding: 10px; border-radius: 12px; }
        .day-cell { background: white; min-height: 120px; border-radius: 8px; padding: 10px; position: relative; }
        .day-header { text-align: center; font-weight: bold; color: #64748b; padding-bottom: 10px; }
        
        /* Turnos en Calendario */
        .turno-card { background: #eff6ff; border-left: 4px solid var(--accent); padding: 5px 8px; border-radius: 4px; font-size: 0.75rem; margin-top: 5px; position: relative; color: #1e40af; }
        .remove-btn { position: absolute; right: 5px; top: 2px; cursor: pointer; color: #94a3b8; }
        .remove-btn:hover { color: #ef4444; }

        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: auto; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2><i class="fas fa-users"></i> Grupos de Turno</h2>
    <p style="font-size: 0.75rem; color: #94a3b8;">Edita los nombres abajo y luego arrastra el botón azul al calendario:</p>

    <div id="config-grupos">
        <div class="group-editor">
            <h3>GRUPO 1 <i class="fas fa-edit"></i></h3>
            <input type="text" class="input-tecnico" id="g1_t1" value="JUAN MEJIA">
            <input type="text" class="input-tecnico" id="g1_t2" value="VALENTIN BOLAÑOS">
            <div class="drag-handle" draggable="true" ondragstart="drag(event, 'G1')">ASIGNAR GRUPO 1</div>
        </div>
        <div class="group-editor">
            <h3>GRUPO 2 <i class="fas fa-edit"></i></h3>
            <input type="text" class="input-tecnico" id="g2_t1" value="DOUGLAS VENTURA">
            <input type="text" class="input-tecnico" id="g2_t2" value="JOSE PALMA">
            <div class="drag-handle" draggable="true" ondragstart="drag(event, 'G2')">ASIGNAR GRUPO 2</div>
        </div>
        <div class="group-editor">
            <h3>GRUPO 3 <i class="fas fa-edit"></i></h3>
            <input type="text" class="input-tecnico" id="g3_t1" value="DANIEL MELENDEZ">
            <input type="text" class="input-tecnico" id="g3_t2" value="MIGUEL OCHOA">
            <div class="drag-handle" draggable="true" ondragstart="drag(event, 'G3')">ASIGNAR GRUPO 3</div>
        </div>
        <div class="group-editor">
            <h3>GRUPO 4 <i class="fas fa-edit"></i></h3>
            <input type="text" class="input-tecnico" id="g4_t1" value="EDGARDO SORIANO">
            <input type="text" class="input-tecnico" id="g4_t2" value="LUIS PALACIOS">
            <div class="drag-handle" draggable="true" ondragstart="drag(event, 'G4')">ASIGNAR GRUPO 4</div>
        </div>
    </div>

    <button class="btn-save" onclick="guardarConfig()"><i class="fas fa-save"></i> GUARDAR TODO</button>
</aside>

<main class="main-content">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h1 style="margin:0">Planificación Mensual</h1>
        <div id="mes-label" style="font-weight: bold; font-size: 1.2rem;">Marzo 2024</div>
    </div>

    <div class="calendar-grid" id="grid">
        <div class="day-header">Lun</div><div class="day-header">Mar</div><div class="day-header">Mié</div>
        <div class="day-header">Jue</div><div class="day-header">Vie</div><div class="day-header">Sáb</div>
        <div class="day-header">Dom</div>
        </div>
</main>

<script>
    let estado = JSON.parse(localStorage.getItem('turno_pro_v2')) || { asignaciones: {} };

    function render() {
        const grid = document.getElementById('grid');
        const headers = Array.from(grid.querySelectorAll('.day-header'));
        grid.innerHTML = "";
        headers.forEach(h => grid.appendChild(h));

        const fecha = new Date();
        const dias = new Date(fecha.getFullYear(), fecha.getMonth() + 1, 0).getDate();
        
        for(let d=1; d<=dias; d++) {
            const id = `${fecha.getFullYear()}-${fecha.getMonth()+1}-${d}`;
            const turnos = estado.asignaciones[id] || [];
            
            let htmlTurnos = turnos.map((t, i) => `
                <div class="turno-card">
                    <strong>${t.grupo}</strong><br>${t.tecnicos}
                    <span class="remove-btn" onclick="borrar('${id}', ${i})">&times;</span>
                </div>
            `).join('');

            grid.innerHTML += `
                <div class="day-cell" ondrop="drop(event, '${id}')" ondragover="allow(event)">
                    <span style="color:#94a3b8; font-size:0.8rem">${d}</span>
                    <div>${htmlTurnos}</div>
                </div>`;
        }
    }

    function drag(ev, grupoId) {
        // Al arrastrar, capturamos los nombres que están escritos en ese momento
        const t1 = document.getElementById(`${grupoId.toLowerCase()}_t1`).value;
        const t2 = document.getElementById(`${grupoId.toLowerCase()}_t2`).value;
        ev.dataTransfer.setData("grupo", grupoId);
        ev.dataTransfer.setData("tecnicos", `${t1} / ${t2}`);
    }

    function allow(ev) { ev.preventDefault(); }

    function drop(ev, dateId) {
        ev.preventDefault();
        const grupo = ev.dataTransfer.getData("grupo");
        const tecnicos = ev.dataTransfer.getData("tecnicos");
        
        if(!estado.asignaciones[dateId]) estado.asignaciones[dateId] = [];
        // Guardamos los nombres literales, eliminando el desfase futuro
        estado.asignaciones[dateId].push({ grupo, tecnicos });
        render();
    }

    function borrar(dateId, idx) {
        estado.asignaciones[dateId].splice(idx, 1);
        render();
    }

    function guardarConfig() {
        localStorage.setItem('turno_pro_v2', JSON.stringify(estado));
        alert("Configuración y turnos guardados.");
    }

    render();
</script>
</body>
</html>
