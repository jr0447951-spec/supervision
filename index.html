<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTE TÉCNICO - CRECIMIENTO VERTICAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #001a33; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Panel de configuración */
        .config-card { background: #003366; width: 100%; max-width: 900px; padding: 20px; border-radius: 12px; border: 1px solid #0059b3; margin-bottom: 20px; box-sizing: border-box; }
        .tech-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; background: #001a33; padding: 10px; border-radius: 8px; max-height: 150px; overflow-y: auto; margin: 10px 0; border: 1px solid #0059b3; }
        .tech-item { font-size: 0.75rem; display: flex; align-items: center; gap: 5px; color: #b3e6ff; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #0059b3; background: #001a33; color: white; box-sizing: border-box; }

        /* AREA DE CAPTURA - ANCHO FIJO */
        #capture-area {
            background: #ffffff; color: #002244; padding: 35px; 
            width: 1050px; /* Ancho total de la imagen */
            box-sizing: border-box;
        }

        .report-header { border-bottom: 4px solid #004488; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* TABLA CON CRECIMIENTO VERTICAL FORZADO */
        .excel-table { 
            width: 100%; border-collapse: collapse; 
            table-layout: fixed; /* Esto evita que el texto empuje las columnas hacia los lados */
            border: 1px solid #004488;
        }
        .excel-table th { background: #004488; color: white; padding: 10px; font-size: 0.7rem; text-transform: uppercase; }
        .excel-table td { 
            border: 1px solid #b3d9ff; padding: 10px; font-size: 0.75rem; 
            color: #002244; vertical-align: top;
            /* Lógica de salto de línea */
            word-wrap: break-word; 
            overflow-wrap: break-word; 
            white-space: normal; 
        }

        /* Definición de anchos de columna para que no se muevan */
        .col-sitio { width: 220px; }
        .col-torrero { width: 100px; }
        .col-tech { width: 180px; }
        .col-falla { width: 130px; }
        .col-estado { width: 150px; }
        .col-comentario { width: auto; } /* El comentario ocupa el resto */

        /* Estilo para los editables */
        .editable-cell { outline: none; min-height: 1.2em; }
        .table-select { border: none; background: transparent; font-family: inherit; font-size: 0.75rem; font-weight: 700; color: #004488; width: 100%; cursor: pointer; }

        .btn-remove { color: red; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 1.1rem; }
        .actions { display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 900px; }
        .btn-action { flex: 1; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        
        /* Buscador */
        .search-container { position: relative; }
        #suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: #003366; border: 1px solid #00d4ff; z-index: 100; display: none; border-radius: 0 0 8px 8px; }
        .sug-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #004488; font-size: 0.8rem; }
        .sug-item:hover { background: #00d4ff; color: #001a33; }
    </style>
</head>
<body>

    <div class="config-card">
        <h3>1. Encabezado</h3>
        <div style="display:flex; gap:10px;">
            <select id="sel-tipo" onchange="updateHeader()"><option>VISITAS REALIZADAS</option><option>PROGRAMACIÓN</option></select>
            <input type="date" id="sel-fecha" onchange="updateHeader()">
        </div>
        
        <h3>2. Agregar Sitio</h3>
        <div class="search-container">
            <input type="text" id="site-search" placeholder="Buscar sitio por ID o Nombre...">
            <div id="suggestions"></div>
        </div>

        <div id="form-site" style="display:none; margin-top:10px; border-top: 1px solid #0059b3; padding-top:10px;">
            <p style="font-size: 0.8rem; color: #00d4ff;">Torrero: <span id="label-torrero" style="color:white; font-weight:bold;"></span></p>
            <div id="tech-list" class="tech-selector"></div>
            <div style="display:flex; gap:10px;">
                <select id="sel-falla"><option>FDS</option><option>LTE FDS</option><option>PARCIAL</option><option>VISITA TÉCNICA</option></select>
                <select id="sel-estado-fila"><option>OPERATIVO</option><option>ASIGNADO</option><option>EN RUTA</option><option>EN SITIO</option><option>PDR</option></select>
            </div>
            <textarea id="txt-comentario" placeholder="Escriba aquí los comentarios técnicos..."></textarea>
            <button onclick="addRow()" style="background: #00d4ff; color: #001a33; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px;">AÑADIR A LA TABLA</button>
        </div>
    </div>

    <div id="capture-area">
        <div class="report-header">
            <div>
                <h1 id="h-titulo">VISITAS REALIZADAS</h1>
                <small style="color: #0077ff; font-weight: bold; text-transform: uppercase;">Zonas Paracentrales</small>
            </div>
            <div id="h-fecha-display" style="font-weight: bold; font-size: 1.2rem; color: #004488;"></div>
        </div>

        <table class="excel-table">
            <thead>
                <tr>
                    <th class="col-sitio">Sitio / Nodo</th>
                    <th class="col-torrero">Torrero</th>
                    <th class="col-tech">Asignado</th>
                    <th class="col-falla">Falla</th>
                    <th class="col-estado">Estado</th>
                    <th class="col-comentario">Comentarios</th>
                    <th class="no-capture" style="width: 30px;"></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="actions">
        <button class="btn-action" style="background:white; color:#004488; border:1px solid #004488;" onclick="downloadImg()">💾 DESCARGAR PNG</button>
        <button class="btn-action" style="background:#25d366; color:white;" onclick="sendWhatsapp()">📱 WHATSAPP</button>
    </div>

    <script>
        const SITIOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv';
        let dbSitios = [], siteSelected = null;

        window.onload = () => {
            document.getElementById('sel-fecha').value = new Date().toISOString().split('T')[0];
            updateHeader();

            Papa.parse(SITIOS_CSV, {
                download: true, header: true,
                complete: (r) => { 
                    dbSitios = r.data.map(row => ({ 
                        full: `${row.SITEID} - ${row['NOMBRE DE SITIO']}`, 
                        torrero: row.Propietario 
                    })).filter(x => x.full.length > 5); 
                }
            });

            // Técnicos estáticos para el ejemplo
            const techs = ["Técnico A", "Técnico B", "Técnico C", "Técnico D"];
            const list = document.getElementById('tech-list');
            techs.forEach(t => {
                const l = document.createElement('label');
                l.className = 'tech-item';
                l.innerHTML = `<input type="checkbox" value="${t}"> ${t}`;
                list.appendChild(l);
            });
        };

        function updateHeader() {
            document.getElementById('h-titulo').innerText = document.getElementById('sel-tipo').value;
            const f = document.getElementById('sel-fecha').value.split('-');
            if(f.length > 1) document.getElementById('h-fecha-display').innerText = `${f[2]}/${f[1]}/${f[0]}`;
        }

        document.getElementById('site-search').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase().trim();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            if(v.length < 2) { sug.style.display = 'none'; return; }

            const matches = dbSitios.filter(s => s.full.toLowerCase().includes(v)).slice(0,5);
            if(matches.length > 0) {
                sug.style.display = 'block';
                matches.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'sug-item';
                    d.innerText = m.full.toUpperCase();
                    d.onclick = () => {
                        siteSelected = m;
                        document.getElementById('site-search').value = m.full.toUpperCase();
                        document.getElementById('label-torrero').innerText = m.torrero;
                        document.getElementById('form-site').style.display = 'block';
                        sug.style.display = 'none';
                    };
                    sug.appendChild(d);
                });
            }
        });

        function addRow() {
            if(!siteSelected) return;
            const techs = Array.from(document.querySelectorAll('#tech-list input:checked')).map(i => i.value).join(' / ');
            const falla = document.getElementById('sel-falla').value;
            const estado = document.getElementById('sel-estado-fila').value;
            const comment = document.getElementById('txt-comentario').value;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td contenteditable="true" class="editable-cell" style="font-weight:bold; color:#004488;">${siteSelected.full.toUpperCase()}</td>
                <td style="color:#666;">${siteSelected.torrero}</td>
                <td contenteditable="true" class="editable-cell">${techs || 'SIN ASIGNAR'}</td>
                <td>${falla}</td>
                <td>
                    <select class="table-select">
                        <option ${estado === 'OPERATIVO' ? 'selected' : ''}>✅ OPERATIVO</option>
                        <option ${estado === 'ASIGNADO' ? 'selected' : ''}>🔹 ASIGNADO</option>
                        <option ${estado === 'EN RUTA' ? 'selected' : ''}>🚗 EN RUTA</option>
                        <option ${estado === 'EN SITIO' ? 'selected' : ''}>📍 EN SITIO</option>
                        <option ${estado === 'PDR' ? 'selected' : ''}>⏸️ PDR</option>
                    </select>
                </td>
                <td contenteditable="true" class="editable-cell">${comment}</td>
                <td class="no-capture"><button class="btn-remove" onclick="this.closest('tr').remove()">×</button></td>
            `;
            document.getElementById('table-body').appendChild(tr);
            
            // Limpieza
            document.getElementById('form-site').style.display = 'none';
            document.getElementById('site-search').value = '';
            document.getElementById('txt-comentario').value = '';
        }

        function downloadImg() {
            const nc = document.querySelectorAll('.no-capture');
            nc.forEach(el => el.style.display = 'none');
            html2canvas(document.getElementById('capture-area'), { scale: 3 }).then(canvas => {
                const a = document.createElement('a');
                a.download = `Reporte_${Date.now()}.png`;
                a.href = canvas.toDataURL();
                a.click();
                nc.forEach(el => el.style.display = 'table-cell');
            });
        }

        function sendWhatsapp() {
            window.open(`https://wa.me/?text=${encodeURIComponent("Adjunto reporte técnico.")}`, '_blank');
        }
    </script>
</body>
</html>
