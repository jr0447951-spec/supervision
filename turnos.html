<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN v21.1 - Ausencias y Edición Fina</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sidebar: #0f172a; --accent: #2563eb; --bg: #f1f5f9; 
            --card: #ffffff; --locked: #ef4444; --unlocked: #10b981; --danger: #fee2e2;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        .sidebar { width: 300px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; }
        .sidebar h4 { color: #94a3b8; margin-bottom: 10px; font-size: 0.8rem; text-transform: uppercase; }
        
        .group-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: grab; border: 1px solid #334155; transition: 0.2s; }
        .group-item:hover { border-color: var(--accent); }
        .group-item.disabled { opacity: 0.4; cursor: not-allowed; border-color: #ef4444; }

        .ausencia-item { display: flex; align-items: center; justify-content: space-between; background: #1e293b; padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 0.8rem; }
        .ausencia-item input { cursor: pointer; }

        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .nav-bar { background: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        
        .day { background: var(--card); border-radius: 8px; border: 1px solid #e2e8f0; padding: 8px; min-height: 160px; position: relative; transition: 0.2s; }
        .day.weekend { background: #f8fafc; }
        .day.is-locked { opacity: 0.95; }
        .day.vacio { background: var(--danger); border: 1px solid #f87171; }

        .day-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8rem; color: #64748b; margin-bottom: 5px; }
        .cell-lock { cursor: pointer; padding: 3px; border-radius: 4px; z-index: 10; font-size: 0.9rem; }
        .cell-lock.locked { color: var(--locked); background: #fee2e2; }
        .cell-lock.unlocked { color: var(--unlocked); background: #dcfce7; }

        .turno-card { padding: 5px 8px; border-radius: 4px; margin-bottom: 4px; font-size: 0.65rem; border-left: 4px solid #94a3b8; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .principal { border-left-color: var(--accent); background: #eff6ff; }
        .names { font-weight: 700; color: #1e293b; display: block; }

        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 420px; }
        .modal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; }
        .btn { padding: 10px 15px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
        .btn-blue { background: var(--accent); color: white; }
        select { flex-grow: 1; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3><i class="fas fa-calendar-alt"></i> ADMIN v21.1</h3>
    
    <h4>Grupos Disponibles</h4>
    <div id="grupos-drag">
        </div>

    <h4>Gestión de Ausencias</h4>
    <div id="ausencias-list">
        </div>

    <button class="btn btn-blue" style="margin-top:20px; width:100%" onclick="saveAll()">GUARDAR TODO</button>
</aside>

<main class="main">
    <div class="nav-bar">
        <button class="btn" onclick="changeMonth(-1)"> < </button>
        <h2 id="mesTitulo"></h2>
        <button class="btn" onclick="changeMonth(1)"> > </button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <input type="hidden" id="mId">
        <h3 id="mTitle">Editar Día</h3>
        <div id="mEditList">
            </div>
        <button class="btn btn-blue" onclick="saveModalChanges()" style="width:100%">APLICAR CAMBIOS</button>
        <button class="btn" onclick="closeModal()" style="width:100%; margin-top:8px; background:#e2e8f0;">CANCELAR</button>
        <button class="btn" onclick="resetDay()" style="width:100%; margin-top:10px; background:#fee2e2; color:#ef4444;">VACIAR TODO EL DÍA</button>
    </div>
</div>

<script>
    let currentMonth = new Date();
    const gBase = {
        1: "JUAN MEJIA / VALENTIN BOLAÑOS",
        2: "DOUGLAS VENTURA / JOSE PALMA",
        3: "DANIEL MELENDEZ / MIGUEL OCHOA",
        4: "EDGARDO SORIANO / LUIS PALACIOS"
    };

    // Lista plana de técnicos para ausencias
    const tecnicosIndiv = [
        "JUAN MEJIA", "VALENTIN BOLAÑOS", "DOUGLAS VENTURA", "JOSE PALMA",
        "DANIEL MELENDEZ", "MIGUEL OCHOA", "EDGARDO SORIANO", "LUIS PALACIOS"
    ];

    let db = JSON.parse(localStorage.getItem('admin_v21')) || { manual: {}, locks: {}, ausencias: [] };

    function getAutoTurno(dateObj) {
        const refDate = new Date(2026, 2, 7);
        const diffDays = Math.floor((dateObj - refDate) / (1000*60*60*24));
        const numSemanas = Math.floor(diffDays / 7);
        const dw = dateObj.getDay();

        if (dw !== 6 && dw !== 0) return null;
        if (numSemanas < 0) return null;

        const ciclo = numSemanas % 4;
        let p, a;

        switch(ciclo) {
            case 0: p = 1; a = 2; break;
            case 1: p = 3; a = 4; break;
            case 2: p = 2; a = 1; break;
            case 3: p = 4; a = 3; break;
        }
        return [gBase[p], gBase[a]];
    }

    // Verifica si un grupo tiene integrantes ausentes
    function isGrupoAusente(gStr) {
        const integrantes = gStr.split(' / ');
        return integrantes.some(t => db.ausencias.includes(t));
    }

    function renderSidebar() {
        const dragContainer = document.getElementById('grupos-drag');
        dragContainer.innerHTML = "";
        Object.keys(gBase).forEach(key => {
            const disabled = isGrupoAusente(gBase[key]);
            dragContainer.innerHTML += `
                <div class="group-item ${disabled ? 'disabled' : ''}" 
                     draggable="${!disabled}" 
                     ondragstart="drag(event, ${key})">
                    <strong>G${key}</strong> <span>${gBase[key]}</span>
                    ${disabled ? '<i class="fas fa-user-slash" style="float:right"></i>' : ''}
                </div>`;
        });

        const ausList = document.getElementById('ausencias-list');
        ausList.innerHTML = tecnicosIndiv.map(t => `
            <div class="ausencia-item">
                <span>${t}</span>
                <input type="checkbox" ${db.ausencias.includes(t) ? 'checked' : ''} 
                       onchange="toggleAusencia('${t}')">
            </div>
        `).join('');
    }

    function toggleAusencia(nombre) {
        if (db.ausencias.includes(nombre)) {
            db.ausencias = db.ausencias.filter(a => a !== nombre);
        } else {
            db.ausencias.push(nombre);
        }
        render();
    }

    function render() {
        renderSidebar();
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentMonth).toUpperCase();

        const totalDays = new Date(y, m + 1, 0).getDate();
        const startOffset = (new Date(y, m, 1).getDay() === 0) ? 6 : new Date(y, m, 1).getDay() - 1;

        for(let i=0; i<startOffset; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=totalDays; d++) {
            const dateObj = new Date(y, m, d);
            const id = `${y}-${m+1}-${d}`;
            const dw = dateObj.getDay();
            
            let grupos = [];
            const auto = getAutoTurno(dateObj);

            if (db.manual[id]) {
                grupos = db.manual[id];
            } else if (auto) {
                grupos = auto;
            }

            if (db.locks[id] === undefined) {
                db.locks[id] = (grupos.length > 0);
            }
            const isLocked = db.locks[id];
            const esVacio = (grupos.length === 0);

            let htmlContent = grupos.map((g, i) => `
                <div class="turno-card ${i===0?'principal':''}">
                    <span style="font-size:0.55rem; color:#64748b; font-weight:bold">${i===0?'PRINCIPAL':'APOYO'}</span>
                    <span class="names">${g}</span>
                </div>
            `).join('');

            const cell = document.createElement('div');
            cell.className = `day ${dw===6||dw===0?'weekend':''} ${isLocked?'is-locked':''} ${esVacio?'vacio':''}`;
            cell.innerHTML = `
                <div class="day-header">
                    <span>${d}</span>
                    <i class="fas ${isLocked?'fa-lock locked':'fa-lock-open unlocked'} cell-lock" onclick="toggleLock(event, '${id}')"></i>
                </div>
                <div class="cell-content">${htmlContent} ${esVacio ? '<span style="color:#dc2626; font-size:0.6rem; font-weight:bold; display:block; text-align:center; margin-top:15px;">SIN ASIGNAR</span>' : ''}</div>
            `;

            cell.onclick = () => !isLocked ? openModal(id, d) : null;
            if(!isLocked) {
                cell.ondragover = (e) => e.preventDefault();
                cell.ondrop = (e) => {
                    e.preventDefault();
                    const gNum = e.dataTransfer.getData("g");
                    const gStr = gBase[gNum];
                    if(isGrupoAusente(gStr)) return alert("Técnico ausente en este grupo");
                    db.manual[id] = [gStr]; // Por simplicidad, el drop asigna principal
                    render();
                };
            }
            grid.appendChild(cell);
        }
    }

    function toggleLock(e, id) { e.stopPropagation(); db.locks[id] = !db.locks[id]; render(); }

    function openModal(id, d) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('mId').value = id;
        document.getElementById('mTitle').innerText = "Gestión Día " + d;
        
        const currentGroups = db.manual[id] || getAutoTurno(new Date(id.replace(/-/g, '/'))) || [];
        
        const options = `<option value="">-- VACANTE --</option>` + 
                        Object.keys(gBase).map(key => {
                            const disabled = isGrupoAusente(gBase[key]);
                            return `<option value="${gBase[key]}" ${disabled ? 'disabled' : ''}>G${key}: ${gBase[key]} ${disabled ? '(AUSENTE)' : ''}</option>`;
                        }).join('');

        document.getElementById('mEditList').innerHTML = `
            <div class="modal-row">
                <strong>PRINCIPAL:</strong>
                <select id="editP">${options}</select>
                <i class="fas fa-trash" onclick="document.getElementById('editP').value=''" style="color:#ef4444; cursor:pointer"></i>
            </div>
            <div class="modal-row">
                <strong>APOYO:</strong>
                <select id="editA">${options}</select>
                <i class="fas fa-trash" onclick="document.getElementById('editA').value=''" style="color:#ef4444; cursor:pointer"></i>
            </div>
        `;
        
        document.getElementById('editP').value = currentGroups[0] || "";
        document.getElementById('editA').value = currentGroups[1] || "";
    }

    function saveModalChanges() {
        const id = document.getElementById('mId').value;
        const p = document.getElementById('editP').value;
        const a = document.getElementById('editA').value;
        
        db.manual[id] = [];
        if (p) db.manual[id].push(p);
        if (a) db.manual[id].push(a);
        
        closeModal();
        render();
    }

    function resetDay() { 
        const id = document.getElementById('mId').value;
        db.manual[id] = []; 
        closeModal(); 
        render(); 
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function drag(e, g) { e.dataTransfer.setData("g", g); }
    function changeMonth(v) { currentMonth.setMonth(currentMonth.getMonth()+v); render(); }
    function saveAll() { localStorage.setItem('admin_v21', JSON.stringify(db)); alert("✅ Guardado con Ausencias."); }
    window.onload = render;
</script>
</body>
</html>
