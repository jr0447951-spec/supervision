<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TURNOS - ADMIN v28</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --vacante: #fef3c7; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        .sidebar { width: 300px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .main { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }
        .nav-bar { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .day { background: var(--card); border-radius: 8px; border: 1px solid #e2e8f0; padding: 10px; min-height: 140px; position: relative; cursor: pointer; }
        .day.weekend { background: #f1f5f9; }
        .day.vacio { background: var(--vacante); }
        .day-header { display: flex; justify-content: space-between; font-weight: bold; color: #64748b; margin-bottom: 5px; }
        .turno-card { padding: 4px 8px; border-radius: 4px; margin-bottom: 4px; font-size: 0.75rem; border-left: 3px solid #94a3b8; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .principal { border-left-color: var(--accent); background: #eff6ff; }
        .names { font-weight: bold; color: #1e293b; }
        .vacante-aviso { color: #b45309; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 12px; width: 350px; }
        select { width: 100%; padding: 8px; margin: 5px 0; border-radius: 4px; }
        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3>SISTEMA v28</h3>
    <div style="background:#1e293b; padding:10px; border-radius:8px;">
        <label style="font-size:0.7rem;">REGISTRAR AUSENCIA</label>
        <select id="aus-tecnico"></select>
        <input type="date" id="aus-inicio" style="width:90%; margin-top:5px;">
        <input type="date" id="aus-fin" style="width:90%; margin-top:5px;">
        <button class="btn btn-blue" onclick="registrarAusencia()">GUARDAR</button>
    </div>
    <div id="status" style="margin-top:auto; font-size:0.7rem; color:#64748b;">● Iniciando...</div>
</aside>

<main class="main">
    <div class="nav-bar">
        <button onclick="cambiarMes(-1)" style="padding:5px 10px;"><i class="fas fa-chevron-left"></i></button>
        <h2 id="mesTitulo" style="margin:0; font-size:1.2rem;"></h2>
        <button onclick="cambiarMes(1)" style="padding:5px 10px;"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <h3 id="mFechaStr">Editar Turno</h3>
        <input type="hidden" id="mId">
        <p style="font-size:0.7rem; margin:0;">PRINCIPAL</p>
        <select id="selP1"></select><select id="selP2"></select>
        <p style="font-size:0.7rem; margin:10px 0 0 0;">APOYO</p>
        <select id="selA1"></select><select id="selA2"></select>
        <button class="btn btn-blue" onclick="guardarCambioManual()">GUARDAR</button>
        <button class="btn" style="background:#ddd" onclick="cerrarModal()">CANCELAR</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // DATOS MAESTROS
    const tecnicos = ["JUAN MEJIA", "VALENTIN BOLAÑOS", "DOUGLAS VENTURA", "JOSE PALMA", "DANIEL MELENDEZ", "MIGUEL OCHOA", "EDGARDO SORIANO", "LUIS PALACIOS"];
    const gFijos = { 1: [0,1], 2: [2,3], 3: [4,5], 4: [6,7] };
    let mesActual = new Date();
    let dbAusencias = [];
    let dbManual = [];

    // 1. DIBUJAR CALENDARIO (ESTO DEBE FUNCIONAR SÍ O SÍ)
    function render() {
        const grid = document.getElementById('grid');
        if(!grid) return;
        grid.innerHTML = "";
        
        const y = mesActual.getFullYear(), m = mesActual.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(mesActual).toUpperCase();

        const total = new Date(y, m+1, 0).getDate();
        const start = (new Date(y, m, 1).getDay() === 0) ? 6 : new Date(y, m, 1).getDay() - 1;

        for(let i=0; i<start; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=total; d++) {
            const f = new Date(y, m, d);
            const id = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            
            // Lógica rotación
            let p = null;
            const ref = new Date(2026, 2, 7); 
            const diff = Math.floor((f - ref) / (1000*60*60*24));
            if (diff >= 0 && (f.getDay() === 0 || f.getDay() === 6)) {
                const ciclo = Math.floor(diff / 7) % 4;
                let gP, gA;
                if(ciclo===0){ gP=1; gA=2; } else if(ciclo===1){ gP=3; gA=4; }
                else if(ciclo===2){ gP=2; gA=1; } else if(ciclo===3){ gP=4; gA=3; }
                p = { p: [tecnicos[gFijos[gP][0]], tecnicos[gFijos[gP][1]]], a: [tecnicos[gFijos[gA][0]], tecnicos[gFijos[gA][1]]] };
            }

            // Sobrescritura Supabase
            const man = dbManual.find(x => x.fecha === id);
            if(man) p = { p: [man.p1, man.p2], a: [man.a1, man.a2] };

            // Filtro Ausencias
            if(p) {
                const aus = dbAusencias.filter(a => id >= a.fecha_inicio && id <= a.fecha_fin).map(a => a.tecnico_nombre);
                p.p = p.p.map(n => aus.includes(n) ? "---" : n);
                p.a = p.a.map(n => aus.includes(n) ? "---" : n);
            }

            const vacante = p && (p.p.includes("---") || p.a.includes("---"));
            const cell = document.createElement('div');
            cell.className = `day ${f.getDay()===0||f.getDay()===6?'weekend':''} ${vacante?'vacio':''}`;
            cell.innerHTML = `
                <div class="day-header">${d}</div>
                ${p ? `
                    <div class="turno-card principal"><span class="names">${p.p[0]}<br>${p.p[1]}</span></div>
                    ${(p.a[0]!=="---" || p.a[1]!=="---") ? `<div class="turno-card"><span class="names">${p.a[0]}<br>${p.a[1]}</span></div>` : ''}
                ` : ''}
                ${vacante ? `<div class="vacante-aviso">PENDIENTE</div>` : ''}
            `;
            cell.onclick = () => abrirModal(id, p);
            grid.appendChild(cell);
        }
    }

    // 2. CONEXIÓN SUPABASE (EN SEGUNDO PLANO)
    const SUPABASE_URL = 'https://qscaisgcttsnoavgfctj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_IA9XB7EVhEMk2k6MbA4A4Q_M6og7SfO';
    let supabase = null;

    async function initCloud() {
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data: aus } = await supabase.from('ausencias').select('*');
            const { data: man } = await supabase.from('programacion_manual').select('*');
            dbAusencias = aus || [];
            dbManual = man || [];
            document.getElementById('status').innerHTML = "● Nube: OK";
            render();
        } catch (e) {
            document.getElementById('status').innerHTML = "● Local Mode";
        }
    }

    // FUNCIONES MODAL
    function abrirModal(id, data) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('mId').value = id;
        ['selP1', 'selP2', 'selA1', 'selA2'].forEach(s => {
            const sel = document.getElementById(s);
            sel.innerHTML = `<option value="---">VACANTE</option>` + tecnicos.map(t => `<option value="${t}">${t}</option>`).join('');
            if(data) {
                if(s==='selP1') sel.value = data.p[0]; if(s==='selP2') sel.value = data.p[1];
                if(s==='selA1') sel.value = data.a[0]; if(s==='selA2') sel.value = data.a[1];
            }
        });
    }

    async function guardarCambioManual() {
        const id = document.getElementById('mId').value;
        const body = { fecha: id, p1: selP1.value, p2: selP2.value, a1: selA1.value, a2: selA2.value };
        if(supabase) await supabase.from('programacion_manual').upsert(body);
        cerrarModal(); initCloud();
    }

    async function registrarAusencia() {
        const t = document.getElementById('aus-tecnico').value;
        const i = document.getElementById('aus-inicio').value;
        const f = document.getElementById('aus-fin').value;
        if(supabase && t && i && f) await supabase.from('ausencias').insert([{ tecnico_nombre: t, fecha_inicio: i, fecha_fin: f }]);
        initCloud();
    }

    function cambiarMes(v) { mesActual.setMonth(mesActual.getMonth()+v); render(); }
    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

    // ARRANQUE MANUAL
    document.getElementById('aus-tecnico').innerHTML = tecnicos.map(t => `<option value="${t}">${t}</option>`).join('');
    render(); // <--- SE DIBUJA PRIMERO
    setTimeout(initCloud, 500); // <--- CONECTA DESPUÉS
</script>
</body>
</html>
