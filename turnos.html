<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE TURNOS - CLOUD SYNC PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc;
            --border: #e2e8f0; --danger: #ef4444; --success: #10b981;
            --radius: 12px;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Sidebar */
        .sidebar { 
            width: 320px; background: var(--sidebar); color: white; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #334155; 
            overflow-y: auto; z-index: 100;
        }
        
        .section-title { 
            font-size: 0.65rem; font-weight: 800; color: #64748b; 
            text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-top: 10px;
        }

        .draggable-group { 
            background: #1e293b; border: 1px solid #334155; padding: 10px; 
            border-radius: var(--radius); cursor: grab; transition: 0.2s; 
        }
        .draggable-group:hover { border-color: var(--primary); background: #24334d; }

        /* Calendario */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 60px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .calendar-container { flex-grow: 1; overflow-y: auto; padding: 20px; background: white; }
        .days-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 10px; text-align: center; font-weight: 800; color: #94a3b8; font-size: 0.7rem; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        
        .day { 
            background: white; border: 1px solid var(--border); border-radius: var(--radius); 
            min-height: 170px; padding: 10px; position: relative; display: flex; flex-direction: column; gap: 6px;
        }
        .day.weekend { background: #f8fafc; }
        .day.locked { border-top: 4px solid var(--sidebar); background: #f1f5f9; }
        .day.drag-over { border: 2px dashed var(--primary); background: #eff6ff; }

        /* Tarjetas */
        .turno-card { 
            border-radius: 8px; padding: 6px 10px; font-size: 0.7rem; 
            border-left: 4px solid var(--primary); background: #ebf2ff; 
            cursor: grab; position: relative;
        }
        .turno-card:active { cursor: grabbing; opacity: 0.6; }

        .bajas-container { margin-top: auto; padding-top: 5px; border-top: 1px dashed #fecdd3; }
        .baja-item { background: #fff1f2; color: #e11d48; padding: 3px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 700; display: flex; justify-content: space-between; margin-bottom: 2px; }

        .btn { padding: 8px 12px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; }
        .btn-blue { background: var(--primary); color: white; }
        
        #cloud-loader { font-size: 0.6rem; color: var(--success); display: none; font-weight: 800; }

        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; width: 350px; padding: 25px; border-radius: 16px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h3 style="margin:0"><i class="fas fa-sync-alt"></i> OPS CLOUD</h3>
        <span id="cloud-loader"><i class="fas fa-cloud"></i> OK</span>
    </div>

    <div class="section-title">Baja Médica</div>
    <div style="background:#1e293b; padding:12px; border-radius:10px; display:flex; flex-direction:column; gap:8px;">
        <select id="aus-tecnico" style="width:100%; padding:6px; background:#0f172a; color:white; border:1px solid #334155;"></select>
        <input type="date" id="aus-fecha" style="width:100%; padding:6px; background:#0f172a; color:white; border:1px solid #334155;">
        <button class="btn btn-blue" onclick="addAbsence()">REGISTRAR</button>
    </div>

    <div class="section-title">Grupos (Panel)</div>
    <div id="sidebar-groups" style="display:flex; flex-direction:column; gap:8px;"></div>
    
    <div class="section-title">Estadísticas</div>
    <div id="stats-panel" style="background:#1e293b; padding:10px; border-radius:10px; font-size:0.7rem;"></div>

    <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
        <button class="btn btn-blue" onclick="syncToCloud()"><i class="fas fa-cloud-upload-alt"></i> SUBIR A NUBE</button>
        <button class="btn" style="background:white; color:#334155" onclick="capture()"><i class="fas fa-camera"></i> CAPTURAR PNG</button>
    </div>
</aside>

<main class="main-content">
    <header class="top-nav">
        <div>
            <button class="btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
            <span id="month-display" style="font-weight:800; margin:0 15px; font-size:1.1rem"></span>
            <button class="btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div style="color:var(--primary); font-weight:800; font-size:0.7rem;">
            SÁB/DOM BLOQUEADOS POR DEFECTO
        </div>
    </header>

    <div class="calendar-container">
        <div class="days-row">
            <span>LUNES</span><span>MARTES</span><span>MIÉRCOLES</span><span>JUEVES</span><span>VIERNES</span>
            <span>SÁBADO</span><span>DOMINGO</span>
        </div>
        <div class="grid" id="grid"></div>
    </div>
</main>

<div id="modal">
    <div class="modal-box">
        <h4>Editar Grupo</h4>
        <input type="hidden" id="m-id"><input type="hidden" id="m-idx">
        <select id="sel-t1" style="width:100%; padding:10px; margin-bottom:10px;"></select>
        <select id="sel-t2" style="width:100%; padding:10px; margin-bottom:20px;"></select>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn btn-blue" onclick="confirmEdit()">GUARDAR</button>
            <button class="btn" style="background:#fee2e2; color:var(--danger)" onclick="deleteGroup()">ELIMINAR</button>
            <button class="btn" onclick="closeModal()">CANCELAR</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const DB_KEY = "SISTEMA_V24_MASTER";
    const START_REF = new Date(2026, 2, 7);
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSZc01X5UBbw3ziJmHOHgmOtxMuzn26BUoR_1NiCB3Km_ct8vZVXN0kntmSxsUvsrm/exec"; // PEGA TU URL AQUÍ

    let currentView = new Date();
    let state = {
        tecnicos: [],
        gBase: {},
        db: { manual: {}, absences: {}, locks: {} }
    };

    async function init() {
        await loadCSV();
        renderSidebar();

        // 1. Intentar cargar desde la Nube primero
        if (GOOGLE_SCRIPT_URL.length > 20) {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const cloudData = await res.json();
                if (cloudData && (cloudData.manual || cloudData.locks)) {
                    state.db = cloudData;
                    console.log("Carga desde Nube completada.");
                }
            } catch (e) {
                console.warn("Nube no disponible, usando local.");
                const local = localStorage.getItem(DB_KEY);
                if (local) state.db = JSON.parse(local);
            }
        }
        renderCalendar();
    }

    async function loadCSV() {
        try {
            const r = await fetch('tecnicos.csv');
            const d = await r.text();
            const lines = d.split(/\r?\n/).slice(1);
            state.tecnicos = []; state.gBase = {};
            lines.forEach(l => {
                const [n, g] = l.split(/[;,]/).map(s => s.trim().toUpperCase());
                if(n) {
                    state.tecnicos.push(n);
                    if(g) { if(!state.gBase[g]) state.gBase[g]=[]; state.gBase[g].push(n); }
                }
            });
        } catch (e) { console.error("CSV no cargado."); }
    }

    function getAutoTurno(date) {
        if (date.getDay() !== 6 && date.getDay() !== 0) return [];
        const diff = Math.floor((date - START_REF) / 86400000);
        const week = Math.floor(diff / 7);
        const cycle = Math.max(0, week) % 4;
        const map = { 0:["1","2"], 1:["3","4"], 2:["2","1"], 3:["4","3"] };
        return [ [...(state.gBase[map[cycle][0]] || [])], [...(state.gBase[map[cycle][1]] || [])] ];
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const y = currentView.getFullYear(), m = currentView.getMonth();
        document.getElementById('month-display').innerText = new Intl.DateTimeFormat('es-ES', {month:'long', year:'numeric'}).format(currentView);

        const offset = (new Date(y, m, 1).getDay() || 7) - 1;
        const total = new Date(y, m + 1, 0).getDate();
        const counts = {}; state.tecnicos.forEach(t => counts[t] = 0);

        for(let i=0; i<offset; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=total; d++) {
            const dateId = `${y}-${m+1}-${d}`;
            const date = new Date(y, m, d);
            const isWeekend = [0,6].includes(date.getDay());
            
            if (state.db.locks[dateId] === undefined) state.db.locks[dateId] = isWeekend;
            const isLocked = state.db.locks[dateId];
            
            let turnos = isLocked ? (state.db.manual[dateId] || getAutoTurno(date)) : (state.db.manual[dateId] || []);
            let dayAbsences = state.db.absences[dateId] || [];

            const cell = document.createElement('div');
            cell.className = `day ${isWeekend?'weekend':''} ${isLocked?'locked':''}`;
            
            if(!isLocked) {
                cell.ondragover = e => { e.preventDefault(); cell.classList.add('drag-over'); };
                cell.ondragleave = () => cell.classList.remove('drag-over');
                cell.ondrop = e => handleDrop(e, dateId, date);
            }

            let turnosHtml = turnos.map((group, idx) => {
                group.forEach(n => { if(n && !dayAbsences.includes(n)) counts[n]++ });
                return `
                <div class="turno-card" draggable="true" ondragstart="handleCardDrag(event, ${JSON.stringify(group)})">
                    <span style="font-size:0.55rem; opacity:0.7">GRUPO</span><br>
                    <b>${group[0] ? (dayAbsences.includes(group[0]) ? `<s>${group[0]}</s>` : group[0]) : 'VACANTE'}</b><br>
                    <b>${group[1] ? (dayAbsences.includes(group[1]) ? `<s>${group[1]}</s>` : group[1]) : 'VACANTE'}</b>
                    ${!isLocked ? `<i class="fas fa-edit" style="position:absolute; right:5px; top:5px; opacity:0.5" onclick="openEditor('${dateId}',${idx})"></i>` : ''}
                </div>`;
            }).join('');

            let bajasHtml = (dayAbsences.length > 0) ? `<div class="bajas-container">${dayAbsences.map(n => `<div class="baja-item"><span>${n}</span><i class="fas fa-times" onclick="removeAbsence('${dateId}','${n}')" style="cursor:pointer"></i></div>`).join('')}</div>` : '';

            cell.innerHTML = `<div style="display:flex; justify-content:space-between"><b>${d}</b><i class="fas ${isLocked?'fa-lock':'fa-lock-open'}" onclick="toggleLock('${dateId}')" style="cursor:pointer; opacity:0.4"></i></div>${turnosHtml}${bajasHtml}`;
            grid.appendChild(cell);
        }
        renderStats(counts);
    }

    // --- COPIAR ENTRE DÍAS ---
    function handleCardDrag(e, groupData) {
        e.dataTransfer.setData("text/group", JSON.stringify(groupData));
    }

    function handleDrop(e, id, date) {
        e.preventDefault();
        const group = JSON.parse(e.dataTransfer.getData("text/group"));
        
        if(!state.db.manual[id]) state.db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(date)));
        
        // Validación duplicados
        const actuales = state.db.manual[id].flat().filter(n => n);
        if (group.some(n => n && actuales.includes(n))) return alert("Técnico ya asignado hoy");

        state.db.manual[id].push(group);
        state.db.locks[id] = true; // Se bloquea al editar manualmente
        save();
    }

    async function save() {
        localStorage.setItem(DB_KEY, JSON.stringify(state.db));
        renderCalendar();
        await syncToCloud();
    }

    async function syncToCloud() {
        if (GOOGLE_SCRIPT_URL.length < 20) return;
        const loader = document.getElementById('cloud-loader');
        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(state.db) });
            loader.style.display = "inline";
            setTimeout(() => loader.style.display = "none", 2000);
        } catch (e) { console.error("Error nube"); }
    }

    function toggleLock(id) {
        if(state.db.locks[id] && !state.db.manual[id]) state.db.manual[id] = JSON.parse(JSON.stringify(getAutoTurno(new Date(id.replace(/-/g,'/')))));
        state.db.locks[id] = !state.db.locks[id];
        save();
    }

    function addAbsence() {
        const t = document.getElementById('aus-tecnico').value, f = document.getElementById('aus-fecha').value;
        if(!t || !f) return;
        const id = f.split('-').map(n => parseInt(n)).join('-');
        if(!state.db.absences[id]) state.db.absences[id] = [];
        if(!state.db.absences[id].includes(t)) { state.db.absences[id].push(t); save(); }
    }

    function removeAbsence(id, n) {
        state.db.absences[id] = state.db.absences[id].filter(x => x !== n);
        save();
    }

    function renderSidebar() {
        const cont = document.getElementById('sidebar-groups'); cont.innerHTML = "";
        Object.keys(state.gBase).sort().forEach(g => {
            const div = document.createElement('div');
            div.className = "draggable-group"; div.draggable = true;
            div.innerHTML = `<span style="font-size:0.6rem; color:var(--primary); font-weight:800">GRUPO ${g}</span><div style="font-size:0.75rem">${state.gBase[g].join(' & ')}</div>`;
            div.ondragstart = e => e.dataTransfer.setData("text/group", JSON.stringify(state.gBase[g]));
            cont.appendChild(div);
        });
        const opts = `<option value="">-- SELECCIONAR --</option>` + state.tecnicos.map(t=>`<option value="${t}">${t}</option>`).join('');
        document.getElementById('aus-tecnico').innerHTML = document.getElementById('sel-t1').innerHTML = document.getElementById('sel-t2').innerHTML = opts;
    }

    function openEditor(id, idx) {
        const turnos = state.db.manual[id];
        document.getElementById('m-id').value = id; document.getElementById('m-idx').value = idx;
        document.getElementById('sel-t1').value = turnos[idx][0] || "";
        document.getElementById('sel-t2').value = turnos[idx][1] || "";
        document.getElementById('modal').style.display = 'flex';
    }

    function confirmEdit() {
        const id = document.getElementById('m-id').value, idx = document.getElementById('m-idx').value;
        state.db.manual[id][idx] = [document.getElementById('sel-t1').value, document.getElementById('sel-t2').value];
        save(); closeModal();
    }

    function deleteGroup() {
        const id = document.getElementById('m-id').value, idx = document.getElementById('m-idx').value;
        state.db.manual[id].splice(idx, 1);
        save(); closeModal();
    }

    function renderStats(counts) {
        document.getElementById('stats-panel').innerHTML = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([n,c]) => `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #334155; padding:2px 0; color:white"><span>${n.split(' ')[0]}</span><b>${c}</b></div>`).join('');
    }

    function changeMonth(v) { currentView.setMonth(currentView.getMonth() + v); renderCalendar(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function capture() {
        html2canvas(document.querySelector('.calendar-container'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a'); link.download = 'Cuadrante.png'; link.href = canvas.toDataURL(); link.click();
        });
    }

    window.onload = init;
</script>
</body>
</html>
