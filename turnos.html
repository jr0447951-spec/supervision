<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisión v13 - Ausencias por Selección</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 340px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; border-right: 1px solid #334155; }
        .sidebar.locked { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        .group-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        .group-item strong { color: #60a5fa; display: block; font-size: 0.85rem; }
        
        /* SELECTOR AUSENCIAS */
        .aus-box { margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px; }
        .aus-box select, .aus-box input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; background: #1e293b; border: 1px solid #334155; color: white; font-size: 0.8rem; }

        /* CALENDARIO */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .nav-bar { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .day { background: white; min-height: 150px; border-radius: 10px; border: 1px solid #e2e8f0; padding: 8px; position: relative; cursor: pointer; }
        .day.weekend { background: #f8fafc; }

        /* TARJETAS */
        .turno-card { border-radius: 6px; padding: 8px; margin-bottom: 5px; border: 1px solid #e2e8f0; }
        .principal { border-left: 5px solid var(--accent); background: #eff6ff; }
        .apoyo { border-left: 5px solid #64748b; background: #f9fafb; }
        .vacante { border: 2px dashed var(--danger) !important; background: #fef2f2 !important; color: var(--danger); font-weight: bold; font-size: 0.65rem; }
        
        .role-tag { font-size: 0.55rem; font-weight: 900; display: block; margin-bottom: 2px; }
        .names { font-size: 0.72rem; font-weight: 700; color: #1e293b; }
        .warning-label { font-size: 0.55rem; color: var(--warning); font-weight: 800; display: block; margin-top: 3px; }

        /* BOTONES */
        .btn-lock { padding: 8px 16px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .unlocked { background: var(--success); color: white; }
        .locked-btn { background: var(--danger); color: white; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <h2><i class="fas fa-users"></i> GRUPOS BASE</h2>
    <div id="grupos-drag">
        <div class="group-item"><strong>G1:</strong> JUAN MEJIA / VALENTIN BOLAÑOS</div>
        <div class="group-item"><strong>G2:</strong> DOUGLAS VENTURA / JOSE PALMA</div>
        <div class="group-item"><strong>G3:</strong> DANIEL MELENDEZ / MIGUEL OCHOA</div>
        <div class="group-item"><strong>G4:</strong> EDGARDO SORIANO / LUIS PALACIOS</div>
    </div>

    <div class="aus-box">
        <h3><i class="fas fa-user-slash"></i> REGISTRAR AUSENCIA</h3>
        <label style="font-size:0.7rem; color:#94a3b8">Día del mes:</label>
        <input type="number" id="ausDay" placeholder="Ej: 17">
        
        <label style="font-size:0.7rem; color:#94a3b8">Seleccionar Técnico:</label>
        <select id="ausTech">
            <option value="">-- Seleccionar --</option>
            <option value="JUAN MEJIA">JUAN MEJIA</option>
            <option value="VALENTIN BOLAÑOS">VALENTIN BOLAÑOS</option>
            <option value="DOUGLAS VENTURA">DOUGLAS VENTURA</option>
            <option value="JOSE PALMA">JOSE PALMA</option>
            <option value="DANIEL MELENDEZ">DANIEL MELENDEZ</option>
            <option value="MIGUEL OCHOA">MIGUEL OCHOA</option>
            <option value="EDGARDO SORIANO">EDGARDO SORIANO</option>
            <option value="LUIS PALACIOS">LUIS PALACIOS</option>
        </select>
        
        <button onclick="addAusencia()" class="btn-save" style="width:100%">PROGRAMAR FALTA</button>
        <div id="listaAus" style="font-size:0.7rem; margin-top:15px; color:#f87171;"></div>
    </div>
</aside>

<main class="main">
    <div class="nav-bar">
        <div>
            <button onclick="changeMonth(-1)" class="btn-save"> < </button>
            <span id="mesYear" style="font-weight:bold; margin: 0 15px; font-size: 1.2rem;"></span>
            <button onclick="changeMonth(1)" class="btn-save"> > </button>
        </div>
        <button id="lBtn" class="btn-lock unlocked" onclick="toggleLock()">
            <i id="lIco" class="fas fa-lock-open"></i> <span id="lTxt">EDICIÓN ACTIVA</span>
        </button>
        <button class="btn-save" onclick="saveDB()">💾 GUARDAR</button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<script>
    let isLocked = false;
    let currDate = new Date();
    const gBase = {
        1: ["JUAN MEJIA", "VALENTIN BOLAÑOS"],
        2: ["DOUGLAS VENTURA", "JOSE PALMA"],
        3: ["DANIEL MELENDEZ", "MIGUEL OCHOA"],
        4: ["EDGARDO SORIANO", "LUIS PALACIOS"]
    };

    let db = JSON.parse(localStorage.getItem('supervision_v13')) || { manual: {}, ausencias: [] };

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const diasS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
        diasS.forEach(d => grid.innerHTML += `<div style="text-align:center; font-weight:bold; font-size:0.7rem; color:#64748b;">${d}</div>`);

        const y = currDate.getFullYear(), m = currDate.getMonth();
        document.getElementById('mesYear').innerText = new Intl.DateTimeFormat('es-ES',{month:'long',year:'numeric'}).format(currDate).toUpperCase();

        const totalD = new Date(y, m+1, 0).getDate();
        const offset = (new Date(y, m, 1).getDay() === 0) ? 6 : new Date(y, m, 1).getDay() - 1;
        const refDate = new Date(2026, 2, 7);

        for(let i=0; i<offset; i++) grid.innerHTML += `<div></div>`;

        for(let d=1; d<=totalD; d++) {
            const f = new Date(y, m, d), id = `${y}-${m+1}-${d}`, dw = f.getDay();
            let content = "";

            if(dw === 6 || dw === 0) {
                const diff = Math.floor((f - refDate) / (1000*60*60*24));
                const nSem = Math.floor(diff / 7);
                let g1_idx = (Math.abs(nSem) % 2 === 0) ? (dw===6?1:2) : (dw===6?3:4);
                let g2_idx = (Math.abs(nSem) % 2 === 0) ? (dw===6?2:1) : (dw===6?4:3);

                // Obtener nombres base
                let p1_names = [...gBase[g1_idx]];
                let p2_names = [...gBase[g2_idx]];

                // Filtrar ausentes
                const ausentesHoy = db.ausencias.filter(a => a.d == d && a.m == m+1 && a.y == y).map(a => a.n);
                
                let htmlP1 = p1_names.map(n => ausentesHoy.includes(n) ? `<span style="color:red;text-decoration:line-through">${n}</span>` : n).join(" / ");
                let htmlP2 = p2_names.map(n => ausentesHoy.includes(n) ? `<span style="color:red;text-decoration:line-through">${n}</span>` : n).join(" / ");

                const p1_incompleto = p1_names.some(n => ausentesHoy.includes(n));
                const p2_incompleto = p2_names.some(n => ausentesHoy.includes(n));

                content = `
                    <div class="turno-card principal ${p1_incompleto ? 'vacante' : ''}">
                        <span class="role-tag">PRINCIPAL (G${g1_idx})</span>
                        <span class="names">${htmlP1}</span>
                    </div>
                    <div class="turno-card apoyo ${p2_incompleto ? 'vacante' : ''}">
                        <span class="role-tag">APOYO (G${g2_idx})</span>
                        <span class="names">${htmlP2}</span>
                        ${(p1_incompleto || p2_incompleto) ? '<span class="warning-label">⚠️ CUBRIR VACANTE</span>' : ''}
                    </div>
                `;
            }

            const cell = document.createElement('div');
            cell.className = `day ${dw===6||dw===0?'weekend':''} ${isLocked?'locked':''}`;
            cell.innerHTML = `<span style="font-weight:bold; font-size:0.8rem; color:#94a3b8">${d}</span>${content}`;
            grid.appendChild(cell);
        }
        renderAusList();
    }

    function addAusencia() {
        const d = document.getElementById('ausDay').value, n = document.getElementById('ausTech').value;
        if(d && n) {
            db.ausencias.push({ d, m: currDate.getMonth()+1, y: currDate.getFullYear(), n });
            render();
            document.getElementById('ausDay').value = ""; document.getElementById('ausTech').value = "";
        } else { alert("Selecciona día y técnico."); }
    }

    function removeAus(index) { db.ausencias.splice(index, 1); render(); }

    function renderAusList() {
        const list = document.getElementById('listaAus');
        list.innerHTML = db.ausencias.map((a, i) => 
            `<div style="margin-bottom:5px;">• ${a.d}/${a.m}: ${a.n} <i class="fas fa-trash-alt" style="cursor:pointer;float:right" onclick="removeAus(${i})"></i></div>`
        ).join('');
    }

    function toggleLock() {
        isLocked = !isLocked;
        document.getElementById('lBtn').className = isLocked ? "btn-lock locked-btn" : "btn-lock unlocked";
        document.getElementById('lTxt').innerText = isLocked ? "SISTEMA BLOQUEADO" : "EDICIÓN ACTIVA";
        document.getElementById('sidebar').classList.toggle('locked', isLocked);
        render();
    }

    function changeMonth(v) { currDate.setMonth(currDate.getMonth()+v); render(); }
    function saveDB() { localStorage.setItem('supervision_v13', JSON.stringify(db)); alert("✅ Configuración guardada."); }

    window.onload = render;
</script>
</body>
</html>
