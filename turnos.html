<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TURNOS - ADMIN v41</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 310px; background: var(--sidebar); color: white; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .section-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .section-title { font-size: 0.7rem; color: #60a5fa; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; }

        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        .day { background: var(--card); border-radius: 12px; border: 1px solid #e2e8f0; padding: 10px; min-height: 150px; position: relative; }
        .day.weekend { background: #f1f5f9; border-style: dashed; }
        .day-header { font-weight: 800; color: #94a3b8; font-size: 0.8rem; margin-bottom: 8px; }

        .turno-card { padding: 6px; border-radius: 8px; margin-bottom: 4px; font-size: 0.75rem; border-left: 4px solid #cbd5e1; background: white; border: 1px solid #eee; }
        .principal { border-left-color: var(--accent); background: #f0f7ff; }
        .ausente { text-decoration: line-through; color: var(--danger); opacity: 0.5; }

        .group-tag { background: var(--accent); color: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; cursor: grab; font-size: 0.75rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        input, select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 8px; font-size: 0.8rem; }
        .btn-add { background: #10b981; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        
        #status { font-size: 0.65rem; color: #10b981; margin-top: auto; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="font-size: 1.2rem; margin-bottom: 20px;"><i class="fas fa-server"></i> ADMIN v41</h2>

    <div class="section-box">
        <span class="section-title">Personal y Grupos</span>
        <div id="drag-groups">Cargando equipo...</div>
    </div>

    <div class="section-box">
        <span class="section-title">Nueva Ausencia</span>
        <select id="aus-tecnico"></select>
        <div style="display:flex; gap:4px;">
            <input type="date" id="aus-inicio">
            <input type="date" id="aus-fin">
        </div>
        <button class="btn-add" onclick="registrarAusencia()" style="background:var(--accent)">GUARDAR PERMISO</button>
    </div>

    <div id="status">Iniciando...</div>
</aside>

<main class="main">
    <div style="background:white; padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #ddd;">
        <button onclick="cambiarMes(-1)" style="border:none; background:none; cursor:pointer; font-size: 1.2rem;"><i class="fas fa-chevron-left"></i></button>
        <h2 id="mesTitulo" style="margin:0; font-size:1.1rem; font-weight: 800; color: #0f172a;"></h2>
        <button onclick="cambiarMes(1)" style="border:none; background:none; cursor:pointer; font-size: 1.2rem;"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qscaisgcttsnoavgfctj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_IA9XB7EVhEMk2k6MbA4A4Q_M6og7SfO';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let tecnicosFull = []; 
    let dbAusencias = [], dbManual = [];
    let mesActual = new Date();

    async function sync() {
        const st = document.getElementById('status');
        try {
            const { data: tData } = await supabase.from('tecnicos').select('nombre, grupo');
            tecnicosFull = tData || [];

            const { data: aData } = await supabase.from('ausencias').select('*');
            dbAusencias = aData || [];

            const { data: mData } = await supabase.from('programacion_manual').select('*');
            dbManual = mData || [];

            st.innerText = "● ONLINE: " + tecnicosFull.length + " Técnicos";
            actualizarUI();
            render();
        } catch (e) {
            st.innerText = "● Error: " + e.message;
        }
    }

    function actualizarUI() {
        // Select ausencias
        document.getElementById('aus-tecnico').innerHTML = tecnicosFull.map(t => `<option value="${t.nombre}">${t.nombre}</option>`).join('');

        // Grupos arrastrables
        const dGroups = document.getElementById('drag-groups');
        dGroups.innerHTML = "";
        const gruposIds = [...new Set(tecnicosFull.map(t => t.grupo))].sort();
        
        gruposIds.forEach(gNum => {
            const integrantes = tecnicosFull.filter(t => t.grupo === gNum).map(t => t.nombre);
            const t1 = integrantes[0] || "---";
            const t2 = integrantes[1] || "---";
            dGroups.innerHTML += `
                <div class="group-tag" draggable="true" ondragstart="startDrag(event, '${t1}', '${t2}')">
                    G${gNum}: ${t1.split(' ')[0]} / ${t2.split(' ')[0]}
                </div>`;
        });
    }

    function startDrag(e, t1, t2) {
        e.dataTransfer.setData("t1", t1);
        e.dataTransfer.setData("t2", t2);
    }

    async function onDropGrupo(e, fechaId) {
        e.preventDefault();
        const t1 = e.dataTransfer.getData("t1");
        const t2 = e.dataTransfer.getData("t2");
        
        const existente = dbManual.find(m => m.fecha === fechaId);
        const payload = { fecha: fechaId, p1: t1, p2: t2, a1: "---", a2: "---" };
        if (existente) payload.id = existente.id;

        await supabase.from('programacion_manual').upsert(payload);
        sync();
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const y = mesActual.getFullYear(), m = mesActual.getMonth();
        document.getElementById('mesTitulo').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(mesActual).toUpperCase();

        const total = new Date(y, m+1, 0).getDate();
        let start = (new Date(y, m, 1).getDay() + 6) % 7;

        for(let i=0; i<start; i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=total; d++) {
            const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const man = dbManual.find(x => x.fecha === id);
            const celda = document.createElement('div');
            celda.className = `day ${ (new Date(y,m,d).getDay()===0||new Date(y,m,d).getDay()===6) ? 'weekend' : '' }`;
            
            celda.ondragover = (e) => { e.preventDefault(); celda.style.borderColor = "#2563eb"; };
            celda.ondragleave = () => { celda.style.borderColor = "#e2e8f0"; };
            celda.ondrop = (e) => onDropGrupo(e, id);

            celda.innerHTML = `<div class="day-header">${d}</div>`;
            
            if(man) {
                const isAus = (nom) => dbAusencias.some(a => nom === a.tecnico_nombre && id >= a.fecha_inicio && id <= a.fecha_fin);
                celda.innerHTML += `
                    <div class="turno-card principal">
                        <div class="${isAus(man.p1) ? 'ausente' : ''}">${man.p1}</div>
                        <div class="${isAus(man.p2) ? 'ausente' : ''}">${man.p2}</div>
                    </div>
                    <div class="turno-card" style="opacity:0.6">
                        <div>${man.a1}</div><div>${man.a2}</div>
                    </div>
                `;
            }
            grid.appendChild(celda);
        }
    }

    async function registrarAusencia() {
        const t = document.getElementById('aus-tecnico').value;
        const fi = document.getElementById('aus-inicio').value;
        const ff = document.getElementById('aus-fin').value;
        if(fi && ff) {
            await supabase.from('ausencias').insert([{ tecnico_nombre: t, fecha_inicio: fi, fecha_fin: ff }]);
            sync();
        }
    }

    function cambiarMes(v) { mesActual.setMonth(mesActual.getMonth()+v); render(); }
    sync();
</script>
</body>
</html>
