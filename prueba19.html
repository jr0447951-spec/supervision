<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC MASTER SUITE V19.0 - FULL OPERATIVO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a1ff; --report-blue: #4472c4; --report-light: #d9e1f2; }
        body { font-family: 'Inter', sans-serif; background: #001a33; color: #e6f2ff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* INTERFAZ DE CONFIGURACIÓN */
        .config-card { background: #003366; width: 100%; max-width: 900px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #0059b3; box-sizing: border-box; margin-bottom: 25px; }
        h3 { margin: 20px 0 8px 0; color: #00d4ff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0 12px 0; border-radius: 8px; border: 1px solid #0059b3; background: #001a33; color: white; box-sizing: border-box; font-size: 0.95rem; }
        
        /* SELECTOR DE TÉCNICOS (Checklist del código V6.2) */
        .tech-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; background: #001a33; padding: 15px; border-radius: 10px; border: 1px solid #0059b3; max-height: 180px; overflow-y: auto; margin: 8px 0; }
        .tech-item { display: flex; align-items: center; font-size: 0.8rem; gap: 10px; cursor: pointer; color: #b3e6ff; padding: 4px; }
        .tech-item input { width: auto; margin: 0; transform: scale(1.2); }

        /* BUSCADOR */
        .search-container { position: relative; }
        #suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: #003366; border: 2px solid #00d4ff; border-radius: 0 0 12px 12px; max-height: 250px; overflow-y: auto; z-index: 1000; display: none; }
        .sug-item { padding: 14px; cursor: pointer; border-bottom: 1px solid #004080; color: #b3e6ff; font-size: 0.9rem; }
        .sug-item:hover { background: #00d4ff; color: #003366; font-weight: 800; }

        /* --- ÁREA DE CAPTURA (ESTILO AZUL CORPORATIVO) --- */
        #capture-area { background: #ffffff !important; padding: 45px; width: 1250px; box-sizing: border-box; display: block; }
        .report-header-blue { background: var(--report-blue) !important; color: white !important; text-align: center; padding: 12px; border: 2px solid #000; font-weight: 900; font-size: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        
        .excel-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2.5px solid #000; background: white !important; }
        .excel-table th { background: var(--report-blue) !important; color: #ffffff !important; padding: 12px; font-size: 13px; border: 1px solid #000; text-transform: uppercase; }
        .excel-table td { border: 1px solid #000; color: #000 !important; font-size: 12px; text-align: center; vertical-align: middle; padding: 0; background: white !important; height: 70px; }

        /* LÓGICA DE AGRUPACIÓN VISUAL */
        .grouped-hidden { color: transparent !important; border-top: 1px solid transparent !important; }
        
        /* EDICIÓN VIVA EN TABLA */
        .table-input { width: 100%; height: 100%; border: none; background: transparent; text-align: center; font-family: 'Inter'; font-size: 12px; color: black; outline: none; padding: 5px; }
        .table-multi-tech { background: #f0f7ff; border: 1px solid #cce6ff; border-radius: 6px; padding: 5px; max-height: 80px; overflow-y: auto; text-align: left; }
        .export-text { display: none; padding: 10px; font-weight: 700; word-wrap: break-word; }

        /* MODO EXPORTACIÓN */
        #capture-area.is-exporting .table-input, #capture-area.is-exporting .table-multi-tech, #capture-area.is-exporting .no-capture { display: none !important; }
        #capture-area.is-exporting .export-text { display: block !important; }

        .btn-action { flex: 1; padding: 18px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1rem; font-family: 'Orbitron'; }
        .btn-png { background: #ffffff; color: var(--report-blue); border: 2.5px solid var(--report-blue); }
        .btn-xlsx { background: #1d6f42; color: white; }
    </style>
</head>
<body>

    <div class="config-card">
        <h3>1. Configuración de Informe</h3>
        <select id="sel-tipo" onchange="updateHeader()">
            <option value="VISITAS REALIZADAS">VISITAS REALIZADAS</option>
            <option value="PROGRAMACIÓN">PROGRAMACIÓN</option>
            <option value="CORTE PROGRAMADO">CORTE PROGRAMADO</option>
        </select>
        <input type="date" id="sel-fecha" onchange="updateHeader()">

        <h3>2. Detalles del Sitio y Personal</h3>
        <div class="search-container">
            <input type="text" id="site-search" placeholder="Buscar por ID, Nombre o NIC..." autocomplete="off">
            <div id="suggestions"></div>
        </div>

        <div id="form-site" style="display:none; margin-top:15px;">
            <p style="color:#00d4ff;">📍 <b>SITIO:</b> <span id="lbl-site" style="color:white;"></span></p>
            <h3>Seleccione Técnico(s):</h3>
            <div id="tech-list" class="tech-selector"></div>
            <button class="btn-action" style="background:var(--primary); color:white; width:100%; border-radius:10px;" onclick="addRow()">AÑADIR A LA TABLA</button>
        </div>
    </div>

    <div id="capture-area">
        <div class="report-header-blue">
            <span id="h-titulo">VISITAS REALIZADAS</span> - <span id="h-fecha-display"></span>
        </div>
        <table class="excel-table">
            <thead>
                <tr>
                    <th style="width:11%">Distribuidora</th>
                    <th style="width:12%">Horario</th>
                    <th style="width:23%">Nodo / Sitio</th>
                    <th style="width:10%">Torrero</th>
                    <th style="width:18%">Comentario</th>
                    <th style="width:9%">NIC</th>
                    <th style="width:17%">Personal Técnico</th>
                    <th class="no-capture" style="width:35px; background:white !important;"></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div style="display:flex; gap:20px; margin-top:30px; width:95%; max-width:1200px;">
        <button class="btn-action btn-png" onclick="downloadImg()">💾 DESCARGAR PNG HD</button>
        <button class="btn-action btn-xlsx" onclick="exportXLSX()">📊 EXPORTAR EXCEL</button>
    </div>

    <script>
        let dbSitios = [];
        let listaTecnicos = [];
        let siteSelected = null;
        let reportEntries = [];

        const SITIOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE_5CZtD7qHGW5cWHGAjn7ALTphVm5h88lco9cySYoAe2VBW4fq8DQ7-SZY6cd_FHtNQJS3MpE88hs/pub?output=csv';
        const TECNICOS_CSV = 'tecnicos.csv';

        window.onload = () => {
            const today = new Date();
            document.getElementById('sel-fecha').value = today.toISOString().split('T')[0];
            updateHeader();

            Papa.parse(SITIOS_CSV, {
                download: true, header: true,
                complete: (r) => { 
                    dbSitios = r.data.filter(row => row.SITEID).map(row => ({
                        id: row.SITEID,
                        name: row['NOMBRE DE SITIO'],
                        full: `${row.SITEID} - ${row['NOMBRE DE SITIO']}`,
                        torrero: row.Propietario,
                        distribuidora: row.Distribuidora,
                        nic: row['NIC/NIS']
                    }));
                }
            });

            Papa.parse(TECNICOS_CSV, {
                download: true, header: true,
                complete: (r) => {
                    const list = document.getElementById('tech-list');
                    listaTecnicos = r.data.filter(t => t.Nombre).map(t => t.Nombre);
                    listaTecnicos.forEach(n => {
                        list.innerHTML += `<label class="tech-item"><input type="checkbox" value="${n}"> ${n}</label>`;
                    });
                }
            });
        };

        function updateHeader() {
            const f = document.getElementById('sel-fecha').value.split('-');
            document.getElementById('h-fecha-display').innerText = `${f[2]}/${f[1]}/${f[0]}`;
            document.getElementById('h-titulo').innerText = document.getElementById('sel-tipo').value;
        }

        document.getElementById('site-search').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            if(v.length < 2) { sug.style.display = 'none'; return; }

            const matches = dbSitios.filter(s => s.full.toLowerCase().includes(v)).slice(0,8);
            if(matches.length > 0) {
                sug.style.display = 'block';
                matches.forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'sug-item';
                    d.innerText = m.full;
                    d.onclick = () => {
                        siteSelected = m;
                        document.getElementById('site-search').value = m.full;
                        document.getElementById('lbl-site').innerText = m.full;
                        document.getElementById('form-site').style.display = 'block';
                        sug.style.display = 'none';
                    };
                    sug.appendChild(d);
                });
            }
        });

        function addRow() {
            if(!siteSelected) return;
            const techs = Array.from(document.querySelectorAll('#tech-list input:checked')).map(i => i.value);
            
            reportEntries.push({
                ...siteSelected,
                personal: techs,
                horario: '',
                comentario: ''
            });

            reportEntries.sort((a, b) => a.distribuidora.localeCompare(b.distribuidora));
            renderTable();
            
            document.getElementById('form-site').style.display = 'none';
            document.getElementById('site-search').value = '';
            document.querySelectorAll('#tech-list input').forEach(i => i.checked = false);
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            reportEntries.forEach((row, i) => {
                const tr = document.createElement('tr');
                const isGrouped = i > 0 && reportEntries[i-1].distribuidora === row.distribuidora;
                const distClass = isGrouped ? 'grouped-hidden' : '';

                let techChecks = listaTecnicos.map(n => {
                    const chk = row.personal.includes(n) ? 'checked' : '';
                    return `<label style="display:flex;gap:5px;font-size:10px;color:#003366;"><input type="checkbox" value="${n}" ${chk} onchange="updateRowTech(${i}, '${n}')"> ${n}</label>`;
                }).join('');

                tr.innerHTML = `
                    <td class="${distClass}">
                        <input class="table-input" value="${row.distribuidora}" oninput="reportEntries[${i}].distribuidora=this.value;renderTable()">
                        <div class="export-text">${row.distribuidora}</div>
                    </td>
                    <td>
                        <input class="table-input" placeholder="00:00 - 00:00" oninput="reportEntries[${i}].horario=this.value">
                        <div class="export-text"></div>
                    </td>
                    <td style="color:#4472c4; font-weight:900;">${row.full}</td>
                    <td>${row.torrero}</td>
                    <td>
                        <textarea class="table-input" style="text-align:left;" oninput="reportEntries[${i}].comentario=this.value"></textarea>
                        <div class="export-text"></div>
                    </td>
                    <td style="color:#4472c4; font-weight:900; background:var(--report-light) !important;">${row.nic}</td>
                    <td>
                        <div class="table-multi-tech no-capture">${techChecks}</div>
                        <div class="export-text">${row.personal.join(' / ')}</div>
                    </td>
                    <td class="no-capture"><button onclick="reportEntries.splice(${i},1);renderTable()" style="color:red;border:none;background:none;font-size:1.5rem;cursor:pointer;">×</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateRowTech(idx, name) {
            const arr = reportEntries[idx].personal;
            if(arr.includes(name)) reportEntries[idx].personal = arr.filter(n => n !== name);
            else arr.push(name);
            renderTable();
        }

        async function downloadImg() {
            const area = document.getElementById('capture-area');
            area.querySelectorAll('tr').forEach((tr, i) => {
                tr.querySelector('td:nth-child(2) .export-text').innerText = reportEntries[i].horario;
                tr.querySelector('td:nth-child(5) .export-text').innerText = reportEntries[i].comentario;
            });

            area.classList.add('is-exporting');
            const canvas = await html2canvas(area, { scale: 3, backgroundColor: "#ffffff" });
            const a = document.createElement('a');
            a.download = `REPORTE_NOC_${Date.now()}.png`;
            a.href = canvas.toDataURL();
            a.click();
            area.classList.remove('is-exporting');
        }

        function exportXLSX() {
            const data = reportEntries.map(e => ({
                Distribuidora: e.distribuidora, Horario: e.horario, Nodo: e.full, Torrero: e.torrero, Comentario: e.comentario, NIC: e.nic, Tecnicos: e.personal.join(' / ')
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Reporte");
            XLSX.writeFile(wb, `Reporte_NOC_${Date.now()}.xlsx`);
        }
    </script>
</body>
</html>
